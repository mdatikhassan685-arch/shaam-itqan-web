<!DOCTYPE html>
<html lang="en">
<head>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-6">
    <div class="max-w-md mx-auto bg-white p-6 rounded shadow">
        <h2 class="text-xl font-bold mb-4">Add Product</h2>
        <input id="name" type="text" placeholder="Product Name" class="w-full p-2 border mb-2">
        <input id="price" type="number" placeholder="Price" class="w-full p-2 border mb-2">
        <input id="stock" type="number" placeholder="Stock" class="w-full p-2 border mb-2">
        <input id="img" type="text" placeholder="Image URL" class="w-full p-2 border mb-4">
        <button onclick="addProduct()" class="bg-green-600 text-white w-full py-2">Submit Product</button>
    </div>

    <script>
        async function addProduct() {
            const data = {
                name: document.getElementById('name').value,
                price: document.getElementById('price').value,
                stock: document.getElementById('stock').value,
                image_url: document.getElementById('img').value
            };
            const res = await fetch('/api/add-product', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(data)
            });
            if(res.ok) alert("Product Added!");
        }
    </script>
</body>
</html>
