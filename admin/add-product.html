<!DOCTYPE html>
<html>
<head>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="p-6 bg-gray-100">
    <div class="max-w-md mx-auto bg-white p-6 rounded shadow">
        <h1 class="text-xl font-bold mb-4">Add Product</h1>
        <input type="text" id="name" placeholder="Name" class="w-full p-2 border mb-2"><br>
        <input type="number" id="price" placeholder="Price" class="w-full p-2 border mb-2"><br>
        <input type="number" id="stock" placeholder="Stock" class="w-full p-2 border mb-2"><br>
        <input type="text" id="img" placeholder="Image URL" class="w-full p-2 border mb-2"><br>
        <button onclick="addProduct()" class="bg-blue-600 text-white w-full py-2 rounded">Upload Product</button>
    </div>

    <script>
        async function addProduct() {
            const product = {
                name: document.getElementById('name').value,
                price: document.getElementById('price').value,
                stock: document.getElementById('stock').value,
                image_url: document.getElementById('img').value
            };
            const res = await fetch('/api/product', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(product)
            });
            if(res.ok) alert('Product Added!');
        }
    </script>
</body>
</html>
