<!DOCTYPE html>
<html>
<head><script src="https://cdn.tailwindcss.com"></script></head>
<body class="p-4">
    <h1 class="text-xl font-bold mb-4">Add New Product</h1>
    <form id="prodForm" class="space-y-2">
        <input id="name" placeholder="Name" class="w-full border p-2">
        <input id="price" placeholder="Price" class="w-full border p-2">
        <input id="stock" placeholder="Stock" class="w-full border p-2">
        <input id="url" placeholder="Image URL" class="w-full border p-2">
        <button class="bg-blue-600 text-white w-full py-2">Upload Product</button>
    </form>
    <script>
        document.getElementById('prodForm').onsubmit = async(e) => {
            e.preventDefault();
            const data = {
                name: document.getElementById('name').value,
                price: document.getElementById('price').value,
                stock: document.getElementById('stock').value,
                image_url: document.getElementById('url').value
            };
            await fetch('/api/product', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(data) });
            alert('Added!');
        }
    </script>
</body>
</html>
