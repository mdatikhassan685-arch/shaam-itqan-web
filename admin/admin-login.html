<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#FDF8EF] min-h-screen flex items-center justify-center p-4">
    <div class="w-full max-w-[320px] bg-white p-6 border border-[#C1A44E] shadow-2xl">
        <h2 class="text-lg font-bold mb-6 text-center tracking-widest uppercase">Admin Access</h2>
        <input type="text" id="token" placeholder="Secret Token" class="w-full p-3 border mb-3 text-sm">
        <input type="password" id="pin" placeholder="Secret PIN" class="w-full p-3 border mb-6 text-sm">
        <button onclick="verify()" class="w-full bg-[#333333] text-white py-3 uppercase text-sm tracking-widest hover:bg-[#C1A44E] transition">Login</button>
    </div>

    <script>
        async function verify() {
            const token = document.getElementById('token').value;
            const pin = document.getElementById('pin').value;
            
            const res = await fetch('/api/auth', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ action: 'admin_login', token, pin })
            });

            if(res.ok) {
                localStorage.setItem('is_admin', 'true');
                window.location.href = 'admin.html';
            } else {
                alert("Invalid Credentials!");
            }
        }
    </script>
</body>
</html>
