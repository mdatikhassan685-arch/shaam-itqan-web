<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#FDF8EF] flex items-center justify-center h-screen">
    <div class="bg-white p-8 shadow-xl border border-[#C1A44E] w-80">
        <h2 class="text-xl font-bold mb-6 text-center">ADMIN ACCESS</h2>
        <input type="text" id="token" placeholder="Secret Token" class="w-full p-2 border mb-3">
        <input type="password" id="pin" placeholder="Secret PIN" class="w-full p-2 border mb-6">
        <button onclick="verify()" class="w-full bg-[#333333] text-white py-2 uppercase tracking-widest">Login</button>
    </div>

    <script>
        function verify() {
            const token = document.getElementById('token').value;
            const pin = document.getElementById('pin').value;
            if(token === "SHAAM ITQAN 007" && pin === "01823869644") {
                localStorage.setItem('is_admin', 'true');
                window.location.href = 'admin.html';
            } else {
                alert("Invalid Credentials!");
            }
        }
    </script>
</body>
</html>
