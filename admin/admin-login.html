<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>Admin Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#FDF8EF] min-h-screen flex items-center justify-center p-4">

    <!-- Admin Login Box -->
    <div class="w-full max-w-[320px] bg-white p-6 border border-[#C1A44E] shadow-2xl">
        <h2 class="text-lg font-bold mb-6 text-center tracking-widest uppercase">Admin Access</h2>
        
        <input type="text" id="token" placeholder="Secret Token" class="w-full p-3 border border-gray-300 mb-3 text-sm">
        <input type="password" id="pin" placeholder="Secret PIN" class="w-full p-3 border border-gray-300 mb-6 text-sm">
        
        <button onclick="verify()" class="w-full bg-[#333333] text-white py-3 uppercase text-sm tracking-widest hover:bg-[#C1A44E] transition">Login</button>
    </div>

    <script>
        function verify() {
            const token = document.getElementById('token').value;
            const pin = document.getElementById('pin').value;
            if(token === "SHAAM ITQAN 007" && pin === "01823869644") {
                localStorage.setItem('is_admin', 'true');
                window.location.href = 'admin.html';
            } else {
                alert("Invalid Credentials!");
            }
        }
    </script>
</body>
</html>
