<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Admin Panel | SHAAM ITQAN</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        // sessionStorage সিকিউরিটি চেক: অ্যাডমিন লগইন না থাকলে সরাসরি লগইন পেজে রিডাইরেক্ট করবে
        if (sessionStorage.getItem('is_admin') !== 'true') {
            window.location.href = 'admin-login.html';
        }
    </script>
</head>
<body class="bg-gray-100 p-4 pb-20">
    <div class="max-w-md mx-auto">
        <h1 class="text-xl font-bold mb-4 text-center">Master Admin Panel</h1>
        
        <!-- ৩×২ কমপ্যাক্ট বাটন গ্রিড লেআউট -->
        <div class="grid grid-cols-3 gap-1 mb-4">
            <button onclick="loadTab('product')" class="bg-blue-600 text-white py-2 text-[10px] rounded font-bold">PRODUCTS</button>
            <button onclick="loadTab('banner')" class="bg-green-600 text-white py-2 text-[10px] rounded font-bold">BANNERS</button>
            <button onclick="loadTab('category')" class="bg-purple-600 text-white py-2 text-[10px] rounded font-bold">CATEGORY</button>
            <button onclick="loadTab('coupon')" class="bg-teal-600 text-white py-2 text-[10px] rounded font-bold">COUPONS</button>
            <button onclick="loadTab('notif_send')" class="bg-indigo-600 text-white py-2 text-[10px] rounded font-bold">NOTIFS</button>
            <button onclick="loadOrders()" class="bg-orange-600 text-white py-2 text-[10px] rounded font-bold">ORDERS</button>
        </div>

        <div class="bg-white p-4 shadow rounded mb-6">
            <h2 id="form-title" class="font-bold mb-3 border-b pb-1 uppercase text-sm">Select an Option</h2>
            <div id="fields" class="space-y-2"></div>
            <input type="hidden" id="edit_id">
            <button onclick="saveItem()" id="save-btn" class="w-full bg-black text-white py-2 mt-4 hidden">SAVE / UPDATE</button>
        </div>
        
        <div id="item-list" class="space-y-3 pb-10"></div>
    </div>

    <script>
        let currentType = '';
        
        // ডাইনামিক ট্যাব লোডিং ফাংশন
        async function loadTab(type) {
            currentType = type;
            document.getElementById('form-title').innerText = "Add/Edit " + type;
            document.getElementById('save-btn').classList.remove('hidden');
            document.getElementById('edit_id').value = '';
            let f = `<input type="text" id="in_name" placeholder="Name/Title" class="w-full p-2 border text-sm rounded">`;
            
            if (type === 'notif_send') {
                document.getElementById('form-title').innerText = "Send Custom Notification";
                document.getElementById('save-btn').classList.add('hidden'); // সেভ বাটন হাইড থাকবে
                
                let f = `
                <div>
                    <label class="text-[9px] font-bold text-gray-500 uppercase">Target Audience</label>
                    <select id="notif_target_type" onchange="toggleNotifEmailField()" class="w-full p-2 border text-sm rounded bg-white">
                        <option value="all">All Registered Users (সবাইকে একসাথে)</option>
                        <option value="single">Single User (নির্দিষ্ট কাস্টমারকে)</option>
                    </select>
                </div>
                <div id="notif_email_div" class="hidden">
                    <label class="text-[9px] font-bold text-gray-500 uppercase">Target Customer Email</label>
                    <input type="email" id="notif_email" placeholder="e.g. customer@email.com" class="w-full p-2 border text-sm rounded">
                </div>
                <div>
                    <label class="text-[9px] font-bold text-gray-500 uppercase">Notification Title</label>
                    <input type="text" id="notif_title" placeholder="e.g. Eid Mubarak Offer! 🎉" class="w-full p-2 border text-sm rounded">
                </div>
                <div>
                    <label class="text-[9px] font-bold text-gray-500 uppercase">Notification Message</label>
                    <textarea id="notif_message" placeholder="Write your notification message here..." rows="3" class="w-full p-2 border text-sm rounded"></textarea>
                </div>
                <button onclick="sendAdminNotification()" class="w-full bg-indigo-600 text-white py-2.5 text-xs uppercase tracking-widest font-bold rounded hover:bg-indigo-700 transition duration-300 mt-2">
                    Send Notification
                </button>
                `;
                document.getElementById('fields').innerHTML = f;
                document.getElementById('item-list').innerHTML = ""; 
                return;
            }

            if(type === 'product') {
                let catOptions = `<option value="General">General (ডিফল্ট)</option>`;
                try {
                    const catRes = await fetch('/api/admin-data?type=category');
                    const categories = await catRes.json();
                    catOptions += categories.map(c => `<option value="${c.name}">${c.name}</option>`).join('');
                } catch (e) {
                    console.error(e);
                }

                f = `
                <input type="text" id="in_name" placeholder="Product Name" class="w-full p-2 border text-sm rounded">
                <div class="grid grid-cols-2 gap-2">
                    <div>
                        <label class="text-[9px] font-bold text-gray-500 uppercase">Selling Price</label>
                        <input type="number" id="in_price" placeholder="Discount Price" class="w-full p-2 border text-sm rounded">
                    </div>
                    <div>
                        <label class="text-[9px] font-bold text-gray-500 uppercase">Original Price (Optional)</label>
                        <input type="number" id="in_original_price" placeholder="Crossed Price" class="w-full p-2 border text-sm rounded">
                    </div>
                </div>
                
                <div>
                    <label class="text-[9px] font-bold text-gray-500 uppercase">Product Tag Badge</label>
                    <select id="in_tag" class="w-full p-2 border text-sm rounded bg-white">
                        <option value="none">None</option>
                        <option value="Sale">Sale</option>
                        <option value="Best Sale">Best Sale</option>
                        <option value="Available">Available</option>
                        <option value="New Arrival">New Arrival</option>
                        <option value="Hot Sale">Hot Sale</option>
                        <option value="Coming Soon">Coming Soon</option>
                    </select>
                </div>

                <div>
                    <label class="text-[9px] font-bold text-gray-500 uppercase">Product Category</label>
                    <select id="in_category" class="w-full p-2 border text-sm rounded bg-white">
                        ${catOptions}
                    </select>
                </div>

                <div class="space-y-1">
                    <p class="text-[9px] font-bold text-gray-500 uppercase tracking-wider">Stocks (S, M, L, XL, XXL)</p>
                    <div class="grid grid-cols-5 gap-1.5">
                        <input type="number" id="in_stock_s" placeholder="S" class="p-2 border text-xs text-center rounded">
                        <input type="number" id="in_stock_m" placeholder="M" class="p-2 border text-xs text-center rounded">
                        <input type="number" id="in_stock_l" placeholder="L" class="p-2 border text-xs text-center rounded">
                        <input type="number" id="in_stock_xl" placeholder="XL" class="p-2 border text-xs text-center rounded">
                        <input type="number" id="in_stock_xxl" placeholder="XXL" class="p-2 border text-xs text-center rounded">
                    </div>
                </div>
                <input type="text" id="in_desc" placeholder="Description" class="w-full p-2 border text-sm">`;
            } 
            else if (type === 'banner') {
                f += `<input type="text" id="in_link" placeholder="Link URL" class="w-full p-2 border text-sm rounded">`;
            }
            else if (type === 'coupon') {
                f = `
                <input type="text" id="in_name" placeholder="Coupon Code (e.g. SHAAM10)" class="w-full p-2 border text-sm rounded uppercase">
                <div>
                    <label class="text-[9px] font-bold text-gray-500 uppercase">Discount Type</label>
                    <select id="in_discount_type" class="w-full p-2 border text-sm rounded bg-white">
                        <option value="percentage">Percentage (%)</option>
                        <option value="flat">Flat Discount (৳)</option>
                    </select>
                </div>
                <div>
                    <label class="text-[9px] font-bold text-gray-500 uppercase">Discount Value (e.g. 10 for 10% / 100 for ৳100)</label>
                    <input type="number" id="in_discount_value" placeholder="Discount Value" class="w-full p-2 border text-sm rounded">
                </div>
                <div>
                    <label class="text-[9px] font-bold text-gray-500 uppercase">Minimum Order Amount (Optional)</label>
                    <input type="number" id="in_min_amount" placeholder="Minimum Amount to apply coupon" class="w-full p-2 border text-sm rounded">
                </div>`;
            }
            
            if (type !== 'coupon' && type !== 'product') {
                f += `<input type="text" id="in_img" placeholder="Image URL (Comma separate)" class="w-full p-2 border text-sm rounded">`;
            } else if (type === 'product') {
                f += `<input type="text" id="in_img" placeholder="Image URL (Comma separate)" class="w-full p-2 border text-sm rounded">`;
            }
            
            document.getElementById('fields').innerHTML = f;
            renderList(type);
        }

        function toggleNotifEmailField() {
            const target = document.getElementById('notif_target_type').value;
            const emailDiv = document.getElementById('notif_email_div');
            if (target === 'single') {
                emailDiv.classList.remove('hidden');
            } else {
                emailDiv.classList.add('hidden');
            }
        }

        async function sendAdminNotification() {
            const targetType = document.getElementById('notif_target_type').value;
            const emailInput = document.getElementById('notif_email');
            const email = emailInput ? emailInput.value.trim() : "";
            const title = document.getElementById('notif_title').value.trim();
            const message = document.getElementById('notif_message').value.trim();

            if (!title || !message) {
                alert("Please fill in Title and Message!");
                return;
            }

            if (targetType === 'single' && !email) {
                alert("Please enter the target customer email!");
                return;
            }

            // sessionStorage থেকে অ্যাডমিন টোকেন ও পিন সংগ্রহ করা হচ্ছে
            const token = sessionStorage.getItem('admin_token');
            const pin = sessionStorage.getItem('admin_pin');

            if (!token || !pin) {
                alert("⚠️ Security Error: Admin session not verified!\n\nPlease log out and log in again through the Admin Login page to restore your secure session.");
                return;
            }

            try {
                const res = await fetch('/api/notifications', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        action: 'send_admin_notif',
                        target_type: targetType,
                        email: email,
                        title: title,
                        message: message,
                        token: token,
                        pin: pin
                    })
                });

                if (res.ok) {
                    alert("Notification sent successfully!");
                    document.getElementById('notif_title').value = "";
                    document.getElementById('notif_message').value = "";
                    if (emailInput) emailInput.value = "";
                } else {
                    const data = await res.json();
                    alert(data.error || "Failed to send notification.");
                }
            } catch (error) {
                console.error(error);
                alert("Error sending notification.");
            }
        }

        async function saveItem() {
            const id = document.getElementById('edit_id').value;
            let data = { id: id };

            if (currentType === 'coupon') {
                data.name = document.getElementById('in_name').value.trim().toUpperCase(); 
                data.discount_type = document.getElementById('in_discount_type').value;
                data.discount_value = parseFloat(document.getElementById('in_discount_value').value) || 0;
                data.min_order_amount = parseFloat(document.getElementById('in_min_amount').value) || 0;
            } else {
                data.name = document.getElementById('in_name')?.value;
                data.price = document.getElementById('in_price')?.value;
                data.original_price = document.getElementById('in_original_price')?.value || 0;
                data.tag = document.getElementById('in_tag')?.value || 'none';
                data.category = document.getElementById('in_category')?.value || 'General';
                data.description = document.getElementById('in_desc')?.value;
                data.image_url = document.getElementById('in_img')?.value || '';
                data.link_url = document.getElementById('in_link')?.value;
                data.stock_s = parseInt(document.getElementById('in_stock_s')?.value) || 0;
                data.stock_m = parseInt(document.getElementById('in_stock_m')?.value) || 0;
                data.stock_l = parseInt(document.getElementById('in_stock_l')?.value) || 0;
                data.stock_xl = parseInt(document.getElementById('in_stock_xl')?.value) || 0;
                data.stock_xxl = parseInt(document.getElementById('in_stock_xxl')?.value) || 0;
            }
            
            const method = id ? 'PUT' : 'POST';
            const res = await fetch(`/api/admin-data?type=${currentType}`, { 
                method: method, 
                headers: {'Content-Type':'application/json'}, 
                body: JSON.stringify(data) 
            });
            if(res.ok) { alert('Saved Successfully!'); loadTab(currentType); } else { alert('Error!'); }
        }

        async function renderList(type) {
            const res = await fetch('/api/admin-data?type=' + type);
            const items = await res.json();
            document.getElementById('item-list').innerHTML = items.map(item => `
                <div class="bg-white p-3 shadow flex justify-between items-center text-sm">
                    <span>${item.code || item.name || item.image_url.substring(0,15)+'...'}</span>
                    <div>
                        <button onclick='editItem(${JSON.stringify(item)})' class="text-blue-500 font-bold mr-2">Edit</button>
                        <button onclick="deleteItem(${item.id})" class="text-red-500 font-bold">Delete</button>
                    </div>
                </div>`).join('');
        }

        function editItem(item) {
            document.getElementById('edit_id').value = item.id;
            document.getElementById('in_name').value = item.code || item.name || '';
            
            if (currentType === 'coupon') {
                document.getElementById('in_discount_type').value = item.discount_type || 'percentage';
                document.getElementById('in_discount_value').value = item.discount_value || 0;
                document.getElementById('in_min_amount').value = item.min_order_amount || 0;
            } else {
                if(document.getElementById('in_price')) document.getElementById('in_price').value = item.price || '';
                if(document.getElementById('in_original_price')) document.getElementById('in_original_price').value = item.original_price || 0;
                if(document.getElementById('in_tag')) document.getElementById('in_tag').value = item.tag || 'none';
                if(document.getElementById('in_category')) document.getElementById('in_category').value = item.category || 'General';
                
                if(document.getElementById('in_stock_s')) document.getElementById('in_stock_s').value = item.stock_s || 0;
                if(document.getElementById('in_stock_m')) document.getElementById('in_stock_m').value = item.stock_m || 0;
                if(document.getElementById('in_stock_l')) document.getElementById('in_stock_l').value = item.stock_l || 0;
                if(document.getElementById('in_stock_xl')) document.getElementById('in_stock_xl').value = item.stock_xl || 0;
                if(document.getElementById('in_stock_xxl')) document.getElementById('in_stock_xxl').value = item.stock_xxl || 0;
                
                if(document.getElementById('in_desc')) document.getElementById('in_desc').value = item.description || '';
                if(document.getElementById('in_img')) document.getElementById('in_img').value = item.image_url || '';
                if(document.getElementById('in_link')) document.getElementById('in_link').value = item.link_url || '';
            }
        }

        async function deleteItem(id) { await fetch(`/api/admin-data?type=${currentType}`, { method: 'DELETE', headers: {'Content-Type':'application/json'}, body: JSON.stringify({id}) }); renderList(currentType); }
        
        async function loadOrders() {
            document.getElementById('form-title').innerText = "Recent Orders";
            document.getElementById('save-btn').classList.add('hidden');
            document.getElementById('fields').innerHTML = "";
            const res = await fetch('/api/orders');
            const orders = await res.json();
            
            document.getElementById('item-list').innerHTML = orders.map(o => {
                const addressParts = o.address.split(' | ');
                const mainAddress = addressParts[0] || 'N/A';
                const landmark = addressParts.find(p => p.startsWith('Landmark:')) || 'Landmark: N/A';
                const area = addressParts.find(p => p.startsWith('Area:')) || 'Area: N/A';
                const method = addressParts.find(p => p.startsWith('Method:')) || 'Method: COD';

                let actionButtons = '';
                if (o.status === 'Pending') {
                    actionButtons = `
                        <button onclick="updateStatus(${o.id}, 'confirm')" class="mt-3 w-full bg-green-600 text-white py-2 text-xs uppercase tracking-widest font-bold rounded hover:bg-green-700 transition">Confirm Order</button>
                        <button onclick="updateStatus(${o.id}, 'cancel')" class="mt-2 w-full bg-red-600 text-white py-2 text-xs uppercase tracking-widest font-bold rounded hover:bg-red-700 transition">Cancel Order</button>
                    `;
                } else if (o.status === 'Confirmed') {
                    actionButtons = `
                        <button onclick="updateStatus(${o.id}, 'ship')" class="mt-3 w-full bg-purple-600 text-white py-2 text-xs uppercase tracking-widest font-bold rounded hover:bg-purple-700 transition">Mark as Shipped</button>
                        <button onclick="updateStatus(${o.id}, 'cancel')" class="mt-2 w-full bg-red-600 text-white py-2 text-xs uppercase tracking-widest font-bold rounded hover:bg-red-700 transition">Cancel Order</button>
                    `;
                } else if (o.status === 'Shipped') {
                    actionButtons = `
                        <button onclick="updateStatus(${o.id}, 'deliver')" class="mt-3 w-full bg-blue-600 text-white py-2 text-xs uppercase tracking-widest font-bold rounded hover:bg-blue-700 transition">Mark as Delivered</button>
                    `;
                }

                let badgeColor = "text-orange-600 bg-orange-50";
                if (o.status === 'Confirmed') badgeColor = "text-blue-600 bg-blue-50";
                if (o.status === 'Shipped') badgeColor = "text-purple-600 bg-purple-50";
                if (o.status === 'Delivered') badgeColor = "text-green-600 bg-green-50";
                if (o.status === 'Cancelled') badgeColor = "text-red-600 bg-red-50";

                return `
                    <div class="bg-white p-4 shadow rounded mb-4 border border-gray-200 text-sm leading-relaxed">
                        <div class="flex justify-between items-center border-b pb-2 mb-2 font-bold">
                            <span class="text-gray-800">Order ID: #${o.id}</span>
                            <span class="${badgeColor} px-2 py-0.5 rounded text-[9px] tracking-wider uppercase">${o.status}</span>
                        </div>
                        
                        <p class="text-[10px] text-gray-400 uppercase font-bold mt-2 tracking-wider">Customer Info</p>
                        <div class="bg-gray-50 p-2.5 rounded text-xs text-gray-700 mt-1 space-y-1 font-mono">
                            <div><b>Name:</b> ${o.customer_name}</div>
                            <div><b>Phones:</b> ${o.phone}</div>
                            <div><b>Email:</b> ${o.email}</div>
                        </div>

                        <p class="text-[10px] text-gray-400 uppercase font-bold mt-3 tracking-wider">Shipping & Payment</p>
                        <div class="bg-gray-50 p-2.5 rounded text-xs text-gray-700 mt-1 space-y-1 font-mono">
                            <div><b>Address:</b> ${mainAddress}</div>
                            <div><b>${landmark}</b></div>
                            <div><b>${area}</b></div>
                            <div><b class="text-[#C1A44E]">${method}</b></div>
                        </div>

                        <p class="text-[10px] text-gray-400 uppercase font-bold mt-3 tracking-wider">Products Ordered</p>
                        <div class="bg-gray-50 p-2.5 rounded text-xs text-gray-700 mt-1 font-mono">
                            ${o.products}
                        </div>

                        <div class="flex justify-between items-center mt-4 border-t pt-3 font-bold text-gray-800">
                            <span>Total Price:</span>
                            <span class="text-base text-[#D4AF37]">৳ ${parseFloat(o.total_price).toFixed(2)}</span>
                        </div>

                        ${actionButtons}
                    </div>`;
            }).join('');
        }

        async function updateStatus(id, action) { 
            if (action === 'cancel' && !confirm("Are you sure you want to cancel this order? Stock will be restored.")) return;

            const res = await fetch('/api/orders', { 
                method: 'POST', 
                headers: {'Content-Type': 'application/json'}, 
                body: JSON.stringify({ action: action, id: id }) 
            }); 
            if(res.ok) loadOrders(); 
        }
    </script>
</body>
</html>
