<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-4">
    <div class="max-w-2xl mx-auto">
        <h1 class="text-2xl font-bold mb-4">Manage Products</h1>
        <div id="item-list" class="space-y-4"></div>
    </div>

    <script>
        async function loadItems() {
            const res = await fetch('/api/admin-data?type=product');
            const data = await res.json();
            document.getElementById('item-list').innerHTML = data.map(p => `
                <div class="bg-white p-4 shadow flex flex-col gap-2">
                    <input type="text" id="name-${p.id}" value="${p.name}" class="border p-1">
                    <input type="number" id="price-${p.id}" value="${p.price}" class="border p-1">
                    <button onclick="updateItem(${p.id})" class="bg-blue-500 text-white p-1">Update</button>
                    <button onclick="deleteItem(${p.id})" class="bg-red-500 text-white p-1">Delete</button>
                </div>
            `).join('');
        }

        async function updateItem(id) {
            const data = { id, name: document.getElementById('name-'+id).value, price: document.getElementById('price-'+id).value };
            await fetch('/api/admin-data?type=product', { method: 'PUT', headers: {'Content-Type':'application/json'}, body: JSON.stringify(data) });
            alert('Updated!'); loadItems();
        }

        async function deleteItem(id) {
            await fetch('/api/admin-data?type=product', { method: 'DELETE', headers: {'Content-Type':'application/json'}, body: JSON.stringify({id}) });
            alert('Deleted!'); loadItems();
        }
        loadItems();
    </script>
</body>
</html>
