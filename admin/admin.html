<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>Admin Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        if (localStorage.getItem('is_admin') !== 'true') window.location.href = 'admin-login.html';
    </script>
</head>
<body class="bg-gray-100 p-4">
    <div class="max-w-[400px] mx-auto">
        <h1 class="text-xl font-bold mb-4">Admin Dashboard</h1>
        <a href="add-product.html" class="block w-full text-center bg-blue-600 text-white py-2 rounded mb-6">Add New Product</a>
        
        <h2 class="font-bold mb-3">Recent Orders</h2>
        <div id="order-list" class="space-y-3">
            <p class="text-center">Loading...</p>
        </div>
    </div>

    <script>
        async function loadOrders() {
            const res = await fetch('/api/orders');
            const orders = await res.json();
            const list = document.getElementById('order-list');
            list.innerHTML = orders.map(o => `
                <div class="bg-white p-3 rounded shadow border-l-4 border-green-500 text-sm">
                    <p><b>Cust:</b> ${o.customer_name} (${o.phone})</p>
                    <p class="truncate"><b>Addr:</b> ${o.address}</p>
                    <p><b>Total:</b> ৳${o.total_price}</p>
                    <button onclick="confirmOrder(${o.id})" class="mt-2 w-full bg-green-600 text-white py-1 rounded text-xs">Confirm</button>
                </div>
            `).join('');
        }

        async function confirmOrder(id) {
            const res = await fetch('/api/orders', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ id, status: 'Confirmed' })
            });
            if (res.ok) { alert('Confirmed!'); loadOrders(); }
        }
        loadOrders();
    </script>
</body>
</html>
