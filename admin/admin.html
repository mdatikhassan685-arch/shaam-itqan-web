<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>Admin Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        if (localStorage.getItem('is_admin') !== 'true') window.location.href = 'admin-login.html';
    </script>
</head>
<body class="bg-gray-100 p-4">
    <div class="max-w-[400px] mx-auto">
        <h1 class="text-2xl font-bold mb-6 text-center">Admin Dashboard</h1>

        <!-- Add Product Section -->
        <div class="bg-white p-4 rounded shadow mb-6">
            <h2 class="font-bold mb-3 border-b pb-1">Add Product</h2>
            <input type="text" id="p_name" placeholder="Name" class="w-full p-2 border mb-2 text-sm">
            <input type="number" id="p_price" placeholder="Price" class="w-full p-2 border mb-2 text-sm">
            <input type="text" id="p_img" placeholder="Image URL" class="w-full p-2 border mb-3 text-sm">
            <button onclick="save('product')" class="w-full bg-blue-600 text-white py-2 rounded text-sm">Save Product</button>
        </div>

        <!-- Add Banner Section -->
        <div class="bg-white p-4 rounded shadow mb-6">
            <h2 class="font-bold mb-3 border-b pb-1">Add Banner</h2>
            <input type="text" id="b_img" placeholder="Image URL" class="w-full p-2 border mb-2 text-sm">
            <input type="text" id="b_link" placeholder="Link URL" class="w-full p-2 border mb-3 text-sm">
            <button onclick="save('banner')" class="w-full bg-green-600 text-white py-2 rounded text-sm">Save Banner</button>
        </div>

        <!-- Recent Orders -->
        <h2 class="font-bold mb-3">Recent Orders</h2>
        <div id="order-list" class="space-y-3 pb-10">
            <p class="text-center">Loading orders...</p>
        </div>
    </div>

    <script>
        async function save(type) {
            let data = {};
            if(type === 'product') data = { name: document.getElementById('p_name').value, price: document.getElementById('p_price').value, image_url: document.getElementById('p_img').value };
            if(type === 'banner') data = { image_url: document.getElementById('b_img').value, link_url: document.getElementById('b_link').value };
            
            const res = await fetch(`/api/admin-data?type=${type}`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(data)
            });
            if(res.ok) { alert(type + ' Saved!'); location.reload(); }
            else alert('Error!');
        }

        async function loadOrders() {
            const res = await fetch('/api/orders');
            const orders = await res.json();
            document.getElementById('order-list').innerHTML = orders.map(o => `
                <div class="bg-white p-3 rounded shadow border-l-4 border-green-500 text-sm">
                    <p><b>Cust:</b> ${o.customer_name} (${o.phone})</p>
                    <p class="truncate"><b>Addr:</b> ${o.address}</p>
                    <p><b>Total:</b> ৳${o.total_price}</p>
                    <button onclick="confirmOrder(${o.id})" class="mt-2 w-full bg-green-600 text-white py-1 rounded text-xs">Confirm Order</button>
                </div>
            `).join('');
        }

        async function confirmOrder(id) {
            const res = await fetch('/api/orders', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ id, status: 'Confirmed' })
            });
            if(res.ok) { alert('Confirmed!'); loadOrders(); }
        }
        loadOrders();
    </script>
</body>
</html>
