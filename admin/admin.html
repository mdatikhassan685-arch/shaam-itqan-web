<!DOCTYPE html>
<html>
<head><script src="https://cdn.tailwindcss.com"></script></head>
<body class="p-4">
    <h1 class="text-xl font-bold mb-4">All Orders</h1>
    <div id="orders"></div>
    <script>
        fetch('/api/orders').then(r=>r.json()).then(data => {
            document.getElementById('orders').innerHTML = data.map(o => `
                <div class="border p-4 mb-2 rounded shadow">
                    <p><b>Name:</b> ${o.customer_name}</p>
                    <p><b>Phone:</b> ${o.phone}</p>
                    <p><b>Total:</b> ${o.total_price} ৳</p>
                </div>`).join('');
        });
    </script>
</body>
</html>
