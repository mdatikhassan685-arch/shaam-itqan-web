<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Admin Panel | SHAAM ITQAN</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-4">
    <div class="max-w-md mx-auto">
        <h1 class="text-xl font-bold mb-6 text-center uppercase tracking-widest">Admin Panel</h1>
        
        <!-- Main Navigation -->
        <div class="flex gap-1 mb-4 flex-wrap">
            <button onclick="loadTab('product')" class="flex-1 bg-blue-600 text-white py-2 text-[10px] font-bold">PRODUCTS</button>
            <button onclick="loadTab('banner')" class="flex-1 bg-green-600 text-white py-2 text-[10px] font-bold">BANNERS</button>
            <button onclick="loadTab('category')" class="flex-1 bg-purple-600 text-white py-2 text-[10px] font-bold">CATEGORY</button>
            <button onclick="showOrderFilters()" class="flex-1 bg-orange-600 text-white py-2 text-[10px] font-bold">ORDERS</button>
        </div>

        <!-- Filter Buttons (Only for Orders) -->
        <div id="order-filters" class="hidden flex gap-2 mb-4">
            <button onclick="loadOrders('Pending')" class="flex-1 bg-green-700 text-white py-1 text-[10px] font-bold">NEW ORDERS</button>
            <button onclick="loadOrders('Checkout_Pending')" class="flex-1 bg-gray-500 text-white py-1 text-[10px] font-bold">INCOMPLETE</button>
        </div>

        <!-- Form Section -->
        <div id="form-section" class="bg-white p-4 shadow rounded mb-6 hidden">
            <h2 id="form-title" class="font-bold mb-3 border-b pb-1 uppercase text-sm">Add/Edit Item</h2>
            <div id="fields" class="space-y-2"></div>
            <input type="hidden" id="edit_id">
            <button onclick="saveItem()" id="save-btn" class="w-full bg-black text-white py-2 mt-4 text-xs font-bold uppercase">SAVE / UPDATE</button>
        </div>

        <!-- List Section -->
        <div id="item-list" class="space-y-4"></div>
    </div>

    <script>
        let currentType = '';

        function showOrderFilters() {
            document.getElementById('form-section').classList.add('hidden');
            document.getElementById('order-filters').classList.remove('hidden');
            loadOrders('Pending');
        }

        function loadTab(type) {
            currentType = type;
            document.getElementById('order-filters').classList.add('hidden');
            document.getElementById('form-section').classList.remove('hidden');
            document.getElementById('form-title').innerText = "Add/Edit " + type;
            document.getElementById('edit_id').value = '';
            
            let f = `<input type="text" id="in_name" placeholder="Name/Title" class="w-full p-2 border text-sm">`;
            if(type === 'product') f += `
                <input type="text" id="in_pid" placeholder="Product ID (e.g. P101)" class="w-full p-2 border text-sm">
                <input type="number" id="in_price" placeholder="Price" class="w-full p-2 border text-sm">
                <input type="text" id="in_desc" placeholder="Description" class="w-full p-2 border text-sm">`;
            else f += `<input type="text" id="in_link" placeholder="Link URL" class="w-full p-2 border text-sm">`;
            f += `<input type="text" id="in_img" placeholder="Image URL" class="w-full p-2 border text-sm">`;
            document.getElementById('fields').innerHTML = f;
            renderList(type);
        }

        async function renderList(type) {
            const res = await fetch('/api/admin-data?type=' + type);
            const items = await res.json();
            document.getElementById('item-list').innerHTML = items.map(item => `
                <div class="bg-white p-3 shadow flex justify-between items-center text-sm border-l-4 border-blue-500">
                    <span class="truncate w-40">${item.name || item.image_url.substring(0,15)}</span>
                    <div>
                        <button onclick='editItem(${JSON.stringify(item)})' class="text-blue-500 font-bold mr-2">Edit</button>
                        <button onclick="deleteItem(${item.id})" class="text-red-500 font-bold">Delete</button>
                    </div>
                </div>`).join('');
        }

        async function loadOrders(status) {
            const res = await fetch('/api/orders');
            const allOrders = await res.json();
            const filtered = allOrders.filter(o => o.status === status);
            
            document.getElementById('item-list').innerHTML = filtered.map(o => `
                <div class="bg-white p-4 shadow-md border-l-4 ${status === 'Pending' ? 'border-green-600' : 'border-gray-400'}">
                    <p class="text-[10px] font-bold text-gray-500 uppercase">Order ID: #${o.id}</p>
                    <div class="mt-2 text-sm text-gray-800 bg-gray-50 p-2 border border-gray-200">
                        ${o.products.split('|').map(p => `<p class="py-0.5">${p}</p>`).join('')}
                    </div>
                    <div class="mt-3 text-[12px] space-y-1">
                        <p><b>Customer:</b> ${o.customer_name || 'N/A'}</p>
                        <p><b>Phone:</b> ${o.phone || 'N/A'}</p>
                        <p><b>Address:</b> ${o.address || 'N/A'}</p>
                        <p class="font-bold text-[#D4AF37]">Total: ৳${o.total_price}</p>
                    </div>
                    ${status === 'Pending' ? `<button onclick="confirmOrder(${o.id})" class="mt-3 w-full bg-green-600 text-white py-2 font-bold uppercase text-xs">Confirm Order</button>` : '<p class="mt-2 text-[10px] text-gray-400 italic">Incomplete Order</p>'}
                </div>
            `).join('');
        }

        async function confirmOrder(id) { 
            const res = await fetch('/api/orders', { method: 'PUT', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ id, status: 'Confirmed' }) }); 
            if(res.ok) { alert('Order Confirmed!'); loadOrders('Pending'); } 
        }

        async function saveItem() {
            const id = document.getElementById('edit_id').value;
            const data = { 
                id: id, 
                product_id: document.getElementById('in_pid')?.value,
                name: document.getElementById('in_name')?.value, 
                price: document.getElementById('in_price')?.value, 
                description: document.getElementById('in_desc')?.value, 
                image_url: document.getElementById('in_img').value, 
                link_url: document.getElementById('in_link')?.value 
            };
            const res = await fetch(`/api/admin-data?type=${currentType}`, { method: id ? 'PUT' : 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(data) });
            if(res.ok) { alert('Saved Successfully!'); loadTab(currentType); }
        }

        function editItem(item) {
            document.getElementById('edit_id').value = item.id;
            document.getElementById('in_name').value = item.name || '';
            if(document.getElementById('in_pid')) document.getElementById('in_pid').value = item.product_id || '';
            if(document.getElementById('in_price')) document.getElementById('in_price').value = item.price || '';
            if(document.getElementById('in_desc')) document.getElementById('in_desc').value = item.description || '';
            document.getElementById('in_img').value = item.image_url || '';
        }

        async function deleteItem(id) { await fetch('/api/admin-data?type=' + currentType, { method: 'DELETE', headers: {'Content-Type':'application/json'}, body: JSON.stringify({id}) }); renderList(currentType); }
    </script>
</body>
</html>
