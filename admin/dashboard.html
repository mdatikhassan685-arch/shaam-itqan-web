<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-4">
    <div class="max-w-md mx-auto bg-white p-6 shadow-md rounded">
        <h1 class="text-xl font-bold mb-4">Admin Dashboard</h1>
        
        <!-- Tab: Products -->
        <div class="mb-8">
            <h2 class="font-bold border-b mb-2">Add Product</h2>
            <input type="text" id="p_name" placeholder="Name" class="w-full p-2 border mb-2 text-sm">
            <input type="text" id="p_price" placeholder="Price" class="w-full p-2 border mb-2 text-sm">
            <input type="text" id="p_img" placeholder="Image URL" class="w-full p-2 border mb-2 text-sm">
            <button onclick="save('product')" class="w-full bg-blue-600 text-white py-2 text-sm">Save Product</button>
        </div>

        <!-- Tab: Banners -->
        <div class="mb-8">
            <h2 class="font-bold border-b mb-2">Add Banner</h2>
            <input type="text" id="b_img" placeholder="Image URL" class="w-full p-2 border mb-2 text-sm">
            <input type="text" id="b_link" placeholder="Link URL" class="w-full p-2 border mb-2 text-sm">
            <button onclick="save('banner')" class="w-full bg-green-600 text-white py-2 text-sm">Save Banner</button>
        </div>

        <!-- Orders link -->
        <a href="admin.html" class="block text-center text-blue-500 underline text-sm">View All Orders</a>
    </div>

    <script>
        async function save(type) {
            let data = {};
            if(type === 'product') data = { name: document.getElementById('p_name').value, price: document.getElementById('p_price').value, image_url: document.getElementById('p_img').value };
            if(type === 'banner') data = { image_url: document.getElementById('b_img').value, link_url: document.getElementById('b_link').value };
            
            await fetch(`/api/admin-data?type=${type}`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(data)
            });
            alert(type + ' Saved!');
        }
    </script>
</body>
</html>
