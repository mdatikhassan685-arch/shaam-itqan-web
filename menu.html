<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>Menu | SHAAM ITQAN</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&display=swap');
        .luxury-font { font-family: 'Playfair Display', serif; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-[#FDF8EF] text-[#333333] font-sans pb-28">

    <div class="max-w-md mx-auto p-6">
        <!-- Logo & Brand Header -->
        <div class="text-center my-6">
            <div class="w-16 h-16 bg-black rounded-full border border-[#C1A44E] overflow-hidden flex items-center justify-center mx-auto shadow-lg">
                <img src="https://i.ibb.co.com/69gkNgD/IMG-20260425-161202.png" class="w-full h-full object-contain p-2">
            </div>
            <h2 class="text-xl font-bold mt-3 tracking-[0.15em] luxury-font uppercase text-gray-800">SHAAM ITQAN</h2>
            <p class="text-[9px] uppercase tracking-widest text-[#C1A44E] font-bold mt-1">Perfection • Excellence • Tradition</p>
        </div>

        <!-- Quick Links List (প্রিমিয়াম লিংক গ্রিল - অ্যাডমিন লিংকটি সম্পূর্ণ মুছে দেওয়া হয়েছে) -->
        <div class="bg-white rounded-xl shadow-xl border border-gray-100 divide-y divide-gray-100 overflow-hidden mt-8 text-sm">
            
            <a href="about.html" class="flex justify-between items-center p-4 hover:bg-gray-50 transition duration-200">
                <span class="font-bold tracking-wide uppercase text-xs text-gray-700">About Us (আমাদের সম্পর্কে)</span>
                <svg class="w-4 h-4 text-[#C1A44E]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg>
            </a>
            
            <a href="policy.html#shipping" class="flex justify-between items-center p-4 hover:bg-gray-50 transition duration-200">
                <span class="font-bold tracking-wide uppercase text-xs text-gray-700">Shipping & Delivery (শিপিং তথ্য)</span>
                <svg class="w-4 h-4 text-[#C1A44E]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg>
            </a>
            
            <a href="policy.html#refund" class="flex justify-between items-center p-4 hover:bg-gray-50 transition duration-200">
                <span class="font-bold tracking-wide uppercase text-xs text-gray-700">Return & Refund Policy (রিটার্ন পলিসি)</span>
                <svg class="w-4 h-4 text-[#C1A44E]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg>
            </a>
            
            <a href="policy.html#terms" class="flex justify-between items-center p-4 hover:bg-gray-50 transition duration-200">
                <span class="font-bold tracking-wide uppercase text-xs text-gray-700">Terms & Conditions (শর্তাবলী)</span>
                <svg class="w-4 h-4 text-[#C1A44E]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg>
            </a>
        </div>

        <!-- Social Media Links (ব্র্যান্ড সোশাল আইকন গ্রিল) -->
        <div class="mt-8 text-center">
            <p class="text-[10px] font-bold uppercase tracking-widest text-[#C1A44E] mb-4">Follow Us</p>
            <div class="flex justify-center gap-6">
                <!-- Facebook -->
                <a href="https://facebook.com" target="_blank" class="text-gray-600 hover:text-blue-600 transition duration-300">
                    <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24">
                        <path d="M9 8H7v3h2v9h4v-9h3.6l.4-3H13V6c0-.5.5-1 1-1h3V1h-4c-2.8 0-5 2.2-5 5v2z"/>
                    </svg>
                </a>
                <!-- Instagram -->
                <a href="https://instagram.com" target="_blank" class="text-gray-600 hover:text-pink-600 transition duration-300">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                        <rect x="2" y="2" width="20" height="20" rx="5" ry="5"></rect>
                        <path d="M16 11.37A4 4 0 1112.63 8 4 4 0 0116 11.37z"></path>
                        <line x1="17.5" y1="6.5" x2="17.51" y2="6.5"></line>
                    </svg>
                </a>
                <!-- TikTok -->
                <a href="https://tiktok.com" target="_blank" class="text-gray-600 hover:text-black transition duration-300">
                    <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24">
                        <path d="M12.53.07C13.82.02 15.1.04 16.37.04c.1 1.63.74 3.1 1.83 4.22 1.03.95 2.37 1.48 3.8 1.51v3.13a8.1 8.1 0 01-4.81-1.6c-.1-.08-.19-.17-.28-.26v6.23c0 4.14-3.36 7.5-7.5 7.5-4.14 0-7.5-3.36-7.5-7.5 0-4.03 3.19-7.31 7.2-7.48V9.1A4.31 4.31 0 005.11 13.3c0 2.38 1.93 4.31 4.31 4.31 2.3 0 4.17-1.8 4.29-4.07.01-.15.02-.31.02-.46V.07h-1.2z"/>
                    </svg>
                </a>
            </div>
        </div>
    </div>

    <!-- Bottom Nav -->
    <div class="fixed bottom-0 left-0 w-full bg-white border-t border-gray-200 flex justify-around p-3 text-[10px] uppercase font-bold text-black z-[100]">
        <a href="index.html" class="text-black hover:text-[#D4AF37] flex flex-col items-center transition">
            <svg class="w-5 h-5 mb-1" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/>
            </svg>
            HOME
        </a>
        <a href="wishlist.html" class="text-black hover:text-[#D4AF37] flex flex-col items-center transition">
            <svg class="w-5 h-5 mb-1" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"/>
            </svg>
            WISHLIST
        </a>
        <a href="login.html" id="auth-link" class="text-black hover:text-[#D4AF37] flex flex-col items-center transition">
            <svg class="w-5 h-5 mb-1" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
            </svg>
            <span id="auth-text">ACCOUNT</span>
        </a>
        <a href="menu.html" class="text-[#D4AF37] flex flex-col items-center">
            <svg class="w-5 h-5 mb-1 text-[#D4AF37]" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
            </svg>
            MENU
        </a>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => { 
            if (localStorage.getItem('user_session')) {
                const authLink = document.getElementById('auth-link');
                const authText = document.getElementById('auth-text');
                if (authLink && authText) {
                    authText.innerText = 'PROFILE';
                    authLink.href = 'profile.html';
                }
            }
        });
    </script>
</body>
</html>
