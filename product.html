<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>Product Details</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#FDF8EF] p-4 font-serif">
    <div id="product-detail" class="max-w-md mx-auto bg-white p-6 shadow-xl border border-[#C1A44E]">
        <img id="p-img" class="w-full h-64 object-cover border border-[#C1A44E]/30">
        <h1 id="p-name" class="text-2xl font-bold mt-4"></h1>
        <p id="p-price" class="text-xl text-[#C1A44E] font-bold"></p>
        <p id="p-desc" class="text-gray-600 mt-4 text-sm leading-relaxed"></p>
        <button onclick="window.history.back()" class="w-full bg-[#333333] text-white py-3 mt-6 uppercase tracking-widest text-sm">Back</button>
    </div>
    <script>
        const pid = new URLSearchParams(window.location.search).get('id');
        async function loadProduct() {
            const res = await fetch('/api/admin-data?type=product');
            const products = await res.json();
            const p = products.find(prod => prod.id == pid);
            if(p) {
                document.getElementById('p-img').src = p.image_url;
                document.getElementById('p-name').innerText = p.name;
                document.getElementById('p-price').innerText = '৳ ' + p.price;
                document.getElementById('p-desc').innerText = p.description;
            }
        }
        loadProduct();
    </script>
</body>
</html>
