<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Details</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-white text-[#333333]">
    <div class="max-w-md mx-auto p-6">
        <img id="p-img" class="w-full h-80 object-cover" src="">
        <h1 id="p-name" class="text-xl font-bold mt-4 uppercase"></h1>
        <p id="p-price" class="text-2xl font-bold my-4 text-[#D4AF37]">৳ 0.00</p>
        
        <div class="mt-4">
            <p class="text-xs font-bold uppercase mb-2">Select Size</p>
            <div id="size-selector" class="flex gap-2">
                <button onclick="selectSize(this, 'M')" class="size-btn w-12 h-12 border-2 border-gray-200 hover:border-[#D4AF37] font-bold transition">M</button>
                <button onclick="selectSize(this, 'L')" class="size-btn w-12 h-12 border-2 border-gray-200 hover:border-[#D4AF37] font-bold transition">L</button>
                <button onclick="selectSize(this, 'XL')" class="size-btn w-12 h-12 border-2 border-gray-200 hover:border-[#D4AF37] font-bold transition">XL</button>
                <button onclick="selectSize(this, 'XXL')" class="size-btn w-12 h-12 border-2 border-gray-200 hover:border-[#D4AF37] font-bold transition">XXL</button>
            </div>
        </div>
        
        <div class="mt-6 space-y-3">
            <button onclick="addToBag()" class="w-full border-2 border-black py-4 font-bold uppercase">Add to Bag</button>
            <button onclick="goToCheckout()" class="w-full bg-[#D4AF37] text-white py-4 font-bold uppercase">Buy Now</button>
        </div>
    </div>
    <script>
        let productData = null; let selectedSize = 'M';
        const pid = new URLSearchParams(window.location.search).get('id');
        function selectSize(btn, s) { selectedSize = s; document.querySelectorAll('.size-btn').forEach(b => b.classList.remove('bg-black', 'text-white')); btn.classList.add('bg-black', 'text-white'); }
        async function loadProduct() {
            const res = await fetch('/api/admin-data?type=product');
            const products = await res.json();
            productData = products.find(p => p.id == pid);
            document.getElementById('p-img').src = productData.image_url;
            document.getElementById('p-name').innerText = productData.name;
            document.getElementById('p-price').innerText = '৳ ' + productData.price;
        }
        async function goToCheckout() {
            const res = await fetch('/api/orders', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ status: 'Checkout_Pending', products: `${productData.name} (Size: ${selectedSize})`, total_price: productData.price, image_url: productData.image_url }) });
            if(res.ok) window.location.href = 'checkout.html';
        }
        loadProduct();
    </script>
</body>
</html>
