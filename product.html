<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>Product Details | SHAAM ITQAN</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght=700&display=swap');
        .luxury-font { font-family: 'Playfair Display', serif; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-[#FDF8EF] p-4 font-sans pb-10">
    <div id="product-detail" class="max-w-md mx-auto bg-white p-6 shadow-xl border border-[#C1A44E] rounded relative">
        
        <!-- Swipe Carousel Slider -->
        <div class="relative w-full h-80 border border-[#C1A44E]/30 rounded overflow-hidden">
            <!-- ডিটেইলস পেজে ছবির ওপরে লাইভ লাইক উইজেট (লাইক সংখ্যা সহ) -->
            <button onclick="toggleProductWishlist()" class="absolute top-4 left-4 bg-white/85 backdrop-blur-sm p-2 rounded-full shadow hover:scale-110 active:scale-95 transition duration-200 z-[110] focus:outline-none flex items-center gap-1">
                <svg id="detail-heart-icon" class="w-5 h-5 text-gray-400 hover:text-red-500 transition" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"/>
                </svg>
                <span id="detail-heart-count" class="text-xs font-bold text-gray-500 font-sans">0</span>
            </button>

            <div id="p-slider" class="flex overflow-x-auto h-full snap-x snap-mandatory scrollbar-hide scroll-smooth">
                <!-- স্লাইড ইমেজ লোড হবে -->
            </div>
        </div>

        <!-- থাম্বনেইল এরিয়া -->
        <div id="p-thumbnails" class="flex gap-2 mt-3 overflow-x-auto scrollbar-hide hidden"></div>
        
        <!-- Title -->
        <h1 id="p-name" class="text-xl font-bold mt-5 tracking-widest luxury-font uppercase text-gray-800 leading-none"></h1>
        
        <!-- লাইভ এভারেজ স্টার কাউন্টার উইজেট -->
        <div id="title-avg-stars" class="mt-2 flex items-center gap-1.5 select-none leading-none h-4"></div>
        
        <!-- দাম ও স্টক ব্যাজ একই লাইনে পাশাপাশি -->
        <div class="flex justify-between items-center mt-3 border-t pt-3 border-gray-100">
            <div id="price-container"></div>
            <div id="stock-badge" class="flex items-center gap-1.5 shrink-0"></div>
        </div>
        
        <!-- Size Selection Section -->
        <div class="mt-6 border-t pt-4">
            <p class="text-[10px] font-bold uppercase tracking-wider text-gray-500 mb-3">Select Size</p>
            <div class="flex gap-2" id="size-selector">
                <!-- ডাইনামিক সাইজ বাটন লোড হবে -->
            </div>
        </div>

        <!-- Quantity Selector -->
        <div class="mt-6 border-t pt-4 flex items-center justify-between">
            <p class="text-[10px] font-bold uppercase tracking-wider text-gray-500">Quantity</p>
            <div class="flex items-center border border-gray-300 rounded">
                <button id="qty-minus" onclick="changeQty(-1)" class="px-3 py-1.5 font-bold hover:bg-gray-100 transition">-</button>
                <span id="qty-val" class="px-5 font-bold text-sm">1</span>
                <button id="qty-plus" onclick="changeQty(1)" class="px-3 py-1.5 font-bold hover:bg-gray-100 transition">+</button>
            </div>
        </div>

        <!-- Description -->
        <div class="mt-6 border-t pt-4">
            <p class="text-[10px] font-bold uppercase tracking-wider text-gray-500 mb-2">Description</p>
            <p id="p-desc" class="text-gray-600 text-sm leading-relaxed"></p>
        </div>

        <!-- ডাইনামিক কাস্টমার রিভিউ ও রেটিংস প্যানেল সেকশন -->
        <div class="mt-6 border-t pt-4">
            <h2 class="text-xs font-bold uppercase tracking-widest text-gray-700 mb-3 flex items-center justify-between">
                <span>Customer Reviews</span>
                <!-- লাইভ এভারেজ রেটিং ব্যাজ -->
                <span id="avg-rating-badge" class="bg-amber-100 text-amber-800 text-[10px] font-bold px-2 py-0.5 rounded flex items-center gap-1 select-none">
                    ★ <span id="avg-rating-val">0.0</span>
                </span>
            </h2>

            <!-- নতুন রিভিউ লেখার প্রিমিয়াম ডাইনামিক ফর্ম -->
            <div id="add-review-form" class="bg-gray-50/70 border border-gray-200/50 rounded-lg p-3.5 mb-4 hidden space-y-3">
                <p class="text-[10px] font-bold uppercase tracking-wider text-gray-500">Write a Review</p>
                
                <!-- ৫ স্টার ওয়ান-ক্লিক সিলেক্টর বাটন -->
                <div class="flex items-center gap-1.5" id="star-selector">
                    <span class="text-amber-500 text-xl cursor-pointer star select-none" onclick="selectReviewStars(1)">★</span>
                    <span class="text-amber-500 text-xl cursor-pointer star select-none" onclick="selectReviewStars(2)">★</span>
                    <span class="text-amber-500 text-xl cursor-pointer star select-none" onclick="selectReviewStars(3)">★</span>
                    <span class="text-amber-500 text-xl cursor-pointer star select-none" onclick="selectReviewStars(4)">★</span>
                    <span class="text-amber-500 text-xl cursor-pointer star select-none" onclick="selectReviewStars(5)">★</span>
                </div>
                
                <textarea id="review-comment" placeholder="Share your experience with this product..." rows="2" class="w-full p-2.5 text-xs border rounded-lg bg-white focus:outline-none focus:border-[#D4AF37] font-sans"></textarea>
                <button onclick="submitReview()" class="bg-[#333333] hover:bg-black text-white text-[10px] font-bold uppercase tracking-widest px-4 py-2.5 rounded transition">Submit Review</button>
            </div>
            
            <!-- লগইন না করা থাকলে নোটিশ প্রদর্শন করা হবে -->
            <div id="login-to-review" class="text-center bg-gray-50 p-3 rounded-lg border text-xs text-gray-500 mb-4 font-sans">
                Please <a href="login.html" class="text-[#D4AF37] font-bold hover:underline">login</a> to write a review.
            </div>

            <!-- রিভিউ লিস্ট ইনবক্স কনটেইনার -->
            <div id="reviews-list" class="space-y-3 max-h-60 overflow-y-auto scrollbar-hide">
                <p class="text-center text-gray-400 text-xs py-4">No reviews yet. Be the first to review!</p>
            </div>
        </div>
        
        <!-- Action Buttons -->
        <div class="mt-8 space-y-3">
            <button id="buy-btn" onclick="buyNow()" class="w-full bg-black text-white py-3.5 uppercase tracking-widest text-xs font-bold hover:bg-[#C1A44E] transition duration-300 rounded">
                Buy Now
            </button>
            <button id="bag-btn" onclick="addProductToBag()" class="w-full border border-black text-black py-3.5 uppercase tracking-widest text-xs font-bold hover:bg-black hover:text-white transition duration-300 rounded">
                Add To Bag
            </button>
            <button onclick="window.history.back()" class="w-full text-gray-500 text-xs uppercase tracking-widest font-bold py-2 text-center block hover:underline">
                Back to Shop
            </button>
        </div>
    </div>

    <script>
        const pid = new URLSearchParams(window.location.search).get('id');
        let selectedSize = 'M';
        let quantity = 1;
        let productData = null;
        let stockMap = {};
        let chosenRating = 5; // ডিফল্ট রেটিং ৫ স্টার নির্ধারণ করা হলো

        async function loadProduct() {
            try {
                const res = await fetch('/api/admin-data?type=product');
                const products = await res.json();
                productData = products.find(prod => prod.id == pid);
                
                if (productData) {
                    const images = productData.image_url.split(',');
                    const sliderContainer = document.getElementById('p-slider');
                    sliderContainer.innerHTML = images.map(img => `
                        <div class="flex-shrink-0 w-full h-full snap-center">
                            <img src="${img.trim()}" class="w-full h-full object-cover">
                        </div>
                    `).join('');

                    const thumbContainer = document.getElementById('p-thumbnails');
                    if (images.length > 1) {
                        thumbContainer.innerHTML = images.map((img, index) => `
                            <button onclick="scrollToSlide(${index})" class="thumb-btn flex-shrink-0 w-14 h-14 border rounded overflow-hidden transition-all duration-200 ${index === 0 ? 'border-[#D4AF37]' : 'border-gray-200'}">
                                <img src="${img.trim()}" class="w-full h-full object-cover">
                            </button>
                        `).join('');
                        thumbContainer.classList.remove('hidden');
                    }

                    document.getElementById('p-name').innerText = productData.name;
                    
                    const originalPriceVal = parseFloat(productData.original_price) || 0;
                    const priceContainer = document.getElementById('price-container');
                    if (originalPriceVal > 0) {
                        priceContainer.innerHTML = `<span class="line-through text-gray-400 text-sm mr-2 font-normal">৳ ${Math.round(originalPriceVal)}</span> <span class="text-lg text-[#C1A44E] font-bold">৳ ${productData.price}</span>`;
                    } else {
                        priceContainer.innerHTML = `<span class="text-lg text-[#C1A44E] font-bold">৳ ${productData.price}</span>`;
                    }

                    document.getElementById('p-desc').innerText = productData.description || "No description available.";
                    
                    stockMap = {
                        'S': parseInt(productData.stock_s) || 0,
                        'M': parseInt(productData.stock_m) || 0,
                        'L': parseInt(productData.stock_l) || 0,
                        'XL': parseInt(productData.stock_xl) || 0,
                        'XXL': parseInt(productData.stock_xxl) || 0
                    };

                    const availableSizes = ['S', 'M', 'L', 'XL', 'XXL'].filter(sz => stockMap[sz] > 0);
                    if (availableSizes.length > 0) {
                        selectedSize = availableSizes[0];
                    } else {
                        selectedSize = ''; 
                    }

                    renderSizeSelector();
                    updateStockBadge();
                    setupSwipeListener();
                    await checkProductWishlist(); 
                    await loadReviews(); // কাস্টমার রিভিউ ও রেটিংস ডাইনামিক লোড করা হচ্ছে
                }
            } catch (error) {
                console.error("Failed to load product details:", error);
            }
        }

        // স্টার রেটিং সিলেকশন ও গোল্ডেন কালার সিএসএস ট্র্যাকার
        function selectReviewStars(rating) {
            chosenRating = rating;
            const stars = document.querySelectorAll('.star');
            stars.forEach((star, idx) => {
                if (idx < rating) {
                    star.className = "text-amber-500 text-xl cursor-pointer star select-none";
                } else {
                    star.className = "text-gray-300 text-xl cursor-pointer star select-none";
                }
            });
        }

        // ডাটাবেজ থেকে কাস্টমার রিভিউ ডাইনামিক ফেচ ও এভারেজ ক্যালকুলেশন লজিক
        async function loadReviews() {
            const user = JSON.parse(localStorage.getItem('user_session'));
            const formDiv = document.getElementById('add-review-form');
            const loginDiv = document.getElementById('login-to-review');
            
            if (user) {
                formDiv.classList.remove('hidden');
                loginDiv.classList.add('hidden');
            } else {
                formDiv.classList.add('hidden');
                loginDiv.classList.remove('hidden');
            }

            try {
                const res = await fetch(`/api/user-hub?action=get_reviews&product_id=${pid}`);
                if (res.ok) {
                    const reviews = await res.json();
                    const list = document.getElementById('reviews-list');
                    const avgVal = document.getElementById('avg-rating-val');
                    const titleStars = document.getElementById('title-avg-stars');

                    if (reviews.length === 0) {
                        list.innerHTML = `<p class="text-center text-gray-400 text-xs py-4">No reviews yet. Be the first to review!</p>`;
                        avgVal.innerText = "0.0";
                        if (titleStars) titleStars.innerHTML = "";
                        return;
                    }

                    // এভারেজ স্টার রেটিং ম্যাথমেটিকাল ক্যালকুলেশন
                    const total = reviews.reduce((acc, r) => acc + parseInt(r.rating), 0);
                    const avg = (total / reviews.length).toFixed(1);
                    avgVal.innerText = avg;

                    // টাইটেলের নিচে এভারেজ স্টার ইন্ডিকেটর রেন্ডার করা
                    if (titleStars) {
                        const roundedAvg = Math.round(avg);
                        let starStr = '';
                        for (let i = 0; i < 5; i++) {
                            starStr += i < roundedAvg ? '★' : '☆';
                        }
                        titleStars.innerHTML = `<span class="text-amber-500 font-extrabold text-sm">${starStr}</span> <span class="text-gray-400 font-semibold text-[10px]">(${reviews.length} reviews)</span>`;
                    }

                    list.innerHTML = reviews.map(r => {
                        let stars = '';
                        for (let i = 0; i < 5; i++) {
                            stars += i < r.rating ? '★' : '☆';
                        }
                        return `
                            <div class="bg-gray-50/70 p-3 rounded-lg border border-gray-200/50 text-[11px] leading-relaxed">
                                <div class="flex justify-between items-center mb-1 font-sans">
                                    <span class="font-extrabold text-gray-800">${r.username}</span>
                                    <span class="text-amber-500 font-extrabold text-xs select-none">${stars}</span>
                                </div>
                                <p class="text-gray-600 font-sans">${r.comment}</p>
                                <span class="text-[9px] text-gray-400 font-mono mt-1.5 block">${new Date(r.created_at).toLocaleDateString()}</span>
                            </div>
                        `;
                    }).join('');
                }
            } catch (e) {
                console.error("Load Reviews Error:", e);
            }
        }

        // কাস্টমার রিভিউ সাবমিশন লজিক
        async function submitReview() {
            const user = JSON.parse(localStorage.getItem('user_session'));
            if (!user) return alert("Please login first!");

            const comment = document.getElementById('review-comment').value.trim();
            if (!comment) return alert("Please write a comment!");

            try {
                const res = await fetch('/api/user-hub', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        action: 'add_review',
                        product_id: pid,
                        email: user.email,
                        username: user.username || "Valued Customer",
                        rating: chosenRating,
                        comment: comment
                    })
                });

                if (res.ok) {
                    alert("Review submitted successfully!");
                    document.getElementById('review-comment').value = "";
                    selectReviewStars(5); // রেটিং ৫ স্টারে রিসেট করা হচ্ছে
                    loadReviews(); // লাইভ রিলোড
                } else {
                    const err = await res.json();
                    alert(err.error || "Failed to submit review.");
                }
            } catch (e) {
                console.error(e);
                alert("Error submitting review.");
            }
        }

        async function checkProductWishlist() {
            const countSpan = document.getElementById('detail-heart-count');
            countSpan.innerText = productData.wishlist_count || 0;

            const user = JSON.parse(localStorage.getItem('user_session'));
            if (user) {
                try {
                    const res = await fetch('/api/wishlist?email=' + user.email);
                    if (res.ok) {
                        const items = await res.json();
                        const isExist = items.some(item => item.id == pid);
                        const icon = document.getElementById('detail-heart-icon');
                        if (isExist) {
                            icon.setAttribute('fill', '#EF4444');
                            icon.setAttribute('stroke', '#EF4444');
                            icon.classList.remove('text-gray-400');
                            icon.classList.add('text-red-500');
                        }
                    }
                } catch (e) { console.error(e); }
            }
        }

        async function toggleProductWishlist() {
            const user = JSON.parse(localStorage.getItem('user_session'));
            if (!user) { alert("Please login first!"); window.location.href = 'login.html'; return; }

            try {
                const res = await fetch('/api/wishlist', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: user.email, product_id: pid })
                });
                const data = await res.json();
                const icon = document.getElementById('detail-heart-icon');
                const countSpan = document.getElementById('detail-heart-count');
                let currentCount = parseInt(countSpan.innerText) || 0;

                if (data.status === 'Added') {
                    icon.setAttribute('fill', '#EF4444');
                    icon.setAttribute('stroke', '#EF4444');
                    icon.classList.remove('text-gray-400');
                    icon.classList.add('text-red-500');
                    countSpan.innerText = currentCount + 1;
                } else {
                    icon.setAttribute('fill', 'none');
                    icon.setAttribute('stroke', 'currentColor');
                    icon.classList.remove('text-red-500');
                    icon.classList.add('text-gray-400');
                    countSpan.innerText = Math.max(0, currentCount - 1);
                }
            } catch (e) { console.error(e); }
        }

        function scrollToSlide(index) {
            const slider = document.getElementById('p-slider');
            const slideWidth = slider.clientWidth;
            slider.scrollTo({
                left: slideWidth * index,
                behavior: 'smooth'
            });
            updateActiveThumbnail(index);
        }

        function updateActiveThumbnail(activeIndex) {
            const thumbnails = document.querySelectorAll('.thumb-btn');
            thumbnails.forEach((thumb, idx) => {
                if (idx === activeIndex) {
                    thumb.className = "thumb-btn flex-shrink-0 w-14 h-14 border rounded overflow-hidden transition-all duration-200 border-[#D4AF37] border-2 opacity-100";
                } else {
                    thumb.className = "thumb-btn flex-shrink-0 w-14 h-14 border rounded overflow-hidden transition-all duration-200 opacity-50 border-gray-200";
                }
            });
        }

        function setupSwipeListener() {
            const slider = document.getElementById('p-slider');
            slider.addEventListener('scroll', () => {
                const index = Math.round(slider.scrollLeft / slider.clientWidth);
                updateActiveThumbnail(index);
            });
        }

        function renderSizeSelector() {
            const sizes = ['S', 'M', 'L', 'XL', 'XXL'];
            const selector = document.getElementById('size-selector');
            
            selector.innerHTML = sizes.map(sz => {
                const stock = stockMap[sz];
                if (stock <= 0) {
                    return `<button disabled class="border border-gray-200 text-gray-300 w-10 h-10 text-xs font-bold rounded line-through cursor-not-allowed bg-gray-50">${sz}</button>`;
                } else if (sz === selectedSize) {
                    return `<button onclick="selectSize('${sz}')" class="size-btn border-2 border-black bg-black text-white w-10 h-10 text-xs font-bold rounded transition">${sz}</button>`;
                } else {
                    return `<button onclick="selectSize('${sz}')" class="size-btn border border-gray-300 w-10 h-10 text-xs font-bold rounded hover:border-black transition">${sz}</button>`;
                }
            }).join('');
        }

        function selectSize(size) {
            selectedSize = size;
            quantity = 1;
            document.getElementById('qty-val').innerText = quantity;
            renderSizeSelector();
            updateStockBadge();
        }

        function updateStockBadge() {
            const badge = document.getElementById('stock-badge');
            const totalStock = Object.values(stockMap).reduce((a, b) => a + b, 0);
            
            if (productData.tag === 'Coming Soon') {
                badge.innerHTML = `<span class="bg-blue-600 text-white text-[9px] font-bold px-2 py-0.5 rounded tracking-wider uppercase">Coming Soon</span>`;
                disableActionButtons();
                return;
            }

            if (totalStock <= 0) {
                badge.innerHTML = `<span class="bg-red-100 text-red-800 text-[9px] font-bold px-2 py-1 rounded tracking-widest uppercase">Sold Out</span>`;
                disableActionButtons();
                return;
            }

            const activeStock = stockMap[selectedSize];
            if (activeStock == 0) {
                badge.innerHTML = `<span class="bg-red-100 text-red-800 text-[9px] font-bold px-2 py-1 rounded tracking-wider uppercase">Sold Out</span>`;
                document.getElementById('buy-btn').disabled = true;
                document.getElementById('buy-btn').className = "w-full bg-gray-300 text-gray-500 py-3.5 uppercase tracking-widest text-xs font-bold rounded cursor-not-allowed";
                document.getElementById('bag-btn').disabled = true;
                document.getElementById('bag-btn').className = "w-full border border-gray-200 text-gray-400 py-3.5 uppercase tracking-widest text-xs font-bold rounded cursor-not-allowed";
            } else {
                if (productData.tag && productData.tag !== 'none') {
                    let badgeBg = "bg-black";
                    if (productData.tag === 'Best Sale') badgeBg = "bg-red-800";
                    if (productData.tag === 'Available') badgeBg = "bg-green-600";
                    if (productData.tag === 'New Arrival') badgeBg = "bg-teal-600";
                    if (productData.tag === 'Hot Sale') badgeBg = "bg-orange-600";

                    badge.innerHTML = `<span class="${badgeBg} text-white text-[9px] font-bold px-2 py-0.5 rounded tracking-wider uppercase">${productData.tag}</span> <span class="bg-green-100 text-green-800 text-[9px] font-bold px-2 py-0.5 rounded tracking-wider uppercase">Available (${activeStock})</span>`;
                } else {
                    badge.innerHTML = `<span class="bg-green-100 text-green-800 text-[9px] font-bold px-2 py-1 rounded tracking-wider uppercase">Available (${activeStock})</span>`;
                }
                enableActionButtons();
            }
        }

        function disableActionButtons() {
            document.getElementById('buy-btn').disabled = true;
            document.getElementById('buy-btn').className = "w-full bg-gray-300 text-gray-500 py-3.5 uppercase tracking-widest text-xs font-bold rounded cursor-not-allowed";
            document.getElementById('bag-btn').disabled = true;
            document.getElementById('bag-btn').className = "w-full border border-gray-200 text-gray-400 py-3.5 uppercase tracking-widest text-xs font-bold rounded cursor-not-allowed";
            document.getElementById('qty-plus').disabled = true;
            document.getElementById('qty-minus').disabled = true;
        }

        function enableActionButtons() {
            document.getElementById('buy-btn').disabled = false;
            document.getElementById('buy-btn').className = "w-full bg-black text-white py-3.5 uppercase tracking-widest text-xs font-bold hover:bg-[#C1A44E] transition duration-300 rounded";
            document.getElementById('bag-btn').disabled = false;
            document.getElementById('bag-btn').className = "w-full border border-black text-black py-3.5 uppercase tracking-widest text-xs font-bold hover:bg-black hover:text-white transition duration-300 rounded";
            document.getElementById('qty-plus').disabled = false;
            document.getElementById('qty-minus').disabled = false;
        }

        function changeQty(amount) {
            quantity += amount;
            if (quantity < 1) quantity = 1;
            
            const limit = stockMap[selectedSize];
            if (limit > 0 && quantity > limit) {
                quantity = limit;
                alert(`Sorry, we only have ${limit} items left in stock for size ${selectedSize}!`);
            }
            document.getElementById('qty-val').innerText = quantity;
        }

        async function saveToBagApi() {
            const user = JSON.parse(localStorage.getItem('user_session'));
            if (!user) { 
                alert("Please login first!"); 
                window.location.href = 'login.html'; 
                return { success: false }; 
            }
            
            if (!productData || !selectedSize) return { success: false };

            try {
                const res = await fetch('/api/bag', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ 
                        email: user.email, 
                        products: productData.name, 
                        image_url: productData.image_url, 
                        total_price: productData.price,
                        size: selectedSize,
                        quantity: quantity
                    })
                });

                if (res.ok) {
                    const data = await res.json();
                    return { success: true, id: data.id };
                } else {
                    alert("Failed to add. Please try again.");
                    return { success: false };
                }
            } catch (error) {
                alert("Network error: Could not connect.");
                console.error(error);
                return { success: false };
            }
        }

        async function addProductToBag() {
            const resData = await saveToBagApi();
            if (resData.success) {
                alert("Added to Bag successfully!");
            }
        }

        async function buyNow() {
            const resData = await saveToBagApi();
            if (resData.success) {
                localStorage.setItem('checkout_item_ids', JSON.stringify([resData.id]));
                window.location.href = 'checkout.html';
            }
        }

        loadProduct();
    </script>
</body>
</html>
