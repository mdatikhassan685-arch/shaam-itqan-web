<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>My Wishlist | SHAAM ITQAN</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght=700&display=swap');
        .luxury-font { font-family: 'Playfair Display', serif; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-white text-black font-sans pb-24">

    <!-- Header -->
    <div class="p-4 border-b border-gray-100 sticky top-0 bg-white z-[100] flex justify-between items-center h-16">
        <div class="w-10"><img src="https://i.ibb.co.com/69gkNgD/IMG-20260425-161202.png" class="w-full"></div>
        <h1 class="text-lg font-bold tracking-widest luxury-font uppercase">My Wishlist</h1>
        <div class="w-8"></div>
    </div>

    <!-- Wishlist Products Grid -->
    <main class="px-4 py-6">
        <div id="wishlist-grid" class="grid grid-cols-2 gap-4">
            <p class="col-span-2 text-center py-10 text-gray-500 text-sm">Loading your wishlist...</p>
        </div>
    </main>

    <!-- ৫ টি বাটনের ডাইনামিক বটম মেনুবার (সাপোর্ট এবং মাঝখানে প্রোফাইল এলাইনমেন্ট সিঙ্ক করা হয়েছে) -->
    <div class="fixed bottom-0 left-0 w-full bg-white border-t border-gray-200 flex justify-around p-3 text-[9px] uppercase font-bold text-black z-[100] select-none">
        <!-- ১. HOME -->
        <a href="index.html" class="text-black hover:text-[#D4AF37] flex flex-col items-center transition duration-200">
            <svg class="w-5 h-5 mb-1" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/>
            </svg>
            HOME
        </a>
        <!-- ২. WISHLIST (অ্যাক্টিভ গোল্ডেন কালার হাইলাইটেড থাকবে) -->
        <a href="wishlist.html" class="text-[#D4AF37] flex flex-col items-center">
            <svg class="w-5 h-5 mb-1 text-[#D4AF37]" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"/>
            </svg>
            WISHLIST
        </a>
        <!-- ৩. PROFILE (মাঝখানে এলাইন) -->
        <a href="login.html" id="auth-link" class="text-black hover:text-[#D4AF37] flex flex-col items-center transition duration-200">
            <svg class="w-5 h-5 mb-1" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
            </svg>
            <span id="auth-text">ACCOUNT</span>
        </a>
        <!-- ৪. SUPPORT (নতুন সাপোর্ট ড্রয়ার বাটন) -->
        <button onclick="openSupportModal()" class="text-black hover:text-[#D4AF37] flex flex-col items-center transition duration-200 focus:outline-none font-bold uppercase">
            <svg class="w-5 h-5 mb-1" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M18.364 5.636l-3.536 3.536m0 5.656l3.536 3.536M9.172 9.172L5.636 5.636m3.536 9.192l-3.536 3.536M21 12a9 9 0 11-18 0 9 9 0 0118 0zm-5 0a4 4 0 11-8 0 4 4 0 018 0z"/>
            </svg>
            SUPPORT
        </button>
        <!-- 5. MENU -->
        <a href="menu.html" class="text-black hover:text-[#D4AF37] flex flex-col items-center transition duration-200">
            <svg class="w-5 h-5 mb-1" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
            </svg>
            MENU
        </a>
    </div>

    <!-- SHAAM ITQAN কাস্টমার সার্ভিস ও লাইভ সাপোর্ট মডাল উইন্ডো -->
    <div id="support-modal" class="fixed inset-0 bg-black/60 backdrop-blur-sm z-[200] hidden items-center justify-center p-4">
        <div class="bg-white w-full max-w-sm p-6 rounded-xl border-2 border-[#D4AF37] shadow-2xl relative flex flex-col space-y-4">
            <button onclick="closeSupportModal()" class="absolute top-4 right-4 text-gray-400 hover:text-black transition focus:outline-none">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                </svg>
            </button>

            <div class="text-center pb-2 border-b border-gray-100">
                <h2 class="text-base font-bold tracking-widest luxury-font uppercase text-gray-800">SHAAM ITQAN Support</h2>
                <p class="text-[9px] uppercase tracking-widest text-[#C1A44E] font-bold mt-0.5">Helpline & Live Assistance</p>
            </div>

            <p class="text-gray-500 text-xs leading-relaxed text-center font-sans">
                আসসালামু আলাইকুম! SHAAM ITQAN কাস্টমার কেয়ারে আপনাকে স্বাগতম। আপনার যেকোনো জিজ্ঞাসা বা পছন্দের পণ্য অর্ডার করতে আমাদের সাথে সরাসরি যোগাযোগ করুন:
            </p>

            <div class="space-y-3 pt-2">
                <!-- ১. সরাসরি কল বাটন -->
                <a href="tel:017XXXXXXXX" id="support-call-link" class="w-full bg-[#333333] hover:bg-black text-white py-3 rounded-lg flex items-center justify-center gap-2.5 text-xs uppercase tracking-wider font-bold transition shadow-sm select-none">
                    <svg class="w-4 h-4 text-[#D4AF37]" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5a2 2 0 012-2h3.28a1 1 0 011.94.315l-1.14 4.83a1 1 0 01-.527.657l-1.9 1.2a12.04 12.04 0 005.449 5.449l1.2-1.9a1 1 0 01.657-.527l4.83 1.14a1 1 0 01.315 1.94V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"/>
                    </svg>
                    <span>Call Helpline (সরাসরি কল)</span>
                </a>

                <!-- ২. ডাইনামিক হোয়াটসঅ্যাপ চ্যাট বাটন (উইশলিস্ট পেজ রিলেটেড কাস্টম মেসেজ টেমপ্লেট) -->
                <button onclick="openWhatsAppChat()" class="w-full bg-[#25D366] hover:bg-[#1ebd54] text-white py-3 rounded-lg flex items-center justify-center gap-2.5 text-xs uppercase tracking-wider font-bold transition shadow-sm select-none">
                    <svg class="w-4 h-4 text-white fill-current" viewBox="0 0 24 24">
                        <path d="M.057 24l1.687-6.163c-1.041-1.804-1.588-3.849-1.587-5.946C.06 5.348 5.397.057 11.93.057c3.17.001 6.15 1.234 8.39 3.473a11.8 11.8 0 0 1 3.475 8.39c-.004 6.59-5.34 11.882-11.876 11.882-2.002-.001-3.972-.51-5.753-1.48L0 24zm6.59-4.846c1.6.95 3.188 1.449 4.725 1.45 5.336 0 9.69-4.32 9.693-9.627a9.55 9.55 0 0 0-2.836-6.83 9.6 9.6 0 0 0-6.84-2.825C6.012 1.122 1.657 5.442 1.654 10.75a9.5 9.5 0 0 0 1.488 4.96l-.994 3.63 3.734-.975c1.554.85 3.09 1.278 4.755 1.279z"/>
                    </svg>
                    <span>WhatsApp Support (চ্যাট করুন)</span>
                </button>

                <!-- ৩. ফেসবুক মেসেঞ্জার চ্যাট বাটন -->
                <button onclick="openMessengerChat()" class="w-full bg-[#0084FF] hover:bg-[#0074E4] text-white py-3 rounded-lg flex items-center justify-center gap-2.5 text-xs uppercase tracking-wider font-bold transition shadow-sm select-none">
                    <svg class="w-4 h-4 text-white fill-current" viewBox="0 0 24 24">
                        <path d="M12 0C5.373 0 0 4.974 0 11.111c0 3.498 1.743 6.613 4.469 8.654V24l4.032-2.214c1.113.308 2.293.475 3.499.475 6.627 0 12-4.975 12-11.111C24 4.974 18.627 0 12 0zm1.285 14.86l-2.915-3.111-5.694 3.111 6.264-6.657 2.915 3.111 5.694-3.111-6.264 6.657z"/>
                    </svg>
                    <span>Messenger Support (মেসেঞ্জার)</span>
                </button>
            </div>
        </div>
    </div>

    <script>
        // =========================================================================
        // 📌 কাস্টমার সার্ভিস ও হেল্পলাইন সেটিংস (এখানে আপনার নম্বর ও সোশ্যাল লিংক দিন)
        // =========================================================================
        const SUPPORT_HELPLINE_NUMBER = "017XXXXXXXX"; // আপনার হেল্পলাইন কল করার নম্বর
        const SUPPORT_WHATSAPP_NUMBER = "88017XXXXXXXX"; // আন্তর্জাতিক ফরম্যাটে হোয়াটসঅ্যাপ নম্বর
        const SUPPORT_MESSENGER_PAGE = "yourpageusername"; // আপনার ফেসবুক পেজের ইউজারনেম (m.me/username)
        // =========================================================================

        const user = JSON.parse(localStorage.getItem('user_session'));

        async function loadWishlist() {
            if (!user) { window.location.href = 'login.html'; return; }

            // কাস্টমার সাপোর্ট ডায়াল প্যাড লিংক সিঙ্ক
            document.getElementById('support-call-link').href = `tel:${SUPPORT_HELPLINE_NUMBER}`;

            try {
                const res = await fetch('/api/wishlist?email=' + user.email);
                const products = await res.json();
                const grid = document.getElementById('wishlist-grid');

                if (products.length === 0) {
                    grid.innerHTML = `<p class="col-span-2 text-center py-12 text-xs text-gray-400">Your wishlist is empty.</p>`;
                    return;
                }

                grid.innerHTML = products.map(p => {
                    const firstImage = (p.image_url && p.image_url.includes(',')) 
                        ? p.image_url.split(',')[0].trim() 
                        : (p.image_url ? p.image_url.trim() : 'https://via.placeholder.com/300');

                    const originalPrice = Math.round(parseFloat(p.original_price) || 0);
                    const priceDisplay = originalPrice > 0 
                        ? `<span class="line-through text-gray-400 text-[11px] mr-1.5">৳ ${originalPrice}</span> <span class="font-extrabold text-sm text-[#D4AF37]">৳ ${p.price}</span>`
                        : `<span class="font-extrabold text-sm text-[#D4AF37]">৳ ${p.price}</span>`;

                    return `
                        <div class="relative block p-2 border-2 border-[#D4AF37] rounded bg-white">
                            <button onclick="removeFromWishlist(${p.id})" class="absolute top-2 left-2 bg-white/80 backdrop-blur-sm p-1.5 rounded-full shadow-sm hover:scale-110 active:scale-95 transition duration-200 z-20 focus:outline-none">
                                <svg class="w-4 h-4 text-red-500" fill="#EF4444" stroke="#EF4444" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"/>
                                </svg>
                            </button>

                            <a href="product.html?id=${p.id}" class="block">
                                <div class="w-full aspect-[3/4] overflow-hidden rounded bg-gray-50">
                                    <img src="${firstImage}" class="w-full h-full object-cover">
                                </div>
                                <h3 class="text-xs font-bold mt-3 leading-snug text-gray-800 hover:underline tracking-wide line-clamp-2 h-8">${p.name}</h3>
                                <div class="flex items-center mt-2 pt-1 border-t border-gray-100">
                                    ${priceDisplay}
                                </div>
                            </a>
                        </div>`;
                }).join('');
            } catch (error) {
                console.error("Failed to load wishlist:", error);
            }
        }

        async function removeFromWishlist(pid) {
            try {
                const res = await fetch('/api/wishlist', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: user.email, product_id: pid })
                });
                if (res.ok) {
                    loadWishlist(); 
                }
            } catch (e) {
                console.error(e);
            }
        }

        // সাপোর্ট ড্রয়ার মডাল টগল স্ক্রিপ্ট
        function openSupportModal() {
            const modal = document.getElementById('support-modal');
            modal.classList.remove('hidden');
            modal.classList.add('flex');
        }

        function closeSupportModal() {
            const modal = document.getElementById('support-modal');
            modal.classList.add('hidden');
            modal.classList.remove('flex');
        }

        // কাস্টম উইশলিস্ট রিলেটেড ডাইনামিক হোয়াটসঅ্যাপ মেসেজ
        function openWhatsAppChat() {
            const message = "আসসালামু আলাইকুম";
            const encoded = encodeURIComponent(message);
            window.open(`https://wa.me/${SUPPORT_WHATSAPP_NUMBER}?text=${encoded}`, '_blank');
        }

        function openMessengerChat() {
            window.open(`https://m.me/${SUPPORT_MESSENGER_PAGE}`, '_blank');
        }

        document.addEventListener('DOMContentLoaded', () => {
            loadWishlist();
            if (user) {
                const authLink = document.getElementById('auth-link');
                const authText = document.getElementById('auth-text');
                if (authLink && authText) {
                    authText.innerText = 'PROFILE';
                    authLink.href = 'profile.html';
                }
            }
        });
    </script>
</body>
</html>
