<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>My Notifications | SHAAM ITQAN</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&display=swap');
        .luxury-font { font-family: 'Playfair Display', serif; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-gray-50 p-4 font-sans pb-10">

    <div class="max-w-md mx-auto">
        <!-- Header (মোবাইল ওভারল্যাপ এড়াতে ব্যাক বাটনটি কেবল আইকন করা হয়েছে এবং পারফেক্ট স্পেসিং দেওয়া হয়েছে) -->
        <div class="relative flex items-center justify-center mb-6 border-b pb-4 h-12">
            <a href="index.html" class="absolute left-0 p-1 text-gray-600 hover:text-[#D4AF37] transition focus:outline-none">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M15 19l-7-7 7-7"/>
                </svg>
            </a>
            <h1 class="text-xs font-bold tracking-widest luxury-font uppercase text-gray-800">Notifications</h1>
            
            <!-- সব নোটিফিকেশন একসাথে ডিলিট করার বাটন (Clear All) -->
            <button onclick="clearAllNotifications()" id="clear-all-btn" class="absolute right-0 text-[10px] font-bold text-red-500 uppercase tracking-widest hover:underline hidden">
                Clear All
            </button>
        </div>

        <!-- Notifications List Container -->
        <div id="notif-list" class="space-y-4">
            <p class="text-center py-10 text-gray-500">Loading notifications...</p>
        </div>
    </div>

    <!-- প্রিমিয়াম ব্যাকড্রপ ব্লার মডাল (Popup Modal) -->
    <div id="notif-modal" class="fixed inset-0 bg-black/60 backdrop-blur-sm z-[200] hidden items-center justify-center p-4">
        <div class="bg-white w-full max-w-sm p-6 rounded-xl border-2 border-[#D4AF37] shadow-2xl relative flex flex-col max-h-[85vh]">
            <!-- Close Button (X) -->
            <button onclick="closeModal()" class="absolute top-4 right-4 text-gray-400 hover:text-black transition focus:outline-none">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                </svg>
            </button>

            <!-- Modal Contents -->
            <div class="overflow-y-auto scrollbar-hide pr-1 space-y-4">
                <h2 id="modal-title" class="text-base font-bold tracking-widest luxury-font uppercase text-gray-800 border-b pb-2"></h2>
                
                <!-- প্রোমো ইমেজ রেন্ডারিং এরিয়া -->
                <img id="modal-image" class="w-full h-44 object-cover rounded border border-gray-100 hidden">
                
                <p id="modal-message" class="text-gray-500 text-xs leading-relaxed whitespace-pre-line"></p>
            </div>

            <!-- Modal Action Buttons -->
            <div class="mt-6 pt-3 border-t border-gray-100 space-y-2">
                <button id="modal-link-btn" class="w-full bg-black text-white py-3 uppercase tracking-widest text-[10px] font-bold hover:bg-[#D4AF37] transition duration-300 rounded hidden">
                    Open Link
                </button>
                <button onclick="closeModal()" class="w-full border border-gray-300 text-gray-600 py-3 uppercase tracking-widest text-[10px] font-bold hover:bg-gray-50 transition rounded">
                    Close
                </button>
            </div>
        </div>
    </div>

    <script>
        const user = JSON.parse(localStorage.getItem('user_session'));
        let allNotifications = []; 

        async function loadNotifications() {
            if (!user) { window.location.href = 'login.html'; return; }

            try {
                const res = await fetch('/api/notifications?email=' + user.email);
                allNotifications = await res.json();
                const container = document.getElementById('notif-list');
                const clearBtn = document.getElementById('clear-all-btn');

                if (allNotifications.length === 0) {
                    container.innerHTML = '<p class="text-center py-10 text-gray-500 text-sm">No notifications yet.</p>';
                    clearBtn.classList.add('hidden');
                    return;
                }

                clearBtn.classList.remove('hidden');

                // গোল্ডেন বর্ডারযুক্ত প্রফেশনাল ব্যানার কার্ড ডিজাইন
                container.innerHTML = allNotifications.map(n => {
                    const unreadClass = !n.is_read ? 'border-l-4 border-[#D4AF37]' : '';
                    
                    return `
                        <div onclick="openModal(${n.id})" class="bg-white shadow rounded-xl border-2 border-[#D4AF37] flex flex-col overflow-hidden cursor-pointer hover:shadow-md transition duration-300 ${unreadClass}">
                            <!-- বড় ব্যানার ইমেজ -->
                            ${n.image_url ? `
                                <div class="w-full h-44 overflow-hidden bg-gray-50">
                                    <img src="${n.image_url.split(',')[0].trim()}" class="w-full h-full object-cover">
                                </div>
                            ` : ''}
                            
                            <!-- নিচের ইনফো সেকশন (SEE MORE বাদ দিয়ে অত্যন্ত পরিচ্ছন্ন এলাইনমেন্ট দেওয়া হয়েছে) -->
                            <div class="p-4 flex items-center justify-between gap-4">
                                <div class="flex-grow">
                                    <h3 class="font-extrabold text-xs text-gray-800 uppercase tracking-widest leading-snug">${n.title}</h3>
                                    <span class="text-[9px] text-gray-400 font-mono block mt-1">${new Date(n.created_at).toLocaleString()}</span>
                                </div>
                                
                                <!-- ডিলিট করার জন্য চমৎকার মিনিমালিস্ট ট্র্যাশ বিন (Trash Bin) আইকন -->
                                <button onclick="event.stopPropagation(); deleteNotification(${n.id})" class="text-gray-400 hover:text-red-500 transition duration-200 p-1.5 focus:outline-none shrink-0" title="Delete Notification">
                                    <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                                    </svg>
                                </button>
                            </div>
                        </div>
                    `;
                }).join('');

                await fetch('/api/notifications', {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action: 'read_all', email: user.email })
                });
            } catch (error) {
                console.error("Failed to load notifications:", error);
            }
        }

        function openModal(id) {
            const n = allNotifications.find(item => item.id === id);
            if (!n) return;

            document.getElementById('modal-title').innerText = n.title;
            document.getElementById('modal-message').innerText = n.message;

            const modalImg = document.getElementById('modal-image');
            if (n.image_url) {
                modalImg.src = n.image_url.split(',')[0].trim();
                modalImg.classList.remove('hidden');
            } else {
                modalImg.classList.add('hidden');
            }

            const linkBtn = document.getElementById('modal-link-btn');
            if (n.link_url) {
                linkBtn.onclick = () => window.open(n.link_url, '_blank');
                linkBtn.classList.remove('hidden');
            } else {
                linkBtn.classList.add('hidden');
            }

            const modal = document.getElementById('notif-modal');
            modal.classList.remove('hidden');
            modal.classList.add('flex');
        }

        function closeModal() {
            const modal = document.getElementById('notif-modal');
            modal.classList.add('hidden');
            modal.classList.remove('flex');
        }

        async function deleteNotification(id) {
            try {
                const res = await fetch('/api/notifications', {
                    method: 'DELETE',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ id: id })
                });
                if (res.ok) {
                    loadNotifications();
                }
            } catch (error) {
                console.error(error);
            }
        }

        async function clearAllNotifications() {
            if (!confirm("Are you sure you want to delete all notifications?")) return;

            try {
                const res = await fetch('/api/notifications', {
                    method: 'DELETE',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action: 'clear_all', email: user.email })
                });
                if (res.ok) {
                    loadNotifications();
                }
            } catch (error) {
                console.error(error);
            }
        }

        document.addEventListener('DOMContentLoaded', loadNotifications);
    </script>
</body>
</html>
