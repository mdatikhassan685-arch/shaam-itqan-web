<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>My Notifications | SHAAM ITQAN</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&display=swap');
        .luxury-font { font-family: 'Playfair Display', serif; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-gray-50 p-4 font-sans pb-10">

    <div class="max-w-md mx-auto">
        <!-- Header -->
        <div class="relative flex items-center justify-center mb-6 border-b pb-3 h-10">
            <a href="index.html" class="absolute left-0 text-xs font-bold tracking-widest uppercase hover:underline flex items-center gap-1 text-gray-600">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
                </svg>
                Back
            </a>
            <h1 class="text-sm font-bold tracking-widest luxury-font uppercase">Notifications</h1>
            
            <!-- Clear All Button -->
            <button onclick="clearAllNotifications()" id="clear-all-btn" class="absolute right-0 text-[10px] font-bold text-red-500 uppercase tracking-widest hover:underline hidden">
                Clear All
            </button>
        </div>

        <!-- Notifications List Container -->
        <div id="notif-list" class="space-y-3">
            <p class="text-center py-10 text-gray-500">Loading notifications...</p>
        </div>
    </div>

    <script>
        const user = JSON.parse(localStorage.getItem('user_session'));

        async function loadNotifications() {
            if (!user) { window.location.href = 'login.html'; return; }

            try {
                const res = await fetch('/api/notifications?email=' + user.email);
                const notifications = await res.json();
                const container = document.getElementById('notif-list');
                const clearBtn = document.getElementById('clear-all-btn');

                if (notifications.length === 0) {
                    container.innerHTML = '<p class="text-center py-10 text-gray-500 text-sm">No notifications yet.</p>';
                    clearBtn.classList.add('hidden');
                    return;
                }

                clearBtn.classList.remove('hidden');

                container.innerHTML = notifications.map(n => {
                    const unreadClass = !n.is_read ? 'border-l-4 border-[#D4AF37]' : '';
                    const isLongMessage = n.message.length > 100; // ১০০ অক্ষরের বেশি হলে Read More দেখাবে

                    return `
                        <div class="bg-white p-4 shadow rounded border border-gray-100 flex justify-between items-start gap-4 transition duration-200 ${unreadClass}">
                            <div class="flex-grow">
                                <!-- টাইটেল ফন্ট বড় ও স্পষ্ট করা হয়েছে -->
                                <h3 class="font-bold text-sm text-gray-900 tracking-wide">${n.title}</h3>
                                
                                <!-- মেসেজ বডি (ডিফল্টভাবে ২ লাইনে লক থাকবে) -->
                                <p id="desc-${n.id}" class="text-gray-500 text-xs mt-1.5 leading-relaxed line-clamp-2 whitespace-pre-line">${n.message}</p>
                                
                                <!-- Read More বাটন (মেসেজ বড় হলেই কেবল এটি দেখাবে) -->
                                ${isLongMessage ? `
                                    <button onclick="toggleReadMore(${n.id})" id="btn-${n.id}" class="text-[9px] font-bold text-[#D4AF37] mt-1.5 uppercase tracking-widest focus:outline-none hover:underline block">Read More</button>
                                ` : ''}
                                
                                <span class="text-[9px] text-gray-400 font-mono block mt-2.5">${new Date(n.created_at).toLocaleString()}</span>
                            </div>
                            <!-- ডিলিট বাটন (X) -->
                            <button onclick="deleteNotification(${n.id})" class="text-gray-400 hover:text-red-500 transition focus:outline-none p-1">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                                </svg>
                            </button>
                        </div>
                    `;
                }).join('');

                await fetch('/api/notifications', {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action: 'read_all', email: user.email })
                });
            } catch (error) {
                console.error("Failed to load notifications:", error);
            }
        }

        // রিড মোর টগল ফাংশন
        function toggleReadMore(id) {
            const desc = document.getElementById(`desc-${id}`);
            const btn = document.getElementById(`btn-${id}`);
            
            if (desc.classList.contains('line-clamp-2')) {
                desc.classList.remove('line-clamp-2'); // ক্ল্যাম্প তুলে দেওয়া হলো (সম্পূর্ণ শো করবে)
                btn.innerText = "Read Less";
            } else {
                desc.classList.add('line-clamp-2');    // পুনরায় ২ লাইনে সংকুচিত করা হলো
                btn.innerText = "Read More";
            }
        }

        async function deleteNotification(id) {
            try {
                const res = await fetch('/api/notifications', {
                    method: 'DELETE',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ id: id })
                });
                if (res.ok) {
                    loadNotifications();
                }
            } catch (error) {
                console.error(error);
            }
        }

        async function clearAllNotifications() {
            if (!confirm("Are you sure you want to delete all notifications?")) return;

            try {
                const res = await fetch('/api/notifications', {
                    method: 'DELETE',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action: 'clear_all', email: user.email })
                });
                if (res.ok) {
                    loadNotifications();
                }
            } catch (error) {
                console.error(error);
            }
        }

        document.addEventListener('DOMContentLoaded', loadNotifications);
    </script>
</body>
</html>
