<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>My Notifications | SHAAM ITQAN</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&display=swap');
        .luxury-font { font-family: 'Playfair Display', serif; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-gray-50 p-4 font-sans pb-10">

    <div class="max-w-md mx-auto">
        <!-- Header -->
        <div class="relative flex items-center justify-center mb-6 border-b pb-3 h-10">
            <a href="index.html" class="absolute left-0 text-xs font-bold tracking-widest uppercase hover:underline flex items-center gap-1 text-gray-600">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
                </svg>
                Back
            </a>
            <h1 class="text-sm font-bold tracking-widest luxury-font uppercase">Notifications</h1>
            
            <button onclick="clearAllNotifications()" id="clear-all-btn" class="absolute right-0 text-[10px] font-bold text-red-500 uppercase tracking-widest hover:underline hidden">
                Clear All
            </button>
        </div>

        <!-- Notifications List Container -->
        <div id="notif-list" class="space-y-3">
            <p class="text-center py-10 text-gray-500">Loading notifications...</p>
        </div>
    </div>

    <!-- ৩ নং পয়েন্টের সমাধান: প্রিমিয়াম ব্যাকড্রপ ব্লার মডাল (Popup Modal) -->
    <div id="notif-modal" class="fixed inset-0 bg-black/60 backdrop-blur-sm z-[200] hidden items-center justify-center p-4">
        <div class="bg-white w-full max-w-sm p-6 rounded-xl border-2 border-[#D4AF37] shadow-2xl relative flex flex-col max-h-[85vh]">
            <!-- Close Button (X) -->
            <button onclick="closeModal()" class="absolute top-4 right-4 text-gray-400 hover:text-black transition focus:outline-none">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                </svg>
            </button>

            <!-- Modal Contents -->
            <div class="overflow-y-auto scrollbar-hide pr-1 space-y-4">
                <h2 id="modal-title" class="text-base font-bold tracking-widest luxury-font uppercase text-gray-800 border-b pb-2"></h2>
                
                <!-- প্রোমো ইমেজ রেন্ডারিং এরিয়া -->
                <img id="modal-image" class="w-full h-44 object-cover rounded border border-gray-100 hidden">
                
                <p id="modal-message" class="text-gray-500 text-xs leading-relaxed whitespace-pre-line"></p>
            </div>

            <!-- Modal Action Buttons (Open Link বাটন সহ) -->
            <div class="mt-6 pt-3 border-t border-gray-100 space-y-2">
                <button id="modal-link-btn" class="w-full bg-black text-white py-3 uppercase tracking-widest text-[10px] font-bold hover:bg-[#D4AF37] transition duration-300 rounded hidden">
                    Open Link
                </button>
                <button onclick="closeModal()" class="w-full border border-gray-300 text-gray-600 py-3 uppercase tracking-widest text-[10px] font-bold hover:bg-gray-50 transition rounded">
                    Close
                </button>
            </div>
        </div>
    </div>

    <script>
        const user = JSON.parse(localStorage.getItem('user_session'));
        let allNotifications = []; // গ্লোবাল নোটিফিকেশন এরে ট্র্যাকার

        async function loadNotifications() {
            if (!user) { window.location.href = 'login.html'; return; }

            try {
                const res = await fetch('/api/notifications?email=' + user.email);
                allNotifications = await res.json();
                const container = document.getElementById('notif-list');
                const clearBtn = document.getElementById('clear-all-btn');

                if (allNotifications.length === 0) {
                    container.innerHTML = '<p class="text-center py-10 text-gray-500 text-sm">No notifications yet.</p>';
                    clearBtn.classList.add('hidden');
                    return;
                }

                clearBtn.classList.remove('hidden');

                // গোল্ডেন বর্ডার ও ইমেজ থাম্বনেইলসহ কম্প্যাক্ট কার্ড ডিজাইন (See More চাপলে পপ-আপ ওপেন হবে)
                container.innerHTML = allNotifications.map(n => {
                    const unreadClass = !n.is_read ? 'border-l-4 border-[#D4AF37]' : '';
                    
                    return `
                        <div onclick="openModal(${n.id})" class="bg-white p-4 shadow rounded border-2 border-[#D4AF37] flex justify-between items-center gap-4 cursor-pointer hover:shadow-md transition duration-300 ${unreadClass}">
                            <div class="flex items-center gap-3">
                                ${n.image_url ? `<img src="${n.image_url.split(',')[0]}" class="w-10 h-10 object-cover rounded border border-gray-100">` : ''}
                                <h3 class="font-bold text-xs text-gray-800 uppercase tracking-wider line-clamp-1">${n.title}</h3>
                            </div>
                            
                            <div class="flex items-center gap-2">
                                <span class="text-[9px] font-bold text-[#D4AF37] uppercase tracking-widest shrink-0 flex items-center gap-0.5">
                                    See More
                                    <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg>
                                </span>
                                <!-- ডিলিট বাটন (মডাল ওপেন হওয়া আটকাতে event.stopPropagation() যুক্ত করা হয়েছে) -->
                                <button onclick="event.stopPropagation(); deleteNotification(${n.id})" class="text-gray-400 hover:text-red-500 transition focus:outline-none p-1">
                                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                                    </svg>
                                </button>
                            </div>
                        </div>
                    `;
                }).join('');

                await fetch('/api/notifications', {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action: 'read_all', email: user.email })
                });
            } catch (error) {
                console.error("Failed to load notifications:", error);
            }
        }

        // মডাল বা পপ-আপ ওপেন করার ফাংশন (ডাইনামিক ইমেজ ও লিংক সাপোর্ট সহ)
        function openModal(id) {
            const n = allNotifications.find(item => item.id === id);
            if (!n) return;

            document.getElementById('modal-title').innerText = n.title;
            document.getElementById('modal-message').innerText = n.message;

            const modalImg = document.getElementById('modal-image');
            if (n.image_url) {
                modalImg.src = n.image_url.split(',')[0].trim();
                modalImg.classList.remove('hidden');
            } else {
                modalImg.classList.add('hidden');
            }

            const linkBtn = document.getElementById('modal-link-btn');
            if (n.link_url) {
                linkBtn.onclick = () => window.open(n.link_url, '_blank');
                linkBtn.classList.remove('hidden');
            } else {
                linkBtn.classList.add('hidden');
            }

            // মডাল শো করানো
            const modal = document.getElementById('notif-modal');
            modal.classList.remove('hidden');
            modal.classList.add('flex');
        }

        // মডাল ক্লোজ করার ফাংশন
        function closeModal() {
            const modal = document.getElementById('notif-modal');
            modal.classList.add('hidden');
            modal.classList.remove('flex');
        }

        async function deleteNotification(id) {
            try {
                const res = await fetch('/api/notifications', {
                    method: 'DELETE',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ id: id })
                });
                if (res.ok) {
                    loadNotifications();
                }
            } catch (error) {
                console.error(error);
            }
        }

        async function clearAllNotifications() {
            if (!confirm("Are you sure you want to delete all notifications?")) return;

            try {
                const res = await fetch('/api/notifications', {
                    method: 'DELETE',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action: 'clear_all', email: user.email })
                });
                if (res.ok) {
                    loadNotifications();
                }
            } catch (error) {
                console.error(error);
            }
        }

        document.addEventListener('DOMContentLoaded', loadNotifications);
    </script>
</body>
</html>
