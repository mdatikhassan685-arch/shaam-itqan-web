<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>SHAAM ITQAN</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&display=swap');
        .luxury-font { font-family: 'Playfair Display', serif; }
        .gold-border { border: 1px solid #C1A44E; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-white text-black font-sans pb-24">

    <!-- Navbar -->
    <nav class="sticky top-0 bg-white p-4 flex justify-between items-center z-[100] border-b border-gray-100">
        <div class="relative w-10">
            <div id="hidden-trigger" class="absolute inset-0 cursor-pointer"></div>
            <img src="https://i.ibb.co.com/69gkNgD/IMG-20260425-161202.png" class="w-full">
        </div>
        <h1 class="text-lg font-bold tracking-widest luxury-font">SHAAM ITQAN</h1>
        <a href="bag.html" class="relative">
            <svg class="w-6 h-6 text-[#C1A44E]" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-width="2" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"/></svg>
            <span id="bag-count" class="absolute -top-1 -right-1 bg-black text-white text-[9px] rounded-full h-4 w-4 flex items-center justify-center">0</span>
        </a>
    </nav>

    <!-- Slider -->
    <div class="px-4 py-2">
        <div id="banner-slider" class="relative w-full h-40 bg-gray-100 rounded-lg overflow-hidden gold-border"></div>
    </div>

    <!-- Categories -->
    <div class="px-4 py-4">
        <h2 class="text-xs font-bold mb-4 uppercase tracking-widest">Popular Categories</h2>
        <div id="category-grid" class="flex gap-4 overflow-x-auto pb-4 scrollbar-hide"></div>
    </div>

    <!-- Products -->
    <main class="px-4 py-2">
        <h2 class="text-xs font-bold mb-4 uppercase tracking-widest">New Arrivals</h2>
        <div id="product-grid" class="grid grid-cols-2 gap-4"></div>
    </main>

    <!-- Bottom Nav -->
    <div class="fixed bottom-0 left-0 w-full bg-white border-t border-gray-200 flex justify-around p-3 text-[10px] uppercase font-bold text-black z-[100]">
        <a href="index.html" class="text-[#C1A44E]">HOME</a>
        <a href="#" class="text-black">CATEGORIES</a>
        <a href="login.html" id="auth-link" class="text-black">ACCOUNT</a>
    </div>

    <script>
        async function loadData() {
            try {
                // ডাটা লোড করার জন্য Promise.all
                const [bRes, cRes, pRes] = await Promise.all([
                    fetch('/api/admin-data?type=banner'),
                    fetch('/api/admin-data?type=category'),
                    fetch('/api/admin-data?type=product')
                ]);

                const banners = await bRes.json();
                const cats = await cRes.json();
                const prods = await pRes.json();

                // Render Banners
                const bContainer = document.getElementById('banner-slider');
                bContainer.innerHTML = banners.map((b, i) => `<a href="${b.link_url}" class="absolute w-full h-full transition-opacity duration-1000 ${i===0?'opacity-100':'opacity-0'}"><img src="${b.image_url}" class="w-full h-full object-cover"></a>`).join('');
                
                // Render Categories
                document.getElementById('category-grid').innerHTML = cats.map(c => `
                    <a href="${c.link_url}" class="flex-shrink-0 text-center">
                        <div class="w-16 h-16 bg-black rounded-full gold-border overflow-hidden"><img src="${c.image_url}" class="w-full h-full object-cover"></div>
                        <p class="text-[9px] mt-2 font-bold tracking-widest">${c.name}</p>
                    </a>`).join('');

                // Render Products
                document.getElementById('product-grid').innerHTML = prods.map(p => `
                    <div class="p-2 border gold-border">
                        <img src="${p.image_url}" class="w-full h-40 object-cover">
                        <h3 class="text-[11px] font-bold mt-2">${p.name}</h3>
                        <p class="font-bold text-xs text-[#C1A44E] mb-2">৳ ${p.price}</p>
                        <button onclick='addToBag(${JSON.stringify(p)})' class="w-full border border-black py-1 text-[9px] uppercase font-bold hover:bg-black hover:text-white">Add to Bag</button>
                    </div>`).join('');
            } catch (e) {
                console.log(e);
            }
        }

        // Hidden Admin Trigger
        let clicks = 0;
        document.getElementById('hidden-trigger').addEventListener('click', () => { clicks++; if(clicks===3) window.location.href='admin/admin-login.html'; });

        function addToBag(p) {
            let bag = JSON.parse(localStorage.getItem('shaam_bag')) || [];
            bag.push(p); localStorage.setItem('shaam_bag', JSON.stringify(bag));
            alert("Added to bag!"); document.getElementById('bag-count').innerText = bag.length;
        }

        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('bag-count').innerText = (JSON.parse(localStorage.getItem('shaam_bag')) || []).length;
            if(localStorage.getItem('user_session')) document.getElementById('auth-link').href = 'profile.html';
            loadData();
        });
    </script>
</body>
</html>
