<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>SHAAM ITQAN</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&display=swap');
        .luxury-font { font-family: 'Playfair Display', serif; }
        .gold-border { border: 2px solid #D4AF37; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-white text-black font-sans pb-24">

    <!-- Popup Ad -->
    <div id="popup-ad" class="hidden fixed inset-0 z-[9999] flex items-center justify-center p-4 bg-black/50">
        <div class="bg-white p-6 max-w-xs w-full relative shadow-2xl border-t-4 border-[#D4AF37]">
            <button onclick="document.getElementById('popup-ad').classList.add('hidden')" class="absolute top-2 right-2 text-xl font-bold">×</button>
            <h2 class="font-bold text-lg mb-2">অসম্পূর্ণ অর্ডার!</h2>
            <p class="text-sm mb-4">আপনার একটি অর্ডার অসম্পূর্ণ রয়ে গেছে, এখনই শেষ করুন।</p>
            <a href="checkout.html" class="block w-full bg-[#D4AF37] text-white py-3 text-center font-bold uppercase text-xs">অর্ডারটি শেষ করুন</a>
        </div>
    </div>

    <!-- Navbar -->
    <nav class="sticky top-0 bg-white p-4 flex justify-between items-center z-[100] border-b border-gray-100">
        <div class="w-10"><img src="https://i.ibb.co.com/69gkNgD/IMG-20260425-161202.png" class="w-full"></div>
        <h1 class="text-lg font-bold tracking-widest luxury-font">SHAAM ITQAN</h1>
        <a href="bag.html" class="relative">
            <svg class="w-6 h-6 text-[#D4AF37]" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-width="2" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"/></svg>
        </a>
    </nav>

    <!-- Slider -->
    <div class="px-4 py-2"><div id="banner-slider" class="flex overflow-x-auto w-full h-40 snap-x snap-mandatory scrollbar-hide scroll-smooth rounded-lg gold-border"></div></div>

    <!-- Categories -->
    <div class="px-4 py-4"><h2 class="text-xs font-bold mb-4 uppercase tracking-widest">Popular Categories</h2><div id="category-grid" class="flex gap-4 overflow-x-auto pb-4 scrollbar-hide"></div></div>

    <!-- Products -->
    <main class="px-4 py-2"><h2 class="text-xs font-bold mb-4 uppercase tracking-widest">New Arrivals</h2><div id="product-grid" class="grid grid-cols-2 gap-4"></div></main>

    <!-- Bottom Nav -->
    <div class="fixed bottom-0 left-0 w-full bg-white border-t border-gray-200 flex justify-around p-3 text-[10px] uppercase font-bold text-black z-[100]">
        <a href="index.html" class="text-[#D4AF37] flex flex-col items-center">HOME</a>
        <a href="#" class="text-black flex flex-col items-center">FAV</a>
        <a href="login.html" id="auth-link" class="text-black flex flex-col items-center">ACCOUNT</a>
        <a href="#" class="text-black flex flex-col items-center">MENU</a>
    </div>
    <script>
    function updateAuthUI() {
        const authLink = document.getElementById('auth-link');
        const user = localStorage.getItem('user_session');

        if (user) {
            // যদি লগইন করা থাকে
            authLink.innerHTML = `<span class="flex flex-col items-center">PROFILE</span>`;
            authLink.href = "profile.html";
        } else {
            // যদি লগইন করা না থাকে
            authLink.innerHTML = `<span class="flex flex-col items-center">ACCOUNT</span>`;
            authLink.href = "login.html";
        }
    }

    async function loadData() {
        try {
            const [bRes, cRes, pRes] = await Promise.all([
                fetch('/api/admin-data?type=banner'), 
                fetch('/api/admin-data?type=category'), 
                fetch('/api/admin-data?type=product')
            ]);
            const banners = await bRes.json(); 
            const cats = await cRes.json(); 
            const prods = await pRes.json();

            document.getElementById('banner-slider').innerHTML = banners.map(b => `<a href="${b.link_url}" class="flex-shrink-0 w-full h-full snap-center"><img src="${b.image_url}" class="w-full h-full object-cover"></a>`).join('');
            document.getElementById('category-grid').innerHTML = cats.map(c => `<a href="${c.link_url}" class="flex-shrink-0 text-center"><div class="w-16 h-16 bg-black rounded-full border-2 border-[#D4AF37] overflow-hidden flex items-center justify-center"><img src="${c.image_url}" class="w-full h-full object-cover"></div><p class="text-[9px] mt-2 font-bold">${c.name}</p></a>`).join('');
            
            document.getElementById('product-grid').innerHTML = prods.map(p => `
    <div class="p-2 border-2 border-[#D4AF37]">
        <!-- ইমেজ ক্লিক করলে ডিটেইলস পেজে যাবে -->
        <img src="${p.image_url}" class="w-full h-40 object-cover" onclick="window.location.href='product.html?id=${p.id}'">
        
        <h3 class="text-[11px] font-bold mt-2 truncate cursor-pointer" onclick="window.location.href='product.html?id=${p.id}'">${p.name}</h3>
        <p class="font-bold text-xs text-[#D4AF37] mb-2">৳ ${p.price}</p>
        
        <!-- Add to Bag বাটন -->
        <button onclick='addToBagFromHome(${JSON.stringify(p)})' class="w-full bg-black text-white py-1 text-[9px] uppercase font-bold hover:bg-[#D4AF37] transition">Add to Bag</button>
    </div>`).join('');

// হোম পেজ থেকে সরাসরি ব্যাগে যোগ করার ফাংশন
async function addToBagFromHome(p) {
    const user = JSON.parse(localStorage.getItem('user_session'));
    if (!user) { window.location.href = 'login.html'; return; }
    
    await fetch('/api/orders', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ 
            action: 'add_to_cart', 
            email: user.email, 
            products: p.name, 
            total_price: p.price, 
            image_url: p.image_url 
        })
    });
    alert("Added to Bag!");
}

    async function checkIncomplete() {
        if (sessionStorage.getItem('popup_shown')) return;
        const res = await fetch('/api/orders?status=Checkout_Pending');
        const orders = await res.json();
        if(orders.length > 0) {
            document.getElementById('popup-ad').classList.remove('hidden');
            sessionStorage.setItem('popup_shown', 'true');
            setTimeout(() => { document.getElementById('popup-ad').classList.add('hidden'); }, 3000);
        }
    }

    document.addEventListener('DOMContentLoaded', () => { 
        updateAuthUI(); // ইউজার চেক করা হচ্ছে
        loadData(); 
        checkIncomplete();
    });
</script>
</body>
</html>
