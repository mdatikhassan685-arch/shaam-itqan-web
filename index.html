<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>SHAAM ITQAN</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&display=swap');
        .luxury-font { font-family: 'Playfair Display', serif; }
        .gold-border { border: 1px solid #C1A44E; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-white text-black font-sans pb-24">
    <nav class="sticky top-0 bg-white p-4 flex justify-between items-center z-[100] border-b border-gray-100">
        <div class="relative w-10">
            <div id="hidden-trigger" class="absolute inset-0 cursor-pointer"></div>
            <img src="https://i.ibb.co.com/69gkNgD/IMG-20260425-161202.png" class="w-full">
        </div>
        <h1 class="text-lg font-bold tracking-widest luxury-font">SHAAM ITQAN</h1>
        <a href="bag.html" class="relative">
            <svg class="w-6 h-6 text-[#C1A44E]" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-width="2" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"/></svg>
            <span id="bag-count" class="absolute -top-1 -right-1 bg-black text-white text-[9px] rounded-full h-4 w-4 flex items-center justify-center">0</span>
        </a>
    </nav>

    <div id="banner-slider" class="relative w-full h-40 bg-gray-100 overflow-hidden gold-border"></div>
    <div class="px-4 py-4"><h2 class="text-sm font-bold mb-4 uppercase tracking-widest">Popular Categories</h2><div id="category-grid" class="flex gap-4 overflow-x-auto pb-4 scrollbar-hide"></div></div>
    <main class="px-4"><h2 class="text-sm font-bold mb-4 uppercase tracking-widest">New Arrivals</h2><div id="product-grid" class="grid grid-cols-2 gap-4"></div></main>

    <script>
        async function loadData() {
            // Fetch Banners
            fetch('/api/admin-data?type=banner').then(r => r.json()).then(data => {
                document.getElementById('banner-slider').innerHTML = data.map((b,i) => `<a href="${b.link_url}"><img src="${b.image_url}" class="absolute w-full h-full object-cover transition-opacity duration-1000 ${i===0?'opacity-100':'opacity-0'}"></a>`).join('');
            });
            // Fetch Categories
            fetch('/api/admin-data?type=category').then(r => r.json()).then(data => {
                document.getElementById('category-grid').innerHTML = data.map(c => `<a href="${c.link_url}" class="flex-shrink-0 text-center"><div class="w-20 h-20 bg-black rounded-full gold-border overflow-hidden"><img src="${c.image_url}" class="w-full h-full object-cover"></div><p class="text-[10px] mt-2 font-bold">${c.name}</p></a>`).join('');
            });
            // Fetch Products
            fetch('/api/admin-data?type=product').then(r => r.json()).then(data => {
                document.getElementById('product-grid').innerHTML = data.map(p => `
                    <div class="p-2 border gold-border"><img src="${p.image_url}" class="w-full h-40 object-cover"><h3 class="text-xs font-semibold mt-2">${p.name}</h3><p class="font-bold text-sm text-[#C1A44E]">৳ ${p.price}</p><button onclick='addToBag(${JSON.stringify(p)})' class="w-full mt-2 border border-black py-1 text-[10px] uppercase font-bold hover:bg-black hover:text-white transition">Add to Bag</button></div>`).join('');
            });
        }
        document.getElementById('hidden-trigger').addEventListener('click', () => { window.location.href='admin/admin-login.html'; });
        function addToBag(p) { let b = JSON.parse(localStorage.getItem('shaam_bag'))||[]; b.push(p); localStorage.setItem('shaam_bag', JSON.stringify(b)); alert("Added!"); document.getElementById('bag-count').innerText = b.length; }
        loadData();
    </script>
</body>
</html>
