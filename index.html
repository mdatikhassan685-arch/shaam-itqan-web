<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>SHAAM ITQAN</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&display=swap');
        .luxury-font { font-family: 'Playfair Display', serif; }
        .gold-border { border: 2px solid #D4AF37; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-white text-black font-sans pb-20">

    <!-- Navbar -->
    <nav class="sticky top-0 bg-white p-4 flex justify-between items-center z-[100] border-b border-gray-100">
        <div class="relative w-10">
            <div id="hidden-trigger" class="absolute inset-0 cursor-pointer z-50"></div>
            <img src="https://i.ibb.co.com/69gkNgD/IMG-20260425-161202.png" class="w-full object-contain">
        </div>
        <h1 class="text-lg font-bold tracking-widest luxury-font">SHAAM ITQAN</h1>
        <a href="bag.html" class="relative">
            <svg class="w-6 h-6 text-[#D4AF37]" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-width="2" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"/></svg>
            <span id="bag-count" class="absolute -top-1 -right-1 bg-black text-white text-[9px] rounded-full h-4 w-4 flex items-center justify-center">0</span>
        </a>
    </nav>

    <!-- Auto Slide Banner -->
    <div class="px-4 py-2">
        <div id="banner-slider" class="flex overflow-x-auto w-full h-40 snap-x snap-mandatory scrollbar-hide scroll-smooth rounded-lg gold-border">
            <p class="text-center mt-16 w-full text-xs text-gray-400">Loading Banners...</p>
        </div>
    </div>

    <!-- Categories & Products -->
    <div class="px-4 py-4"><h2 class="text-xs font-bold mb-4 uppercase tracking-widest">Categories</h2><div id="category-grid" class="flex gap-4 overflow-x-auto pb-4 scrollbar-hide"></div></div>
    <main class="px-4 py-2"><h2 class="text-xs font-bold mb-4 uppercase tracking-widest">New Arrivals</h2><div id="product-grid" class="grid grid-cols-2 gap-4"></div></main>

    <!-- Bottom Navigation -->
    <div class="fixed bottom-0 left-0 w-full bg-white border-t border-gray-200 flex justify-around p-3 z-[100]">
        <a href="index.html" class="flex flex-col items-center text-[#D4AF37] text-[9px] font-bold"><svg class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>HOME</a>
        <a href="#" class="flex flex-col items-center text-black text-[9px] font-bold"><svg class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-width="2" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"/></svg>FAV</a>
        <a href="login.html" id="auth-link" class="flex flex-col items-center text-black text-[9px] font-bold"><svg class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>ACCOUNT</a>
        <a href="#" class="flex flex-col items-center text-black text-[9px] font-bold"><svg class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-width="2" d="M4 6h16M4 10h16M4 14h16M4 18h16"/></svg>MENU</a>
    </div>

    <script>
        async function loadData() {
            const [bRes, cRes, pRes] = await Promise.all([fetch('/api/admin-data?type=banner'), fetch('/api/admin-data?type=category'), fetch('/api/admin-data?type=product')]);
            const banners = await bRes.json(); const cats = await cRes.json(); const prods = await pRes.json();
            
            const container = document.getElementById('banner-slider');
            container.innerHTML = banners.map(b => `<a href="${b.link_url}" class="flex-shrink-0 w-full h-full snap-center"><img src="${b.image_url}" class="w-full h-full object-cover"></a>`).join('');
            
            // Auto Slide Logic (5 seconds)
            let current = 0; setInterval(() => {
                const imgs = container.querySelectorAll('a');
                if(imgs.length > 0) {
                    current = (current + 1) % imgs.length;
                    container.scrollTo({ left: imgs[current].offsetLeft, behavior: 'smooth' });
                }
            }, 5000);

            document.getElementById('category-grid').innerHTML = cats.map(c => `<a href="${c.link_url}" class="flex-shrink-0 text-center"><div class="w-16 h-16 bg-black rounded-full border border-[#D4AF37] overflow-hidden flex items-center justify-center"><img src="${c.image_url}" class="w-full h-full object-cover"></div><p class="text-[9px] mt-2 font-bold">${c.name}</p></a>`).join('');
            document.getElementById('product-grid').innerHTML = prods.map(p => `<div class="p-2 border-2 border-[#D4AF37] cursor-pointer" onclick="window.location.href='product.html?id=${p.id}'"><img src="${p.image_url}" class="w-full h-40 object-cover"><h3 class="text-[11px] font-bold mt-2 truncate">${p.name}</h3><p class="font-bold text-xs text-[#D4AF37] mb-2">৳ ${p.price}</p><button onclick='event.stopPropagation(); addToBag(${JSON.stringify(p)})' class="w-full border border-black py-1 text-[9px] uppercase font-bold hover:bg-black hover:text-white transition">Add to Bag</button></div>`).join('');
        }
        document.getElementById('hidden-trigger').addEventListener('click', () => { let clicks=0; return () => { clicks++; if(clicks===3) window.location.href='admin/admin-login.html'; } }());
        function addToBag(p) { let bag = JSON.parse(localStorage.getItem('shaam_bag')) || []; bag.push(p); localStorage.setItem('shaam_bag', JSON.stringify(bag)); alert("Added to bag!"); document.getElementById('bag-count').innerText = bag.length; }
        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('bag-count').innerText = (JSON.parse(localStorage.getItem('shaam_bag')) || []).length;
            if(localStorage.getItem('user_session')) { document.getElementById('auth-link').href = 'profile.html'; document.getElementById('auth-link').innerHTML = '<svg class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>PROFILE'; }
            loadData();
        });
    </script>
</body>
</html>
