<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shaam Itqan</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">

    <!-- Navbar -->
    <nav class="bg-orange-600 p-4 text-white shadow-lg flex justify-between items-center">
        <h1 class="text-xl font-bold">Shaam Itqan</h1>
        <div class="text-xl">🛒</div>
    </nav>

    <!-- Product Container -->
    <main class="p-4">
        <div id="product-grid" class="grid grid-cols-2 md:grid-cols-4 gap-4">
            <!-- এখানে জাভাস্ক্রিপ্ট ডাটা লোড করবে -->
            <p class="text-gray-500">Loading products from database...</p>
        </div>
    </main>

    <script>
        async function fetchProducts() {
            try {
                const response = await fetch('/api/get-products');
                const products = await response.json();
                const grid = document.getElementById('product-grid');
                
                grid.innerHTML = ''; // আগের সব কিছু মুছে পরিষ্কার করে ফেলা

                products.forEach(product => {
                    grid.innerHTML += `
                        <div class="bg-white p-3 rounded-lg shadow">
                            <img src="${product.image_url}" alt="${product.name}" class="w-full h-32 object-cover rounded">
                            <h3 class="font-semibold mt-2 text-sm">${product.name}</h3>
                            <p class="text-orange-600 font-bold">৳ ${product.price}</p>
                            <button class="w-full bg-orange-600 text-white py-1 mt-2 rounded text-sm hover:bg-orange-700">Add to Cart</button>
                        </div>
                    `;
                });
            } catch (error) {
                document.getElementById('product-grid').innerHTML = '<p class="text-red-500">Error loading products.</p>';
            }
        }

        fetchProducts();
    </script>
</body>
</html>
