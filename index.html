<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shaam Itqan - Official Store</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">

    <!-- Navbar -->
    <nav class="bg-white p-4 shadow-md flex justify-between items-center sticky top-0 z-50">
        <h1 class="text-xl font-bold text-orange-600">Shaam Itqan</h1>
        <div class="text-2xl">🛒</div>
    </nav>

    <!-- Product Grid -->
    <main class="p-4">
        <div id="product-grid" class="grid grid-cols-2 md:grid-cols-4 gap-4">
            <!-- Loading Text -->
            <p class="col-span-2 md:col-span-4 text-center py-10">Loading products...</p>
        </div>
    </main>

    <script>
        async function fetchProducts() {
            try {
                const response = await fetch('/api/get-products');
                const products = await response.json();
                
                const grid = document.getElementById('product-grid');
                grid.innerHTML = ''; // খালি করে নেওয়া

                if (products.length === 0) {
                    grid.innerHTML = '<p>No products found.</p>';
                    return;
                }

                products.forEach(product => {
                    grid.innerHTML += `
                        <div class="bg-white p-3 rounded-lg shadow hover:shadow-lg transition">
                            <img src="${product.image_url}" alt="${product.name}" class="w-full h-40 object-cover rounded-md">
                            <h3 class="font-semibold mt-2 text-sm">${product.name}</h3>
                            <p class="text-orange-600 font-bold">৳ ${product.price}</p>
                            <button class="w-full bg-orange-600 text-white py-1.5 mt-2 rounded text-sm hover:bg-orange-700">Add to Cart</button>
                        </div>
                    `;
                });
            } catch (error) {
                console.error('Error:', error);
                document.getElementById('product-grid').innerHTML = '<p>Something went wrong!</p>';
            }
        }

        fetchProducts();
    </script>
</body>
</html>
