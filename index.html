<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shaam Itqan</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">
    <nav class="bg-orange-600 p-4 text-white flex justify-between items-center">
        <h1 class="font-bold">Shaam Itqan</h1>
        <a href="bag.html">Bag (<span id="bag-count">0</span>)</a>
    </nav>
    <div id="product-grid" class="grid grid-cols-2 p-4 gap-4"></div>
    <script>
        fetch('/api/product').then(r => r.json()).then(data => {
            document.getElementById('product-grid').innerHTML = data.map(p => `
                <div class="bg-white p-2 rounded shadow">
                    <img src="${p.image_url}" class="w-full h-32 object-cover">
                    <h3>${p.name}</h3><p>৳ ${p.price}</p>
                    <button onclick='addToBag(${JSON.stringify(p)})' class="bg-orange-600 text-white w-full rounded">Add to Bag</button>
                </div>`).join('');
        });
        function addToBag(p) {
            let b = JSON.parse(localStorage.getItem('shaam_bag') || '[]');
            b.push(p);
            localStorage.setItem('shaam_bag', JSON.stringify(b));
            document.getElementById('bag-count').innerText = b.length;
        }
    </script>
</body>
</html>
