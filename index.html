<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>SHAAM ITQAN</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&display=swap');
        .luxury-font { font-family: 'Playfair Display', serif; }
        .gold-border { border: 2px solid #D4AF37; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-white text-black font-sans pb-24">

    <!-- Navbar -->
    <nav class="sticky top-0 bg-white p-4 flex justify-between items-center z-[100] border-b border-gray-100">
        <div class="w-10"><img src="https://i.ibb.co.com/69gkNgD/IMG-20260425-161202.png" class="w-full"></div>
        <h1 class="text-lg font-bold tracking-widest luxury-font text-gray-900">SHAAM ITQAN</h1>
        
        <div class="flex items-center gap-3.5">
            <!-- নোটিফিকেশন বেল আইকন -->
            <a href="notifications.html" class="relative focus:outline-none">
                <svg class="w-7 h-7 text-[#D4AF37]" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9" />
                </svg>
                <span id="notif-count-badge" class="absolute -top-0.5 -right-0.5 bg-red-500 text-white text-[8px] font-bold w-4 h-4 rounded-full flex items-center justify-center border border-white hidden">0</span>
            </a>

            <!-- ব্যাগ বা কার্ট আইকন -->
            <a href="bag.html" class="relative">
                <svg class="w-7 h-7 text-[#D4AF37]" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-width="2" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"/></svg>
                <span id="bag-count-badge" class="absolute -top-0.5 -right-1 bg-red-500 text-white text-[8px] font-bold w-4 h-4 rounded-full flex items-center justify-center border border-white hidden">0</span>
            </a>
        </div>
    </nav>

    <!-- লাইভ সার্চ বার -->
    <div class="px-4 py-2">
        <div class="relative flex items-center">
            <input type="text" id="search-input" oninput="searchProducts()" placeholder="Search T-shirts..." class="w-full p-2.5 pl-10 pr-4 border-2 border-gray-100 rounded-lg text-sm focus:outline-none focus:border-[#D4AF37] transition duration-200 bg-gray-50 font-sans">
            <div class="absolute left-3.5 text-gray-400">
                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                </svg>
            </div>
        </div>
    </div>

    <!-- Slider -->
    <div class="px-4 py-2"><div id="banner-slider" class="flex overflow-x-auto w-full h-40 snap-x snap-mandatory scrollbar-hide scroll-smooth rounded-lg gold-border"></div></div>

    <!-- Categories -->
    <div class="px-4 py-4">
        <h2 class="text-xs font-bold mb-4 uppercase tracking-widest text-gray-700">Popular Categories</h2>
        <div id="category-grid" class="flex gap-4 overflow-x-auto pb-4 scrollbar-hide"></div>
    </div>

    <!-- Products -->
    <main class="px-4 py-2">
        <h2 id="product-section-title" class="text-xs font-bold mb-4 uppercase tracking-widest text-gray-700">New Arrivals</h2>
        <div id="product-grid" class="grid grid-cols-2 gap-4"></div>
    </main>

    <!-- Bottom Nav -->
    <div class="fixed bottom-0 left-0 w-full bg-white border-t border-gray-200 flex justify-around p-3 text-[10px] uppercase font-bold text-black z-[100]">
        <a href="index.html" class="text-[#D4AF37] flex flex-col items-center">
            <svg class="w-5 h-5 mb-1 text-[#D4AF37]" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/>
            </svg>
            HOME
        </a>
        <a href="wishlist.html" class="text-black hover:text-[#D4AF37] flex flex-col items-center transition">
            <svg class="w-5 h-5 mb-1" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"/>
            </svg>
            WISHLIST
        </a>
        <a href="login.html" id="auth-link" class="text-black hover:text-[#D4AF37] flex flex-col items-center transition">
            <svg class="w-5 h-5 mb-1" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
            </svg>
            <span id="auth-text">ACCOUNT</span>
        </a>
        <a href="menu.html" class="text-black hover:text-[#D4AF37] flex flex-col items-center transition">
            <svg class="w-5 h-5 mb-1" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
            </svg>
            MENU
        </a>
    </div>

    <script>
        let allProducts = [];       
        let categoriesData = [];    
        let activeCategory = 'All'; 
        let wishlistIds = [];       
        let bannerInterval; // অটো-প্লে ব্যানার ট্র্যাকার ভেরিয়েবল

        async function loadData() {
            try {
                const [bRes, cRes, pRes] = await Promise.all([
                    fetch('/api/admin-data?type=banner'), 
                    fetch('/api/admin-data?type=category'), 
                    fetch('/api/admin-data?type=product')
                ]);
                const banners = await bRes.json(); 
                categoriesData = await cRes.json(); 
                allProducts = await pRes.json(); 
                
                document.getElementById('banner-slider').innerHTML = banners.map(b => `<a href="${b.link_url}" class="flex-shrink-0 w-full h-full snap-center"><img src="${b.image_url}" class="w-full h-full object-cover"></a>`).join('');
                
                // ব্যানার সফলভাবে লোড হওয়ার পর অটো-প্লে রান করা
                startBannerAutoPlay();

                renderCategoryGrid();
                renderProductGrid(allProducts);

                const user = JSON.parse(localStorage.getItem('user_session'));
                if (user) {
                    updateBagCount(user.email);
                    updateNotificationCount(user.email); 
                    await loadWishlistIds(user.email); 
                }
            } catch(e) { console.log(e); }
        }

        // ব্যানার ৫ সেকেন্ড পর পর স্বয়ংক্রিয় এবং মসৃণভাবে স্লাইড হওয়ার লজিক
        function startBannerAutoPlay() {
            const slider = document.getElementById('banner-slider');
            if (!slider) return;

            // ডুপ্লিকেট ইন্টারভাল এড়াতে আগে ক্লিয়ার করা হচ্ছে
            if (bannerInterval) clearInterval(bannerInterval);

            bannerInterval = setInterval(() => {
                const totalWidth = slider.scrollWidth;
                const visibleWidth = slider.clientWidth;
                const currentScroll = slider.scrollLeft;

                // যদি শেষ ব্যানারে পৌঁছায় তবে শুরুতে (০) যাবে, নাহলে পরের ব্যানারে স্ক্রল করবে
                if (currentScroll + visibleWidth >= totalWidth - 5) {
                    slider.scrollTo({ left: 0, behavior: 'smooth' });
                } else {
                    slider.scrollTo({ left: currentScroll + visibleWidth, behavior: 'smooth' });
                }
            }, 5000); // ৫ সেকেন্ড
        }

        async function updateBagCount(email) {
            try {
                const res = await fetch('/api/bag?email=' + email);
                if (res.ok) {
                    const cartItems = await res.json();
                    const uniqueQty = cartItems.length; 
                    
                    const badge = document.getElementById('bag-count-badge');
                    if (uniqueQty > 0) {
                        badge.innerText = uniqueQty;
                        badge.classList.remove('hidden'); 
                    } else {
                        badge.classList.add('hidden');    
                    }
                }
            } catch (e) {
                console.error("Failed to update bag count:", e);
            }
        }

        async function updateNotificationCount(email) {
            try {
                const res = await fetch(`/api/user-hub?action=get_notifications&email=${email}`);
                if (res.ok) {
                    const notifs = await res.json();
                    const unreadCount = notifs.filter(n => !n.is_read).length;
                    
                    const badge = document.getElementById('notif-count-badge');
                    if (unreadCount > 0) {
                        badge.innerText = unreadCount;
                        badge.classList.remove('hidden'); 
                    } else {
                        badge.classList.add('hidden');    
                    }
                }
            } catch (e) {
                console.error("Failed to update notification count:", e);
            }
        }

        async function loadWishlistIds(email) {
            try {
                const res = await fetch('/api/wishlist?email=' + email);
                if (res.ok) {
                    const items = await res.json();
                    wishlistIds = items.map(item => item.id); 
                    updateHeartIcons();
                }
            } catch (error) {
                console.error(error);
            }
        }

        function updateHeartIcons() {
            wishlistIds.forEach(id => {
                const icon = document.getElementById(`heart-icon-${id}`);
                if (icon) {
                    icon.setAttribute('fill', '#EF4444');
                    icon.setAttribute('stroke', '#EF4444');
                    icon.classList.remove('text-gray-400');
                    icon.classList.add('text-red-500');
                }
            });
        }

        async function toggleWishlist(pid) {
            const user = JSON.parse(localStorage.getItem('user_session'));
            if (!user) { alert("Please login first!"); window.location.href = 'login.html'; return; }

            try {
                const res = await fetch('/api/wishlist', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: user.email, product_id: pid })
                });
                const data = await res.json();
                
                const icon = document.getElementById(`heart-icon-${pid}`);
                const countSpan = document.getElementById(`heart-count-${pid}`);
                let currentCount = parseInt(countSpan.innerText) || 0;

                if (data.status === 'Added') {
                    icon.setAttribute('fill', '#EF4444');
                    icon.setAttribute('stroke', '#EF4444');
                    icon.classList.remove('text-gray-400');
                    icon.classList.add('text-red-500');
                    countSpan.innerText = currentCount + 1;
                } else {
                    icon.setAttribute('fill', 'none');
                    icon.setAttribute('stroke', 'currentColor');
                    icon.classList.remove('text-red-500');
                    icon.classList.add('text-gray-400');
                    countSpan.innerText = Math.max(0, currentCount - 1);
                }
            } catch (e) {
                console.error(e);
            }
        }

        function renderCategoryGrid() {
            const container = document.getElementById('category-grid');
            const isAllActive = activeCategory === 'All';
            let catHTML = `
                <button onclick="filterProducts('All')" class="flex-shrink-0 w-24 h-32 bg-white rounded-xl border-2 ${isAllActive ? 'border-[#D4AF37]' : 'border-gray-100'} shadow flex flex-col overflow-hidden focus:outline-none transition duration-300">
                    <div class="w-full h-24 overflow-hidden bg-black p-3.5 flex items-center justify-center">
                        <img src="https://i.ibb.co.com/69gkNgD/IMG-20260425-161202.png" class="w-full h-full object-contain">
                    </div>
                    <div class="flex-grow flex items-center justify-center p-1 bg-white">
                        <p class="text-[10px] font-bold ${isAllActive ? 'text-[#D4AF37]' : 'text-gray-500'} uppercase tracking-wide leading-none">ALL PRODUCT</p>
                    </div>
                </button>
            `;

            catHTML += categoriesData.map(c => {
                const isActive = activeCategory.toLowerCase() === c.name.toLowerCase();
                return `
                    <button onclick="filterProducts('${c.name}')" class="flex-shrink-0 w-24 h-32 bg-white rounded-xl border-2 ${isActive ? 'border-[#D4AF37]' : 'border-gray-100'} shadow flex flex-col overflow-hidden focus:outline-none transition duration-300">
                        <div class="w-full h-24 overflow-hidden bg-gray-50">
                            <img src="${c.image_url}" class="w-full h-full object-cover">
                        </div>
                        <div class="flex-grow flex items-center justify-center p-1 bg-white">
                            <p class="text-[11px] font-bold ${isActive ? 'text-[#D4AF37]' : 'text-gray-800'} uppercase tracking-wide leading-none">${c.name}</p>
                        </div>
                    </button>
                `;
            }).join('');
            
            container.innerHTML = catHTML;
        }

        function renderProductGrid(productsToRender) {
            const grid = document.getElementById('product-grid');
            if (productsToRender.length === 0) {
                grid.innerHTML = `<p class="col-span-2 text-center py-10 text-xs text-gray-400">No products found.</p>`;
                return;
            }

            grid.innerHTML = productsToRender.map(p => {
                const images = p.image_url.split(',');
                const firstImage = images[0] ? images[0].trim() : 'https://via.placeholder.com/300';

                const s_s = parseInt(p.stock_s) || 0;
                const s_m = parseInt(p.stock_m) || 0;
                const s_l = parseInt(p.stock_l) || 0;
                const s_xl = parseInt(p.stock_xl) || 0;
                const s_xxl = parseInt(p.stock_xxl) || 0;

                const totalStock = s_s + s_m + s_l + s_xl + s_xxl;
                
                let badge = "";
                let cardLink = `product.html?id=${p.id}`;

                if (totalStock <= 0) {
                    badge = `<span class="absolute top-0 right-0 bg-red-600 text-white text-[9px] font-bold px-2 py-1 uppercase tracking-wider rounded-tr-[2px] rounded-bl shadow-sm z-10">Sold Out</span>`;
                } else if (p.tag && p.tag !== 'none') {
                    let badgeBg = "bg-black";
                    if (p.tag === 'Best Sale') badgeBg = "bg-red-800";
                    if (p.tag === 'Available') badgeBg = "bg-green-600";
                    if (p.tag === 'New Arrival') badgeBg = "bg-teal-600";
                    if (p.tag === 'Hot Sale') badgeBg = "bg-orange-600";
                    if (p.tag === 'Coming Soon') badgeBg = "bg-blue-600";

                    badge = `<span class="absolute top-0 right-0 ${badgeBg} text-white text-[9px] font-bold px-2 py-1 uppercase tracking-wider rounded-tr-[2px] rounded-bl shadow-sm z-10">${p.tag}</span>`;
                }

                const originalPrice = Math.round(parseFloat(p.original_price) || 0);
                const priceDisplay = originalPrice > 0 
                    ? `<span class="line-through text-gray-400 text-[11px] mr-1.5">৳ ${originalPrice}</span> <span class="font-extrabold text-sm text-[#D4AF37]">৳ ${p.price}</span>`
                    : `<span class="font-extrabold text-sm text-[#D4AF37]">৳ ${p.price}</span>`;

                return `
                    <div class="relative block p-2 border-2 border-[#D4AF37] hover:shadow-md transition rounded bg-white">
                        ${badge}
                        
                        <button onclick="event.stopPropagation(); event.preventDefault(); toggleWishlist(${p.id})" class="absolute top-4 left-4 bg-white/85 backdrop-blur-sm p-1.5 rounded-full shadow hover:scale-110 active:scale-95 transition duration-200 z-20 focus:outline-none flex items-center gap-1">
                            <svg id="heart-icon-${p.id}" class="w-4 h-4 text-gray-400 hover:text-red-500 transition" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"/>
                            </svg>
                            <span id="heart-count-${p.id}" class="text-[9px] font-bold text-gray-500 font-sans">${p.wishlist_count || 0}</span>
                        </button>

                        <a href="${cardLink}" class="block">
                            <div class="w-full aspect-[3/4] overflow-hidden rounded bg-gray-50">
                                <img src="${firstImage}" class="w-full h-full object-cover">
                            </div>
                            <h3 class="text-xs font-bold mt-3 leading-snug text-gray-800 hover:text-[#D4AF37] tracking-wide line-clamp-2 h-8">${p.name}</h3>
                            <div class="flex items-center gap-2 mt-2 pt-1 border-t border-gray-100">
                                ${priceDisplay}
                            </div>
                        </a>
                    </div>`;
            }).join('');
        }

        function filterProducts(categoryName) {
            const sectionTitle = document.getElementById('product-section-title');
            document.getElementById('search-input').value = "";

            activeCategory = categoryName; 
            renderCategoryGrid();          

            if (categoryName === 'All') {
                sectionTitle.innerText = "New Arrivals";
                renderProductGrid(allProducts);
            } else {
                sectionTitle.innerText = categoryName;
                const filtered = allProducts.filter(p => p.category && p.category.toLowerCase() === categoryName.toLowerCase());
                renderProductGrid(filtered);
            }
            updateHeartIcons(); 
        }

        function searchProducts() {
            const query = document.getElementById('search-input').value.trim().toLowerCase();
            const sectionTitle = document.getElementById('product-section-title');
            
            if (query === "") {
                sectionTitle.innerText = "New Arrivals";
                renderProductGrid(allProducts);
            } else {
                sectionTitle.innerText = `Search results for "${query}"`;
                const filtered = allProducts.filter(p => 
                    p.name.toLowerCase().includes(query) || 
                    (p.description && p.description.toLowerCase().includes(query)) ||
                    (p.category && p.category.toLowerCase().includes(query))
                );
                renderProductGrid(filtered);
            }
            updateHeartIcons(); 
        }

        document.addEventListener('DOMContentLoaded', () => { 
            loadData(); 
            
            if (localStorage.getItem('user_session')) {
                const authLink = document.getElementById('auth-link');
                const authText = document.getElementById('auth-text');
                if (authLink && authText) {
                    authText.innerText = 'PROFILE';
                    authLink.href = 'profile.html';
                }
                
                const userObj = JSON.parse(localStorage.getItem('user_session'));
                updateBagCount(userObj.email);
                updateNotificationCount(userObj.email); 
            }
        });
    </script>
</body>
</html>
