<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>SHAAM ITQAN</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&display=swap');
        .luxury-font { font-family: 'Playfair Display', serif; }
    </style>
</head>
<body class="bg-[#FDF8EF] text-[#333333] font-serif">

    <!-- Navbar -->
    <nav class="p-3 flex justify-between items-center border-b border-[#C1A44E] bg-[#FDF8EF]">
        <div class="w-10">
            <img src="https://i.ibb.co.com/69gkNgD/IMG-20260425-161202.png" alt="Logo" class="w-full">
        </div>
        <h1 class="text-lg font-bold tracking-widest luxury-font">SHAAM ITQAN</h1>
        <div class="flex items-center gap-3">
            <a id="auth-link" href="login.html" class="text-[10px] uppercase font-bold border-b border-[#333333]">Login</a>
            <a href="bag.html" class="relative">
                <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-width="1.5" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z" /></svg>
                <span id="bag-count" class="absolute -top-1 -right-1 bg-[#C1A44E] text-white text-[9px] rounded-full h-4 w-4 flex items-center justify-center">0</span>
            </a>
        </div>
    </nav>

    <!-- Product Grid (Mobile Optimized) -->
    <main class="p-3">
        <div id="product-grid" class="grid grid-cols-2 gap-3">
            <p class="col-span-2 text-center text-sm py-10">Loading...</p>
        </div>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            updateBagCount();
            const user = localStorage.getItem('user_session');
            if (user) { document.getElementById('auth-link').href = 'profile.html'; document.getElementById('auth-link').innerText = 'Profile'; }
        });

        async function fetchProducts() {
            const res = await fetch('/api/product');
            const products = await res.json();
            const grid = document.getElementById('product-grid');
            grid.innerHTML = products.map(p => `
                <div class="bg-white p-2 border border-[#C1A44E]/30">
                    <img src="${p.image_url}" class="w-full h-40 object-cover mb-2">
                    <h3 class="text-xs font-semibold">${p.name}</h3>
                    <p class="text-[#C1A44E] font-bold text-sm mb-2">৳ ${p.price}</p>
                    <button onclick='addToBag(${JSON.stringify(p)})' class="w-full border border-[#333333] py-1 text-[10px] uppercase tracking-wider hover:bg-[#333333] hover:text-white transition">Add to Bag</button>
                </div>
            `).join('');
        }

        function addToBag(p) {
            let bag = JSON.parse(localStorage.getItem('shaam_bag')) || [];
            bag.push(p);
            localStorage.setItem('shaam_bag', JSON.stringify(bag));
            updateBagCount();
        }

        function updateBagCount() {
            document.getElementById('bag-count').innerText = (JSON.parse(localStorage.getItem('shaam_bag')) || []).length;
        }

        fetchProducts();
    </script>
</body>
</html>
