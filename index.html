<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>SHAAM ITQAN</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&display=swap');
        .luxury-font { font-family: 'Playfair Display', serif; }
        .gold-border { border: 2px solid #D4AF37; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        
        .product-card { border: 1px solid #e5e7eb; transition: 0.3s; padding: 10px; }
        .product-name { font-size: 14px; font-weight: 600; color: #1a1a1a; margin-top: 8px; }
        .product-price { font-size: 16px; font-weight: 700; color: #D4AF37; margin: 6px 0; }
        .cat-item { display: flex; flex-direction: column; align-items: center; text-align: center; width: 80px; flex-shrink: 0; }
        .cat-text { font-size: 11px; font-weight: 800; margin-top: 8px; line-height: 1.1; text-transform: uppercase; width: 100%; }
        .nav-icon { width: 22px; height: 22px; margin-bottom: 2px; }
    </style>
</head>
<body class="bg-white text-black font-sans pb-24">

    <!-- Popup Ad -->
    <div id="popup-ad" class="hidden fixed inset-0 z-[9999] flex items-center justify-center p-4 bg-black/50">
        <div class="bg-white p-6 max-w-xs w-full relative shadow-2xl border-t-4 border-[#D4AF37]">
            <button onclick="document.getElementById('popup-ad').classList.add('hidden')" class="absolute top-2 right-2 text-xl font-bold">×</button>
            <h2 class="font-bold text-lg mb-2">অসম্পূর্ণ অর্ডার!</h2>
            <p class="text-sm mb-4">আপনার একটি অর্ডার অসম্পূর্ণ রয়ে গেছে, এখনই শেষ করুন।</p>
            <a href="checkout.html" class="block w-full bg-[#D4AF37] text-white py-3 text-center font-bold uppercase text-xs">অর্ডারটি শেষ করুন</a>
        </div>
    </div>

    <!-- Navbar -->
    <nav class="sticky top-0 bg-white p-4 flex justify-between items-center z-[100] border-b border-gray-100">
        <div class="w-10"><img src="https://i.ibb.co.com/69gkNgD/IMG-20260425-161202.png" class="w-full"></div>
        <h1 class="text-lg font-bold tracking-widest luxury-font">SHAAM ITQAN</h1>
        <div class="flex items-center gap-4">
            <svg class="w-6 h-6 text-[#D4AF37]" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 1 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path><path d="M13.73 21a2 2 0 0 1-3.46 0"></path></svg>
            <a href="bag.html" class="relative">
                <svg class="w-6 h-6 text-[#D4AF37]" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-width="2" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"/></svg>
                <span id="bag-count" class="absolute -top-2 -right-2 bg-red-500 text-white text-[9px] rounded-full w-4 h-4 flex items-center justify-center font-bold">0</span>
            </a>
        </div>
    </nav>

    <div class="px-4 py-2"><div id="banner-slider" class="flex overflow-x-auto w-full h-40 snap-x snap-mandatory scrollbar-hide scroll-smooth rounded-lg gold-border"></div></div>
    <div class="px-4 py-4"><h2 class="text-xs font-bold mb-4 uppercase tracking-widest">Popular Categories</h2><div id="category-grid" class="flex gap-4 overflow-x-auto pb-4 scrollbar-hide"></div></div>
    <main class="px-4 py-2"><h2 class="text-xs font-bold mb-4 uppercase tracking-widest">New Arrivals</h2><div id="product-grid" class="grid grid-cols-2 gap-4"></div></main>

    <!-- Bottom Nav -->
    <div class="fixed bottom-0 left-0 w-full bg-white border-t border-gray-200 flex justify-around p-3 text-[9px] uppercase font-bold text-gray-500 z-[100]">
        <a href="index.html" class="text-[#D4AF37] flex flex-col items-center">
            <svg class="nav-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg> Home
        </a>
        <a href="#" class="flex flex-col items-center">
            <svg class="nav-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"/></svg> Wishlist
        </a>
        <a href="login.html" id="auth-link" class="flex flex-col items-center">
            <svg class="nav-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg> Account
        </a>
        <a href="#" class="flex flex-col items-center">
            <svg class="nav-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M4 6h16M4 12h16M4 18h16"/></svg> Menu
        </a>
    </div>

    <script>
        function updateAuthUI() {
            const authLink = document.getElementById('auth-link');
            const user = localStorage.getItem('user_session');
            if (user) { authLink.innerHTML = `<span class="nav-icon flex justify-center"><svg class="w-6 h-6" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></span>Profile`; authLink.href = "profile.html"; }
            else { authLink.innerHTML = `<span class="nav-icon flex justify-center"><svg class="w-6 h-6" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg></span>Account`; authLink.href = "login.html"; }
        }

        async function loadData() {
            try {
                const [bRes, cRes, pRes] = await Promise.all([fetch('/api/admin-data?type=banner'), fetch('/api/admin-data?type=category'), fetch('/api/admin-data?type=product')]);
                const banners = await bRes.json(); const cats = await cRes.json(); const prods = await pRes.json();

                document.getElementById('banner-slider').innerHTML = banners.map(b => `<a href="${b.link_url}" class="flex-shrink-0 w-full h-full snap-center"><img src="${b.image_url}" class="w-full h-full object-cover"></a>`).join('');
                document.getElementById('category-grid').innerHTML = cats.map(c => `<a href="${c.link_url}" class="cat-item"><div class="w-16 h-16 bg-black rounded-full border-2 border-[#D4AF37] overflow-hidden flex items-center justify-center"><img src="${c.image_url}" class="w-full h-full object-cover"></div><p class="cat-text">${c.name.split('#').join('<br>')}</p></a>`).join('');
                
                document.getElementById('product-grid').innerHTML = prods.map(p => `
                    <div class="product-card">
                        <img src="${p.image_url}" class="w-full h-40 object-cover cursor-pointer" onclick="window.location.href='product.html?id=${p.id}'">
                        <h3 class="product-name truncate cursor-pointer" onclick="window.location.href='product.html?id=${p.id}'">${p.name}</h3>
                        <p class="product-price">৳ ${p.price}</p>
                        <button onclick="window.location.href='product.html?id=${p.id}'" class="w-full bg-[#D4AF37] text-white py-2 text-[10px] font-bold uppercase hover:bg-[#b8962d] transition">Buy Now</button>
                    </div>`).join('');
            } catch(e) { console.error("Error:", e); }
        }

        async function updateBagCount() {
            const user = JSON.parse(localStorage.getItem('user_session'));
            if (!user) return;
            const res = await fetch('/api/bag?email=' + user.email);
            const items = await res.json();
            document.getElementById('bag-count').innerText = items.reduce((total, i) => total + i.quantity, 0);
        }

        document.addEventListener('DOMContentLoaded', () => { updateAuthUI(); loadData(); updateBagCount(); });
    </script>
</body>
</html>
