<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shaam Itqan | Luxury Boutique</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&display=swap');
        .luxury-font { font-family: 'Playfair Display', serif; }
        .gold-color { color: #C1A44E; }
        .bg-gold { background-color: #C1A44E; }
    </style>
</head>
<body class="bg-[#FDF8EF] text-[#333333] font-serif">

    <!-- Navbar -->
    <nav class="p-4 md:px-12 flex justify-between items-center border-b border-[#C1A44E]">
        <!-- Logo -->
        <img src="/images/logo.png" alt="Shaam Itqan Logo" class="h-10 w-auto">
        <!-- Brand Name -->
        <h1 class="text-2xl md:text-3xl font-bold tracking-[0.2em] luxury-font">SHAAM ITQAN</h1>
        
        <!-- Bag Icon -->
        <a href="bag.html" class="relative">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-7 w-7" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z" />
            </svg>
            <span id="bag-count" class="absolute -top-1 -right-1 bg-[#C1A44E] text-white text-[10px] rounded-full h-4 w-4 flex items-center justify-center">0</span>
        </a>
    </nav>

    <!-- Product Grid -->
    <main class="max-w-6xl mx-auto p-6 md:py-12">
        <div id="product-grid" class="grid grid-cols-2 md:grid-cols-4 gap-6">
            <p class="text-center col-span-2 md:col-span-4 text-gray-500">Loading exquisite collection...</p>
        </div>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', updateBagCount);

        async function fetchProducts() {
            try {
                const response = await fetch('/api/product');
                const products = await response.json();
                const grid = document.getElementById('product-grid');
                grid.innerHTML = '';

                products.forEach(product => {
                    grid.innerHTML += `
                        <div class="bg-white p-4 border border-[#C1A44E]/30 hover:border-[#C1A44E] transition shadow-sm">
                            <img src="${product.image_url}" alt="${product.name}" class="w-full h-56 object-cover mb-4">
                            <h3 class="font-semibold text-lg">${product.name}</h3>
                            <p class="text-[#C1A44E] font-bold mb-4">৳ ${product.price}</p>
                            <button onclick='addToBag(${JSON.stringify(product)})' class="w-full border border-[#333333] py-2 text-sm uppercase tracking-wider hover:bg-[#333333] hover:text-white transition">Add to Bag</button>
                        </div>
                    `;
                });
            } catch (error) {
                console.error(error);
            }
        }

        function addToBag(product) {
            let bag = JSON.parse(localStorage.getItem('shaam_bag')) || [];
            bag.push(product);
            localStorage.setItem('shaam_bag', JSON.stringify(bag));
            updateBagCount();
            alert("Added to your bag!");
        }

        function updateBagCount() {
            let bag = JSON.parse(localStorage.getItem('shaam_bag')) || [];
            document.getElementById('bag-count').innerText = bag.length;
        }

        fetchProducts();
    </script>
</body>
</html>
