<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shaam Itqan - Modern E-commerce</title>
    <!-- Tailwind CSS via CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50">

    <!-- Navbar -->
    <nav class="bg-white shadow-md p-4 flex justify-between items-center sticky top-0 z-50">
        <h1 class="text-xl font-bold text-orange-600">Shaam Itqan</h1>
        <div class="flex items-center gap-4">
            <button class="text-gray-600">Search</button>
            <button class="relative">
                🛒 <span class="absolute -top-2 -right-2 bg-red-500 text-white text-xs rounded-full px-1">0</span>
            </button>
        </div>
    </nav>

    <!-- Hero Section -->
    <header class="bg-orange-500 text-white p-8 text-center">
        <h2 class="text-2xl font-bold mb-2">Exclusive Collections</h2>
        <p>Get the best deals on Shaam Itqan</p>
    </header>

    <!-- Product Grid -->
    <main class="p-4 grid grid-cols-2 md:grid-cols-4 gap-4" id="product-grid">
        <!-- Dummy Product Cards -->
        <div class="bg-white p-2 rounded shadow">
            <img src="https://via.placeholder.com/150" alt="Product" class="w-full h-32 object-cover rounded">
            <h3 class="font-semibold mt-2">Product Name</h3>
            <p class="text-orange-600 font-bold">৳ 500</p>
            <button class="w-full bg-orange-500 text-white py-1 mt-2 rounded">Add to Cart</button>
        </div>
        <!-- Repeat this div for more products -->
    </main>

</body>
</html>
