<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SHAAM ITQAN | Minimalist Luxury</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Hind+Siliguri:wght@300;400;600&display=swap');
        body { font-family: 'Hind Siliguri', sans-serif; }
        .brand-font { font-family: 'Playfair Display', serif; }
    </style>
</head>
<body class="bg-[#fafafa] text-[#1a1a1a]">

    <nav class="sticky top-0 z-50 bg-white/80 backdrop-blur-md border-b border-gray-100 px-8 py-5 flex justify-between items-center">
        <h1 class="brand-font text-2xl tracking-widest font-bold uppercase underline decoration-1 underline-offset-8">SHAAM ITQAN</h1>
        <div class="flex gap-6 text-xs uppercase tracking-widest font-medium">
            <a href="#" class="hover:text-amber-600 transition">Collection</a>
            <a href="/admin" class="hover:text-amber-600 transition">Admin</a>
            <div class="relative cursor-pointer">
                <span>Cart</span>
                <span class="absolute -top-2 -right-3 bg-black text-white text-[10px] px-1.5 rounded-full">0</span>
            </div>
        </div>
    </nav>

    <header class="h-[60vh] flex flex-col justify-center items-center text-center px-6">
        <span class="text-amber-700 text-xs tracking-[0.3em] uppercase mb-4">New Arrival 2026</span>
        <h2 class="brand-font text-5xl md:text-7xl mb-6">সরলতায় আভিজাত্য।</h2>
        <p class="max-w-md text-gray-500 leading-relaxed font-light">আমাদের মিনিমালিস্ট কালেকশনে খুঁজে নিন আপনার ব্যক্তিত্বের প্রতিফলন।</p>
    </header>

    <main class="max-w-7xl mx-auto px-6 pb-24">
        <div id="product-list" class="grid grid-cols-1 md:grid-cols-3 gap-10">
            </div>
    </main>

    <script>
        async function fetchProducts() {
            const list = document.getElementById('product-list');
            try {
                const response = await fetch('/api/products');
                const products = await response.json();
                
                list.innerHTML = products.map(item => `
                    <div class="group cursor-pointer">
                        <div class="bg-[#f0f0f0] aspect-[3/4] mb-6 relative overflow-hidden flex items-center justify-center">
                            <span class="text-gray-400 text-[10px] tracking-widest uppercase brand-font italic">ITQAN Minimalist</span>
                            <div class="absolute inset-0 bg-black/0 group-hover:bg-black/5 transition-all duration-500"></div>
                        </div>
                        <div class="text-center">
                            <h3 class="text-sm tracking-widest uppercase font-semibold mb-2">${item.name}</h3>
                            <p class="text-amber-800 text-sm mb-4 font-bold">৳ ${item.price}</p>
                            <button class="text-[10px] uppercase tracking-[0.2em] border-b border-black pb-1 hover:text-amber-700 hover:border-amber-700 transition">Add to Bag</button>
                        </div>
                    </div>
                `).join('');
            } catch (err) {
                list.innerHTML = "<p class='col-span-3 text-center text-gray-400'>Loading collections...</p>";
            }
        }
        fetchProducts();
    </script>
</body>
</html>
