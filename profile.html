<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>My Profile | SHAAM ITQAN</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&display=swap');
        .luxury-font { font-family: 'Playfair Display', serif; }
        .gold-border { border: 1px solid #C1A44E; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-[#FDF8EF] text-[#333333] font-sans pb-28">

    <div class="max-w-md mx-auto p-4">
        
        <!-- Header -->
        <h2 class="text-2xl font-bold mb-6 text-center luxury-font uppercase tracking-widest text-gray-800 border-b pb-3 border-[#C1A44E]/20">Profile</h2>
        
        <!-- Luxury User Card -->
        <div class="bg-white p-5 rounded shadow-xl border-t-4 border-[#C1A44E] mb-6 relative">
            <!-- ওয়ান-ক্লিক প্রোফাইল এডিট/আপডেট বাটন -->
            <button onclick="openEditProfileModal()" class="absolute top-4 right-4 bg-gray-50 border border-gray-200 p-2 rounded-full hover:bg-gray-100 transition duration-200" title="Edit Profile">
                <svg class="w-4 h-4 text-[#C1A44E]" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z" />
                </svg>
            </button>

            <div class="flex items-center gap-4">
                <div class="w-12 h-12 rounded-full bg-gray-50 flex items-center justify-center border border-[#C1A44E]/30">
                    <svg class="w-6 h-6 text-[#C1A44E]" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
                    </svg>
                </div>
                <div>
                    <p class="text-[9px] uppercase tracking-wider text-[#C1A44E] font-bold font-sans">Valued Customer</p>
                    <h3 id="user-name" class="font-bold text-base text-gray-800">-</h3>
                    <p id="user-email" class="text-xs text-gray-500 font-mono">-</p>
                </div>
            </div>
        </div>

        <!-- গ্রাহকের লাইভ ড্যাশবোর্ড উইজেট গ্রিড এরিয়া -->
        <div id="user-stats-grid" class="grid grid-cols-2 gap-3 mb-6">
            <div class="col-span-2 text-center py-4 text-xs text-gray-400">Loading your stats...</div>
        </div>

        <!-- My Orders Section -->
        <div class="bg-white p-5 rounded shadow-xl border border-gray-100 mb-6">
            <h3 class="font-bold text-xs uppercase tracking-widest border-b pb-2 mb-4 text-gray-800 flex items-center gap-2">
                <svg class="w-4 h-4 text-[#C1A44E]" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"/>
                </svg>
                My Orders
            </h3>
            
            <div id="user-orders-list" class="space-y-4 max-h-[350px] overflow-y-auto scrollbar-hide">
                <p class="text-center py-10 text-gray-500 text-sm">Loading your orders history...</p>
            </div>
        </div>

        <!-- Action Buttons -->
        <div class="space-y-3">
            <button onclick="logout()" class="w-full border border-red-500 text-red-500 py-3 rounded uppercase text-xs tracking-widest font-bold hover:bg-red-500 hover:text-white transition duration-300">
                Logout
            </button>
        </div>
    </div>

    <!-- কাস্টমার প্রোফাইল সংশোধন ও পাসওয়ার্ড পরিবর্তনের প্রিমিয়াম মডাল (Popup Modal) -->
    <div id="edit-profile-modal" class="fixed inset-0 bg-black/60 backdrop-blur-sm z-[200] hidden items-center justify-center p-4">
        <div class="bg-white w-full max-w-sm p-6 rounded-xl border-2 border-[#C1A44E] shadow-2xl relative flex flex-col space-y-4">
            <button onclick="closeEditProfileModal()" class="absolute top-4 right-4 text-gray-400 hover:text-black transition focus:outline-none">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                </svg>
            </button>

            <h2 class="text-base font-bold tracking-widest luxury-font uppercase text-gray-800 border-b pb-2 text-center">Edit Profile</h2>
            
            <div class="space-y-3">
                <div>
                    <label class="text-[9px] font-bold uppercase tracking-wider text-gray-500 block mb-1">Full Name (নাম পরিবর্তন)</label>
                    <input type="text" id="edit-name" placeholder="Enter your full name" class="w-full p-2.5 border text-xs focus:outline-none focus:border-[#C1A44E] rounded bg-white">
                </div>
                
                <div class="border-t pt-3">
                    <p class="text-[9px] font-bold uppercase tracking-wider text-red-400 mb-2">Change Password (ঐচ্ছিক)</p>
                    <div class="space-y-2.5">
                        <div>
                            <label class="text-[9px] font-bold uppercase tracking-wider text-gray-400 block mb-1">Old Password (পুরাতন পাসওয়ার্ড)</label>
                            <input type="password" id="edit-old-pass" placeholder="Enter old password" class="w-full p-2.5 border text-xs focus:outline-none focus:border-[#C1A44E] rounded bg-white">
                        </div>
                        <div>
                            <label class="text-[9px] font-bold uppercase tracking-wider text-gray-400 block mb-1">New Password (নতুন পাসওয়ার্ড)</label>
                            <input type="password" id="edit-new-pass" placeholder="Enter new password" class="w-full p-2.5 border text-xs focus:outline-none focus:border-[#C1A44E] rounded bg-white">
                        </div>
                    </div>
                </div>
            </div>

            <button onclick="submitUpdateProfile()" class="w-full bg-black text-white py-3 uppercase tracking-widest text-xs font-bold hover:bg-[#C1A44E] transition rounded-lg">
                Save Changes
            </button>
        </div>
    </div>

    <!-- Bottom Nav -->
    <div class="fixed bottom-0 left-0 w-full bg-white border-t border-gray-200 flex justify-around p-3 text-[10px] uppercase font-bold text-black z-[100]">
        <a href="index.html" class="text-black hover:text-[#D4AF37] flex flex-col items-center transition">
            <svg class="w-5 h-5 mb-1" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/>
            </svg>
            HOME
        </a>
        <a href="wishlist.html" class="text-black hover:text-[#D4AF37] flex flex-col items-center transition">
            <svg class="w-5 h-5 mb-1" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"/>
            </svg>
            WISHLIST
        </a>
        <a href="profile.html" class="text-[#D4AF37] flex flex-col items-center">
            <svg class="w-5 h-5 mb-1 text-[#D4AF37]" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
            </svg>
            PROFILE
        </a>
        <a href="menu.html" class="text-black hover:text-[#D4AF37] flex flex-col items-center transition">
            <svg class="w-5 h-5 mb-1" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
            </svg>
            MENU
        </a>
    </div>

    <script>
        const user = JSON.parse(localStorage.getItem('user_session'));
        
        if (!user) {
            window.location.href = 'login.html';
        } else {
            document.getElementById('user-name').innerText = user.username || "Valued Customer";
            document.getElementById('user-email').innerText = user.email;
            loadUserStats();  
            loadUserOrders(); 
        }

        async function loadUserStats() {
            try {
                const res = await fetch(`/api/user-hub?action=get_stats&email=${user.email}`);
                if (res.ok) {
                    const stats = await res.json();
                    const grid = document.getElementById('user-stats-grid');
                    grid.innerHTML = `
                        <div class="bg-white p-3 rounded border border-gray-100 shadow-sm flex flex-col justify-between h-20 relative overflow-hidden select-none">
                            <div class="absolute -right-2 -bottom-2 opacity-10 text-[#D4AF37]">
                                <svg class="w-12 h-12" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4M7.835 4.697a3.42 3.42 0 001.946-.806 3.42 3.42 0 014.438 0 3.42 3.42 0 001.946.806 3.42 3.42 0 013.138 3.138 3.42 3.42 0 00.806 1.946 3.42 3.42 0 010 4.438 3.42 3.42 0 00-.806-1.946 3.42 3.42 0 01-3.138 3.138 3.42 3.42 0 00-1.946.806 3.42 3.42 0 01-4.438 0 3.42 3.42 0 00-1.946-.806 3.42 3.42 0 01-3.138-3.138 3.42 3.42 0 00-.806-1.946 3.42 3.42 0 010-4.438 3.42 3.42 0 00.806-1.946 3.42 3.42 0 013.138-3.138z"/></svg>
                            </div>
                            <span class="text-[9px] font-bold text-gray-400 uppercase tracking-widest leading-none font-sans">Delivered (সফল)</span>
                            <span class="text-xl font-extrabold text-green-600 mt-1 leading-none font-sans">${stats.delivered}</span>
                        </div>
                        
                        <div class="bg-white p-3 rounded border border-gray-100 shadow-sm flex flex-col justify-between h-20 relative overflow-hidden select-none">
                            <div class="absolute -right-2 -bottom-2 opacity-10 text-[#D4AF37]">
                                <svg class="w-12 h-12" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>
                            </div>
                            <span class="text-[9px] font-bold text-gray-400 uppercase tracking-widest leading-none font-sans">Processing (চলমান)</span>
                            <span class="text-xl font-extrabold text-[#D4AF37] mt-1 leading-none font-sans">${stats.confirmed + stats.shipped}</span>
                        </div>

                        <div class="bg-white p-3 rounded border border-gray-100 shadow-sm flex flex-col justify-between h-20 relative overflow-hidden select-none">
                            <div class="absolute -right-2 -bottom-2 opacity-10 text-[#D4AF37]">
                                <svg class="w-12 h-12" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                            </div>
                            <span class="text-[9px] font-bold text-gray-400 uppercase tracking-widest leading-none font-sans">Pending (পেন্ডিং)</span>
                            <span class="text-xl font-extrabold text-orange-500 mt-1 leading-none font-sans">${stats.pending}</span>
                        </div>

                        <div class="bg-white p-3 rounded border border-gray-100 shadow-sm flex flex-col justify-between h-20 relative overflow-hidden select-none">
                            <div class="absolute -right-2 -bottom-2 opacity-10 text-red-500">
                                <svg class="w-12 h-12" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/></svg>
                            </div>
                            <span class="text-[9px] font-bold text-gray-400 uppercase tracking-widest leading-none font-sans">Cancelled (বাতিল/ফেরত)</span>
                            <span class="text-xl font-extrabold text-red-500 mt-1 leading-none font-sans">${stats.cancelled + stats.returned}</span>
                        </div>

                        <a href="bag.html" class="bg-white p-3 rounded border border-gray-100 shadow-sm flex flex-col justify-between h-20 relative overflow-hidden hover:border-[#D4AF37] transition">
                            <div class="absolute -right-2 -bottom-2 opacity-10 text-black">
                                <svg class="w-12 h-12" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"/></svg>
                            </div>
                            <span class="text-[9px] font-bold text-gray-400 uppercase tracking-widest leading-none font-sans">Bag Items (কার্ট)</span>
                            <span class="text-xl font-extrabold text-black mt-1 leading-none font-sans">${stats.cart_count}</span>
                        </a>

                        <a href="wishlist.html" class="bg-white p-3 rounded border border-gray-100 shadow-sm flex flex-col justify-between h-20 relative overflow-hidden hover:border-[#D4AF37] transition">
                            <div class="absolute -right-2 -bottom-2 opacity-10 text-red-500">
                                <svg class="w-12 h-12" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"/></svg>
                            </div>
                            <span class="text-[9px] font-bold text-gray-400 uppercase tracking-widest leading-none font-sans">Wishlist (পছন্দ)</span>
                            <span class="text-xl font-extrabold text-red-500 mt-1 leading-none font-sans">${stats.wishlist_count}</span>
                        </a>
                    `;
                }
            } catch (e) {
                console.error("Stats Load Error:", e);
            }
        }

        function getTimelineHTML(status) {
            if (status === 'Cancelled') {
                return `
                    <div class="bg-red-50 text-red-700 text-[10px] font-bold p-3 rounded-lg border border-red-100 mt-4 flex items-center gap-2 font-sans">
                        <svg class="w-4 h-4 text-red-500 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M10 14l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2m7-2a9 9 0 11-18 0 9 9 0 0118 0z" />
                        </svg>
                        <span>This order has been cancelled and stock has been restored.</span>
                    </div>
                `;
            }

            const steps = ['Pending', 'Confirmed', 'Shipped', 'Delivered'];
            const currentIndex = steps.indexOf(status);

            return `
                <div class="mt-4 border-t pt-4">
                    <p class="text-[9px] font-bold text-gray-400 uppercase tracking-widest mb-3">Order Status Tracker</p>
                    <div class="flex items-center justify-between relative px-2.5">
                        <div class="absolute top-[11px] left-9 right-9 h-0.5 bg-gray-200 z-0"></div>
                        <div class="absolute top-[11px] left-9 right-9 h-0.5 bg-[#D4AF37] z-0 transition-all duration-500" style="width: ${currentIndex > 0 ? (currentIndex / 3) * 100 : 0}%"></div>
                        
                        ${steps.map((step, idx) => {
                            const isActive = idx <= currentIndex;
                            const circleColor = isActive ? 'bg-[#D4AF37] border-[#D4AF37] text-white' : 'bg-white border-gray-300 text-gray-400';
                            const textColor = isActive ? 'text-black font-extrabold' : 'text-gray-400 font-medium';
                            
                            return `
                                <div class="flex flex-col items-center z-10 relative">
                                    <div class="w-5 h-5 rounded-full border-2 ${circleColor} flex items-center justify-center text-[9px] font-bold shadow-sm transition-all duration-500">
                                        ${idx + 1}
                                    </div>
                                    <span class="text-[8px] mt-1.5 uppercase tracking-wider ${textColor} text-center font-sans">${step}</span>
                                </div>
                            `;
                        }).join('')}
                    </div>
                </div>
            `;
        }

        async function loadUserOrders() {
            try {
                const res = await fetch('/api/orders?email=' + user.email);
                const orders = await res.json();
                const container = document.getElementById('user-orders-list');
                
                if (orders.length === 0) {
                    container.innerHTML = `<p class="text-center py-10 text-xs text-gray-400">You haven't placed any orders yet.</p>`;
                    return;
                }

                container.innerHTML = orders.map(o => {
                    const primaryPhone = o.phone.split(' | ')[0]?.replace('Primary: ', '') || 'N/A';
                    
                    const isPending = o.status === 'Pending';
                    const cancelBtn = isPending 
                        ? `<button onclick="cancelOrder(${o.id})" class="mt-4 text-red-500 font-bold hover:underline transition text-[10px] uppercase tracking-wider block">Cancel Order</button>` 
                        : '';

                    let badgeColor = "text-orange-600 bg-orange-50";
                    if (o.status === 'Confirmed') badgeColor = "text-blue-600 bg-blue-50";
                    if (o.status === 'Shipped') badgeColor = "text-purple-600 bg-purple-50";
                    if (o.status === 'Delivered') badgeColor = "text-green-600 bg-green-50";
                    if (o.status === 'Cancelled') badgeColor = "text-red-600 bg-red-50";

                    return `
                        <div class="bg-gray-50 p-4 border border-gray-100 rounded text-xs space-y-2.5 leading-relaxed">
                            <div class="flex justify-between items-center border-b border-gray-200/50 pb-2 font-bold">
                                <span class="text-gray-800">Order ID: #${o.id}</span>
                                <span class="${badgeColor} px-2 py-0.5 rounded text-[9px] tracking-wider uppercase font-sans">${o.status}</span>
                            </div>
                            
                            <div class="text-gray-700 font-sans">
                                <b>Items:</b> ${o.products}
                            </div>
                            
                            <div class="text-gray-500 font-sans text-[10px] space-y-0.5">
                                <div><b>Deliver To:</b> ${o.customer_name} | ${primaryPhone}</div>
                            </div>

                            <div class="flex justify-between items-center border-t border-gray-200/50 pt-2 font-bold text-gray-800 font-sans">
                                <span>Total Price:</span>
                                <span class="text-sm text-[#D4AF37]">৳ ${parseFloat(o.total_price).toFixed(2)}</span>
                            </div>
                            
                            ${getTimelineHTML(o.status)}

                            ${cancelBtn}
                        </div>
                    `;
                }).join('');
            } catch (error) {
                console.error("Failed to load user orders:", error);
                document.getElementById('user-orders-list').innerHTML = `<p class="text-center py-6 text-red-500 text-xs">Error loading orders history.</p>`;
            }
        }

        async function cancelOrder(id) {
            if (!confirm("Are you sure you want to cancel this order?")) return;

            try {
                const res = await fetch('/api/orders', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        action: 'cancel', 
                        id: id,
                        email: user.email
                    })
                });

                if (res.ok) {
                    alert("Order cancelled successfully.");
                    loadUserOrders(); 
                } else {
                    const data = await res.json();
                    alert(data.error || "Failed to cancel order.");
                }
            } catch (error) {
                console.error("Cancel Order Error:", error);
            }
        }

        function logout() {
            localStorage.removeItem('user_session');
            alert("You have been logged out.");
            window.location.href = 'index.html';
        }

        // প্রোফাইল এডিট মডাল ওপেন করার ফাংশন (পুরনো নাম ফিল্ডে অটো-ইনপুট হবে)
        function openEditProfileModal() {
            document.getElementById('edit-name').value = user.username || "";
            document.getElementById('edit-old-pass').value = "";
            document.getElementById('edit-new-pass').value = "";
            
            const modal = document.getElementById('edit-profile-modal');
            modal.classList.remove('hidden');
            modal.classList.add('flex');
        }

        function closeEditProfileModal() {
            const modal = document.getElementById('edit-profile-modal');
            modal.classList.add('hidden');
            modal.classList.remove('flex');
        }

        // প্রোফাইল নাম ও পাসওয়ার্ড আপডেট সাবমিট লজিক
        async function submitUpdateProfile() {
            const name = document.getElementById('edit-name').value.trim();
            const oldPass = document.getElementById('edit-old-pass').value;
            const newPass = document.getElementById('edit-new-pass').value;

            if (!name) {
                alert("Please enter your name!");
                return;
            }

            // পাসওয়ার্ড চেঞ্জ অপশন ইনপুট দিলে ভ্যালিডেশন চেক
            if (newPass && !oldPass) {
                alert("Please enter your old password to set a new password!");
                return;
            }

            try {
                const res = await fetch('/api/auth', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        action: 'update_profile',
                        email: user.email,
                        name: name,
                        old_password: oldPass,
                        new_password: newPass
                    })
                });

                const data = await res.json();

                if (res.ok) {
                    alert("Profile updated successfully!");
                    
                    // ব্রাউজার লোকাল সেশনে নতুন ইউজার ডাটা সিঙ্ক করা হচ্ছে
                    localStorage.setItem('user_session', JSON.stringify(data.user));
                    
                    // লাইভ স্ক্রিন টেক্সট রি-আপডেট
                    document.getElementById('user-name').innerText = data.user.username;
                    user.username = data.user.username; // লোকাল ট্র্যাকার ভেরিয়েবল সিঙ্ক
                    
                    closeEditProfileModal();
                    loadUserStats(); // পরিসংখ্যান কার্ডগুলো লাইভ রি-আপডেট
                } else {
                    alert(data.message || "Failed to update profile.");
                }
            } catch (error) {
                console.error("Profile Update Error:", error);
                alert("An error occurred while updating profile.");
            }
        }
    </script>
