<!DOCTYPE html>
<html lang="en">
<head>
    <script>
        (function() {
            const token = localStorage.getItem('admin_auth_token');
            const masterToken = "SHAAM ITQAN 007";
            if (!token || token !== masterToken) {
                window.location.href = '/login.html';
            }
        })();
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventory Manager | SHAAM ITQAN</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body class="bg-gray-50 min-h-screen p-4 md:p-10">

    <div class="max-w-xl mx-auto bg-white p-8 shadow-2xl rounded-sm border-t-4 border-[#9a6a12]">
        <div class="flex justify-between items-center mb-8">
            <h1 class="text-2xl font-serif border-b-2 border-[#9a6a12] pb-1 uppercase tracking-tighter">Inventory Manager</h1>
            <button onclick="adminLogout()" class="text-[10px] font-bold uppercase tracking-widest text-red-500 hover:underline">Logout</button>
        </div>

        <form id="product-form" class="space-y-6">
            <h3 class="font-bold text-center text-gray-700 uppercase tracking-[0.2em] mb-6">Add Product (via URL)</h3>
            
            <div>
                <label class="block text-[10px] uppercase tracking-widest text-gray-400 mb-2">Product Title</label>
                <input type="text" id="p-name" placeholder="Arabic Calligraphy Tee" required class="w-full border border-gray-200 p-4 outline-none focus:border-black text-sm">
            </div>

            <div>
                <label class="block text-[10px] uppercase tracking-widest text-gray-400 mb-2">Price (USD)</label>
                <input type="number" id="p-price" step="0.01" placeholder="25.00" required class="w-full border border-gray-200 p-4 outline-none focus:border-black text-sm">
            </div>

            <div>
                <label class="block text-[10px] uppercase tracking-widest text-gray-400 mb-2">Image Direct URL</label>
                <input type="url" id="p-image-url" placeholder="https://i.ibb.co/example.jpg" required class="w-full border border-gray-200 p-4 outline-none focus:border-black text-sm">
                <p class="text-[9px] text-gray-400 mt-1 italic">*এখানে ছবির সরাসরি লিঙ্ক পেস্ট করুন।</p>
            </div>

            <div>
                <label class="block text-[10px] uppercase tracking-widest text-gray-400 mb-2">Description</label>
                <textarea id="p-desc" placeholder="Details about the product..." rows="4" class="w-full border border-gray-200 p-4 outline-none focus:border-black text-sm"></textarea>
            </div>

            <button type="submit" id="submit-btn" class="w-full bg-black text-white py-5 text-[11px] font-bold uppercase tracking-[0.3em] hover:bg-[#9a6a12] transition duration-500">
                SAVE TO DATABASE
            </button>
        </form>
    </div>

    <script>
        const form = document.getElementById('product-form');
        const submitBtn = document.getElementById('submit-btn');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            submitBtn.disabled = true;
            submitBtn.innerText = "SAVING...";

            const productData = {
                name: document.getElementById('p-name').value,
                price: document.getElementById('p-price').value,
                image: document.getElementById('p-image-url').value, // সরাসরি লিঙ্ক
                description: document.getElementById('p-desc').value
            };

            try {
                const response = await fetch('/api/products', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(productData)
                });

                if (response.ok) {
                    Swal.fire('Success!', 'প্রোডাক্টটি সফলভাবে সেভ হয়েছে।', 'success');
                    form.reset();
                } else {
                    throw new Error('Server side error');
                }
            } catch (error) {
                Swal.fire('Error', 'সেভ করা সম্ভব হয়নি: ' + error.message, 'error');
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerText = "SAVE TO DATABASE";
            }
        });

        function adminLogout() {
            localStorage.removeItem('admin_auth_token');
            window.location.href = '/login.html';
        }
    </script>
</body>
</html>
