<!DOCTYPE html>
<html lang="en">
<head>
    <script>
        // বডি লোড হওয়ার আগেই টোকেন চেক (অত্যন্ত জরুরি)
        (function() {
            const token = localStorage.getItem('admin_auth_token');
            const masterToken = "SHAAM ITQAN 007";

            if (!token || token !== masterToken) {
                // যদি টোকেন না থাকে তবে সরাসরি বের করে দেবে
                alert("Unauthorized Access! Admin Token Missing.");
                window.location.href = '/login.html';
            }
        })();
    </script>
    
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | SHAAM ITQAN</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50">
    <nav class="bg-black text-white p-5 flex justify-between items-center">
        <h1 class="text-sm font-bold tracking-widest uppercase">SHAAM ITQAN ADMIN</h1>
        <button onclick="adminLogout()" class="text-[10px] bg-red-600 px-4 py-2 uppercase font-bold">Logout</button>
    </nav>

    <div class="p-8">
        <h2 class="text-2xl font-serif uppercase tracking-widest">Welcome, Boss!</h2>
        <p class="text-gray-500 mt-2">আপনার ব্যবসার সব কন্ট্রোল এখন আপনার হাতে।</p>
        
        </div>

    <script>
        function adminLogout() {
            localStorage.removeItem('admin_auth_token'); // টোকেন ডিলিট করে দেওয়া
            window.location.href = '/login.html';
        }
    </script>
</body>
</html>
