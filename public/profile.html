<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile | SHAAM ITQAN</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-gray-50">
    <nav class="bg-black text-white p-5 text-center">
        <h1 class="font-serif text-xl tracking-[0.3em] text-yellow-600 uppercase cursor-pointer" onclick="window.location.href='/'">SHAAM ITQAN</h1>
    </nav>

    <div class="max-w-md mx-auto mt-20 p-8 bg-white border shadow-sm">
        <div class="text-center mb-8">
            <div class="w-20 h-20 bg-gray-100 rounded-full flex items-center justify-center mx-auto mb-4 border">
                <i class="fa-solid fa-user text-3xl text-gray-400"></i>
            </div>
            <h2 id="u-name" class="text-lg font-bold uppercase tracking-widest text-gray-800">User Name</h2>
            <p id="u-email" class="text-sm text-gray-500 font-serif mt-1">email@example.com</p>
        </div>

        <div class="space-y-4 border-t pt-6">
            <button onclick="window.location.href='/bag.html'" class="w-full text-left p-4 bg-gray-50 hover:bg-gray-100 text-[11px] font-bold uppercase tracking-widest flex justify-between items-center transition">
                <span>My Bag / Orders</span>
                <i class="fa-solid fa-chevron-right text-gray-400"></i>
            </button>
            
            <button onclick="logout()" class="w-full text-center p-4 border border-red-100 text-red-500 text-[11px] font-bold uppercase tracking-widest hover:bg-red-50 transition">
                Logout Account
            </button>
        </div>
    </div>

    <script>
        const user = JSON.parse(localStorage.getItem('user'));
        if (!user) {
            window.location.href = '/login.html';
        } else {
            document.getElementById('u-name').innerText = user.full_name;
            document.getElementById('u-email').innerText = user.email_address;
        }

        function logout() {
            localStorage.removeItem('user');
            window.location.href = '/';
        }
    </script>
</body>
</html>
