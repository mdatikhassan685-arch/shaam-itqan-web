<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SHAAM ITQAN | Premium Shop</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-white">
    <nav class="bg-black text-white p-5 flex justify-between items-center sticky top-0 z-50 shadow-md">
        <h1 class="font-serif text-xl tracking-[0.3em] text-yellow-600 uppercase cursor-pointer" onclick="window.location.href='/'">SHAAM ITQAN</h1>
        
        <div class="flex items-center gap-6">
            <a href="/bag.html" class="relative group">
                <i class="fa-solid fa-bag-shopping text-xl transition group-hover:text-yellow-500"></i>
                <span id="bag-count" class="absolute -top-2 -right-2 bg-red-600 text-white text-[10px] font-bold px-1.5 py-0.5 rounded-full hidden">0</span>
            </a>
            
            <div id="user-menu" class="flex items-center">
                </div>
        </div>
    </nav>

    <div class="max-w-7xl mx-auto p-4 sm:p-8">
        <div id="product-list" class="grid grid-cols-2 md:grid-cols-4 gap-4 sm:gap-8 py-10">
            </div>
    </div>

    <script>
        // ১. প্রোডাক্ট লোড করা
        async function fetchProducts() {
            try {
                const res = await fetch('/api/products');
                const products = await res.json();
                const list = document.getElementById('product-list');
                list.innerHTML = products.map(p => `
                    <div class="group relative overflow-hidden bg-gray-50 border border-gray-100">
                        <div class="overflow-hidden aspect-[3/4]">
                            <img src="${p.image_url}" class="w-full h-full object-cover transition duration-500 group-hover:scale-110">
                        </div>
                        <div class="p-4 text-center">
                            <h3 class="text-[11px] font-bold uppercase tracking-widest text-gray-800">${p.name}</h3>
                            <p class="text-sm font-serif text-yellow-800 mt-2">$${p.price}</p>
                            <button onclick='addToBag(${JSON.stringify(p)})' class="w-full bg-black text-white py-3 mt-4 text-[10px] font-bold uppercase tracking-widest hover:bg-yellow-700 transition duration-300">Add to Bag</button>
                        </div>
                    </div>
                `).join('');
            } catch (err) {
                console.error("Products loading error");
            }
        }

        // ২. ব্যাগ কাউন্টার আপডেট
        function updateBagCounter() {
            const user = JSON.parse(localStorage.getItem('user'));
            const cartKey = user ? `cart_${user.email_address}` : 'cart_guest';
            const cart = JSON.parse(localStorage.getItem(cartKey)) || [];
            
            const counter = document.getElementById('bag-count');
            if (cart.length > 0) {
                counter.innerText = cart.length;
                counter.classList.remove('hidden');
            } else {
                counter.classList.add('hidden');
            }
        }

        // ৩. অ্যাড টু ব্যাগ ফাংশন
        function addToBag(product) {
            const user = JSON.parse(localStorage.getItem('user'));
            const cartKey = user ? `cart_${user.email_address}` : 'cart_guest';
            
            let cart = JSON.parse(localStorage.getItem(cartKey)) || [];
            cart.push(product);
            localStorage.setItem(cartKey, JSON.stringify(cart));

            updateBagCounter();
            
            Swal.fire({
                title: 'Added!',
                text: 'পণ্যটি ব্যাগে যোগ করা হয়েছে।',
                icon: 'success',
                timer: 1000,
                showConfirmButton: false,
                toast: true,
                position: 'top-end'
            });
        }

        // ৪. ইউজার মেনু ম্যানেজমেন্ট
        function renderMenu() {
            const user = JSON.parse(localStorage.getItem('user'));
            const menu = document.getElementById('user-menu');
            
            if (user) {
                // লগইন থাকলে প্রোফাইল বাটন
                menu.innerHTML = `
                    <a href="/profile.html" class="flex items-center gap-2 bg-gray-900 px-4 py-2 rounded-sm hover:bg-yellow-600 transition">
                        <i class="fa-regular fa-user text-sm"></i>
                        <span class="text-[11px] font-bold uppercase tracking-widest">Profile</span>
                    </a>
                `;
            } else {
                // লগইন না থাকলে লগইন বাটন
                menu.innerHTML = `
                    <a href="/login.html" class="text-[11px] font-bold uppercase tracking-widest hover:text-yellow-500 transition">Login</a>
                `;
            }
        }

        // ৫. ইনিশিয়াল ফাংশন রান
        fetchProducts();
        updateBagCounter();
        renderMenu();
    </script>
</body>
</html>
