<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SHAAM ITQAN | Luxury Shop</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body class="bg-white">
    <nav class="bg-black text-white p-5 flex justify-between items-center sticky top-0 z-50">
        <h1 class="font-serif text-xl tracking-widest text-yellow-600 uppercase">SHAAM ITQAN</h1>
        <div class="flex gap-4">
            <a href="/bag.html" class="text-sm uppercase tracking-tighter">Bag</a>
            <div id="user-menu"></div>
        </div>
    </nav>

    <div class="max-w-6xl mx-auto p-6">
        <div id="product-list" class="grid grid-cols-2 md:grid-cols-4 gap-6 py-10">
            </div>
    </div>

    <script>
        // প্রোডাক্ট লোড করা
        async function fetchProducts() {
            try {
                const res = await fetch('/api/products');
                const products = await res.json();
                const list = document.getElementById('product-list');
                list.innerHTML = products.map(p => `
                    <div class="group border p-4 hover:shadow-lg transition">
                        <img src="${p.image_url}" class="w-full h-64 object-cover mb-4">
                        <h3 class="text-[10px] font-bold uppercase tracking-widest">${p.name}</h3>
                        <p class="text-sm font-serif text-yellow-800 mt-1">$${p.price}</p>
                        <button onclick='addToBag(${JSON.stringify(p)})' class="w-full bg-black text-white py-3 mt-4 text-[9px] font-bold uppercase hover:bg-yellow-600 transition">Add to Bag</button>
                    </div>
                `).join('');
            } catch (err) {
                console.error("Error loading products");
            }
        }

        // ব্যাগ-এ যোগ করার সঠিক লজিক
        function addToBag(product) {
            const user = JSON.parse(localStorage.getItem('user'));
            // যদি ইউজার লগইন থাকে তবে তার ইমেইল দিয়ে আলাদা ব্যাগ, নাহলে গেস্ট ব্যাগ
            const cartKey = user ? `cart_${user.email_address}` : 'cart_guest';
            
            let cart = JSON.parse(localStorage.getItem(cartKey)) || [];
            cart.push(product);
            localStorage.setItem(cartKey, JSON.stringify(cart));

            Swal.fire({
                title: 'Added!',
                text: 'পণ্যটি আপনার ব্যাগে যোগ করা হয়েছে।',
                icon: 'success',
                timer: 1500,
                showConfirmButton: false
            });
        }

        // ইউজার মেনু আপডেট
        function updateUserMenu() {
            const user = JSON.parse(localStorage.getItem('user'));
            const menu = document.getElementById('user-menu');
            if(user) {
                menu.innerHTML = `<button onclick="logout()" class="text-sm uppercase text-red-400">Logout</button>`;
            } else {
                menu.innerHTML = `<a href="/login.html" class="text-sm uppercase">Login</a>`;
            }
        }

        function logout() {
            localStorage.removeItem('user');
            location.reload();
        }

        fetchProducts();
        updateUserMenu();
    </script>
</body>
</html>
