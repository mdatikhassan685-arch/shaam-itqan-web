<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SHAAM ITQAN | Home</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body class="bg-white">
    <nav class="bg-black text-white p-4 flex justify-between items-center sticky top-0 z-50">
        <h1 class="font-serif text-xl text-yellow-500 tracking-widest cursor-pointer" onclick="window.location.href='/'">SHAAM ITQAN</h1>
        <div id="nav-user" class="text-[10px] tracking-widest uppercase">
            <a href="/login.html" class="border border-yellow-600 px-3 py-1">LOGIN / SIGNUP</a>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto p-6">
        <div id="product-grid" class="grid grid-cols-2 md:grid-cols-4 gap-6 py-10">
            </div>
    </main>

    <script>
        // ইউজার লগইন থাকলে নাম দেখাবে
        const user = JSON.parse(localStorage.getItem('user'));
        if(user) {
            document.getElementById('nav-user').innerHTML = `
                <span class="text-yellow-500 mr-4">${user.full_name.split(' ')[0]}</span>
                <button onclick="localStorage.removeItem('user'); location.reload();" class="underline">LOGOUT</button>
            `;
        }

        async function loadProducts() {
            const grid = document.getElementById('product-grid');
            try {
                const res = await fetch('/api/products');
                const products = await res.json();
                
                if(products.length === 0) {
                    grid.innerHTML = '<p class="col-span-full text-center py-20 text-gray-400">No products found.</p>';
                    return;
                }

                grid.innerHTML = products.map(p => `
                    <div class="border p-2">
                        <img src="${p.image_url}" class="w-full aspect-[3/4] object-cover mb-4 bg-gray-100">
                        <h3 class="text-[10px] tracking-widest text-gray-500 uppercase">${p.name}</h3>
                        <p class="font-bold text-yellow-700">$${p.price}</p>
                        <button class="w-full bg-black text-white py-2 mt-2 text-[10px]">ADD TO BAG</button>
                    </div>
                `).join('');
            } catch (e) {
                grid.innerHTML = '<p class="text-red-500">Failed to load products.</p>';
            }
        }
        loadProducts();
    </script>
</body>
</html>
