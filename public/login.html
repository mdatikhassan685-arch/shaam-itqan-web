<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | SHAAM ITQAN</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@300;400&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #000; }
        .serif { font-family: 'Playfair Display', serif; }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">

    <div class="bg-white p-8 rounded-sm shadow-2xl w-full max-w-sm border-t-4 border-yellow-600">
        <div class="text-center mb-8">
            <h1 onclick="activateAdminMode()" class="serif text-3xl tracking-widest text-black cursor-default select-none">SHAAM ITQAN</h1>
            <p id="login-title" class="text-[10px] uppercase tracking-[0.3em] text-gray-400 mt-2">Member Authentication</p>
        </div>

        <div class="space-y-5">
            <div id="email-field">
                <label class="text-[10px] uppercase tracking-widest text-gray-500 mb-1 block font-bold">Email Address</label>
                <input id="email" type="email" placeholder="Enter your email" class="w-full border-b border-gray-300 p-2 focus:outline-none focus:border-yellow-600 transition text-sm">
            </div>

            <div id="phone-field" class="hidden">
                <label class="text-[10px] uppercase tracking-widest text-gray-500 mb-1 block font-bold">Admin Phone Number</label>
                <input id="phone" type="text" placeholder="013XXXXXXXX" class="w-full border-b border-gray-300 p-2 focus:outline-none focus:border-yellow-600 transition text-sm">
            </div>

            <div>
                <label class="text-[10px] uppercase tracking-widest text-gray-500 mb-1 block font-bold">Password</label>
                <input id="pass" type="password" placeholder="••••••••" class="w-full border-b border-gray-300 p-2 focus:outline-none focus:border-yellow-600 transition text-sm">
            </div>

            <button id="login-btn" onclick="login()" class="w-full bg-black text-white py-4 mt-4 text-[10px] font-bold tracking-[0.2em] hover:bg-yellow-600 transition-all duration-300">
                LOG IN TO SHOP
            </button>
        </div>

        <div class="mt-8 text-center border-t pt-6">
            <p class="text-xs text-gray-500">Don't have an account? <a href="/signup.html" class="text-black font-bold hover:text-yellow-600 underline transition">Sign Up</a></p>
        </div>
    </div>

    <script>
        let isAdminLogin = false;
        let clickCount = 0;

        // ৫ বার লোগোতে ক্লিক করলে এডমিন ফিল্ড আসবে
        function activateAdminMode() {
            clickCount++;
            if(clickCount === 5) {
                isAdminLogin = true;
                document.getElementById('email-field').classList.add('hidden');
                document.getElementById('phone-field').classList.remove('hidden');
                document.getElementById('login-title').innerText = "ADMIN PORTAL ACTIVE";
                document.getElementById('login-title').classList.replace('text-gray-400', 'text-yellow-600');
                document.getElementById('login-btn').innerText = "ADMIN LOGIN";
                Swal.fire({ toast: true, position: 'top', title: 'Admin Mode Activated', icon: 'info', showConfirmButton: false, timer: 1000 });
            }
        }

        async function login() {
            const email = document.getElementById('email').value;
            const phone = document.getElementById('phone').value;
            const password = document.getElementById('pass').value;

            // অ্যাডমিন লগইনের জন্য আমরা আলাদা বডি পাঠাবো
            const bodyData = isAdminLogin ? { phone, password, type: 'admin' } : { email, password, type: 'user' };

            try {
                const res = await fetch('/api/login', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(bodyData)
                });

                const data = await res.json();
                if(res.ok) {
                    localStorage.setItem('user', JSON.stringify(data.user));
                    Swal.fire({ icon: 'success', title: 'Welcome!', text: 'Login Successful', showConfirmButton: false, timer: 1500 })
                    .then(() => { 
                        window.location.href = data.user.role === 'admin' ? '/admin.html' : '/';
                    });
                } else {
                    Swal.fire({ icon: 'error', title: 'Access Denied', text: data.message });
                }
            } catch (err) {
                console.error(err);
            }
        }
    </script>
</body>
</html>
