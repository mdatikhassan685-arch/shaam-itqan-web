<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | SHAAM ITQAN</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@300;400&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .serif { font-family: 'Playfair Display', serif; }
    </style>
</head>
<body class="bg-black flex items-center justify-center min-h-screen p-4">

    <div class="bg-white p-8 rounded-sm shadow-2xl w-full max-w-sm border-t-4 border-yellow-600">
        <div class="text-center mb-8">
            <h1 class="serif text-3xl tracking-widest text-black">SHAAM ITQAN</h1>
            <p class="text-xs uppercase tracking-widest text-gray-400 mt-2">Elite Collection</p>
        </div>

        <div class="space-y-5">
            <div>
                <label class="text-[10px] uppercase tracking-widest text-gray-500 mb-1 block">Email Address</label>
                <input id="email" type="email" placeholder="email@example.com" 
                    class="w-full border-b border-gray-300 p-2 focus:outline-none focus:border-yellow-600 transition text-sm">
            </div>

            <div>
                <label class="text-[10px] uppercase tracking-widest text-gray-500 mb-1 block">Password</label>
                <input id="pass" type="password" placeholder="••••••••" 
                    class="w-full border-b border-gray-300 p-2 focus:outline-none focus:border-yellow-600 transition text-sm">
            </div>

            <button onclick="login()" 
                class="w-full bg-black text-white py-4 mt-4 text-xs font-bold tracking-[0.2em] hover:bg-yellow-600 transition-all duration-300 ease-in-out">
                LOG IN
            </button>
        </div>

        <div class="mt-8 text-center border-t pt-6">
            <p class="text-xs text-gray-500">
                New to SHAAM ITQAN? 
                <a href="/signup.html" class="text-black font-bold hover:text-yellow-600 transition">Create Account</a>
            </p>
        </div>
    </div>

    <script>
        async function login() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('pass').value;

            if(!email || !password) {
                alert("Please fill in all fields.");
                return;
            }

            try {
                const res = await fetch('/api/login', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({email, password})
                });

                const data = await res.json();

                if(res.ok) {
                    // লগইন সফল হলে ইউজার ডেটা লোকাল স্টোরেজে রাখা যায়
                    localStorage.setItem('user', JSON.stringify(data.user));
                    window.location.href = '/'; 
                } else {
                    alert(data.message || "Invalid login credentials.");
                }
            } catch (error) {
                console.error("Login Error:", error);
                alert("Server error. Please try again later.");
            }
        }
    </script>
</body>
</html>
