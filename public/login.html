<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | SHAAM ITQAN</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black flex items-center justify-center min-h-screen p-4">
    <div class="bg-white p-8 rounded-sm shadow-2xl w-full max-w-sm border-t-4 border-yellow-600">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-serif tracking-widest text-black">SHAAM ITQAN</h1>
            <p class="text-[10px] uppercase tracking-widest text-gray-400 mt-2">Member Login</p>
        </div>
        <div class="space-y-5">
            <input id="email" type="email" placeholder="Email Address" class="w-full border-b p-2 outline-none focus:border-yellow-600 transition">
            <input id="pass" type="password" placeholder="Password" class="w-full border-b p-2 outline-none focus:border-yellow-600 transition">
            <button onclick="login()" class="w-full bg-black text-white py-4 mt-4 font-bold tracking-widest hover:bg-yellow-600 transition">LOG IN</button>
        </div>
        <div class="mt-8 text-center border-t pt-6">
            <p class="text-xs text-gray-500">Don't have an account? <a href="/signup.html" class="text-black font-bold underline">Sign Up</a></p>
            <a href="/" class="text-[10px] uppercase tracking-widest text-gray-400 mt-4 inline-block hover:text-black">← Back to Shop</a>
        </div>
    </div>

    <script>
        async function login() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('pass').value;

            if(!email || !password) return alert("ইমেইল এবং পাসওয়ার্ড দিন");

            try {
                const res = await fetch('/api/login', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ email, password })
                });

                const data = await res.json();
                if(res.ok) {
                    localStorage.setItem('user', JSON.stringify(data.user));
                    alert("Login Successful!");
                    window.location.href = '/';
                } else {
                    alert(data.message || "Invalid Credentials");
                }
            } catch (err) {
                alert("Server error. Please try again later.");
            }
        }
    </script>
</body>
</html>
