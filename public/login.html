<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | SHAAM ITQAN</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body class="bg-black flex items-center justify-center min-h-screen relative p-4">
    <div onclick="adminTrigger()" class="absolute top-0 right-0 w-20 h-20 opacity-0 z-50"></div>

    <div class="bg-white p-8 rounded-sm shadow-2xl w-full max-w-sm border-t-4 border-yellow-600">
        <h2 id="login-title" class="text-2xl font-serif mb-6 text-center tracking-widest uppercase">Member Login</h2>
        
        <div class="space-y-4">
            <div id="email-field">
                <label class="text-[10px] uppercase text-gray-400">Email Address</label>
                <input id="email" type="email" class="w-full border-b p-2 outline-none focus:border-black">
            </div>

            <div id="phone-field" class="hidden">
                <label class="text-[10px] uppercase text-yellow-600 font-bold">Admin Phone Number</label>
                <input id="phone" type="text" class="w-full border-b p-2 outline-none border-yellow-300">
            </div>

            <div>
                <label class="text-[10px] uppercase text-gray-400">Password</label>
                <input id="pass" type="password" class="w-full border-b p-2 outline-none focus:border-black">
            </div>

            <button onclick="login()" class="w-full bg-black text-white py-4 font-bold tracking-widest hover:bg-yellow-600 transition">LOG IN</button>
        </div>
        <p class="text-center mt-6 text-xs">New here? <a href="/signup.html" class="underline font-bold">Create Account</a></p>
    </div>

    <script>
        let isAdmin = false;
        let count = 0;

        function adminTrigger() {
            count++;
            if(count === 3) {
                isAdmin = true;
                document.getElementById('email-field').classList.add('hidden');
                document.getElementById('phone-field').classList.remove('hidden');
                document.getElementById('login-title').innerText = "Admin Access";
                Swal.fire({ toast: true, title: 'Admin Mode Active', icon: 'info', showConfirmButton: false, timer: 1000 });
            }
        }

        async function login() {
            const email = document.getElementById('email').value;
            const phone = document.getElementById('phone').value;
            const password = document.getElementById('pass').value;

            const payload = isAdmin ? { phone, password, type: 'admin' } : { email, password, type: 'user' };

            const res = await fetch('/api/login', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(payload)
            });

            const data = await res.json();
            if(res.ok) {
                localStorage.setItem('user', JSON.stringify(data.user));
                window.location.href = data.user.role === 'admin' ? '/admin.html' : '/';
            } else {
                Swal.fire('Login Failed', data.message, 'error');
            }
        }
    </script>
</body>
</html>
