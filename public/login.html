<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | SHAAM ITQAN</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body class="bg-black flex items-center justify-center min-h-screen relative p-4">
    <div onclick="adminTrigger()" class="absolute top-0 right-0 w-20 h-20 opacity-0 z-50"></div>

    <div class="bg-white p-8 rounded-sm shadow-2xl w-full max-w-sm border-t-4 border-yellow-600">
        <h2 id="title" class="text-2xl font-serif mb-6 text-center tracking-widest uppercase text-black">Login</h2>
        
        <div class="space-y-4">
            <div id="email-group">
                <label class="text-[10px] uppercase text-gray-400 font-bold">Email Address</label>
                <input id="email" type="email" placeholder="email@example.com" class="w-full border-b p-2 outline-none focus:border-black">
            </div>

            <div id="token-group" class="hidden">
                <label class="text-[10px] uppercase text-yellow-600 font-bold">Admin Secret Token</label>
                <input id="token" type="text" placeholder="Enter Admin Token" class="w-full border-b p-2 outline-none border-yellow-300 bg-yellow-50">
            </div>

            <div>
                <label class="text-[10px] uppercase text-gray-400 font-bold">Password</label>
                <input id="pass" type="password" placeholder="••••••••" class="w-full border-b p-2 outline-none focus:border-black">
            </div>

            <button onclick="handleLogin()" class="w-full bg-black text-white py-4 font-bold tracking-widest hover:bg-yellow-600 transition">LOG IN</button>
        </div>
    </div>

    <script>
        let isAdmin = false;
        let count = 0;

        function adminTrigger() {
            count++;
            if(count === 3) {
                isAdmin = true;
                document.getElementById('email-group').classList.add('hidden');
                document.getElementById('token-group').classList.remove('hidden');
                document.getElementById('title').innerText = "Admin Login";
                document.getElementById('title').classList.add('text-yellow-600');
                Swal.fire({ toast: true, title: 'Admin Mode Active', icon: 'info', showConfirmButton: false, timer: 1000 });
            }
        }

        async function handleLogin() {
            const email = document.getElementById('email').value;
            const token = document.getElementById('token').value;
            const password = document.getElementById('pass').value;

            const payload = isAdmin ? { token, password, type: 'admin' } : { email, password, type: 'user' };

            const res = await fetch('/api/login', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(payload)
            });

            const data = await res.json();
            if(res.ok) {
                localStorage.setItem('user', JSON.stringify(data.user));
                // যদি রোল 'admin' হয় তবে অ্যাডমিন পেজে যাবে
                window.location.href = data.user.admin_token ? '/admin.html' : '/';
            } else {
                Swal.fire('Error', data.message, 'error');
            }
        }
    </script>
</body>
</html>
