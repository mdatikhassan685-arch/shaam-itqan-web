<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signup | SHAAM ITQAN</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body class="bg-black flex items-center justify-center min-h-screen p-4">
    <div class="bg-white p-8 rounded-sm shadow-2xl w-full max-w-sm border-t-4 border-yellow-600">
        <h2 class="text-2xl font-serif mb-6 text-center tracking-widest">REGISTRATION</h2>
        <div class="space-y-4">
            <input id="fullName" type="text" placeholder="Full Name" class="w-full border-b p-2 outline-none">
            <input id="email" type="email" placeholder="Email Address" class="w-full border-b p-2 outline-none">
            <input id="phone" type="text" placeholder="Phone Number" class="w-full border-b p-2 outline-none">
            <input id="pass" type="password" placeholder="Password" class="w-full border-b p-2 outline-none">
            <button onclick="signup()" class="w-full bg-black text-white py-4 font-bold tracking-widest hover:bg-yellow-600 transition">CREATE ACCOUNT</button>
        </div>
    </div>
    <script>
        async function signup() {
            const fullName = document.getElementById('fullName').value;
            const email = document.getElementById('email').value;
            const phone = document.getElementById('phone').value;
            const password = document.getElementById('pass').value;

            if(!fullName || !email || !phone || !password) return Swal.fire('Error', 'সবগুলো ঘর পূরণ করুন', 'error');

            const res = await fetch('/api/signup', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ fullName, email, phone, password })
            });
            if(res.ok) {
                Swal.fire('Success', 'Account Created!', 'success').then(() => window.location.href='/login.html');
            } else { Swal.fire('Error', 'Signup failed!', 'error'); }
        }
    </script>
</body>
</html>
