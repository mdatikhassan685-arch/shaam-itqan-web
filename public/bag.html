<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Bag | SHAAM ITQAN</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body class="bg-gray-50 min-h-screen">
    <nav class="bg-black text-white p-5 flex justify-between items-center">
        <h1 class="font-serif text-xl tracking-widest text-yellow-600 uppercase cursor-pointer" onclick="window.location.href='/'">SHAAM ITQAN</h1>
    </nav>

    <div class="max-w-2xl mx-auto p-6 py-12">
        <h2 class="text-xl font-serif mb-8 tracking-widest text-center uppercase border-b pb-4">YOUR BAG</h2>
        <div id="cart-items" class="space-y-4"></div>
        <div id="cart-footer" class="mt-12 pt-6 border-t hidden">
            <div class="flex justify-between font-bold uppercase tracking-widest">
                <span>Total:</span> <span id="total-price">$0.00</span>
            </div>
            <button onclick="placeOrder()" class="w-full bg-black text-white py-5 mt-8 font-bold tracking-[0.2em] text-[10px] uppercase hover:bg-yellow-600 transition">PLACE ORDER</button>
        </div>
        <p id="empty-msg" class="text-center py-20 text-gray-400 hidden">Your bag is empty.</p>
    </div>

    <script>
        let cart = JSON.parse(localStorage.getItem('cart')) || [];

        function renderCart() {
            const container = document.getElementById('cart-items');
            if (cart.length === 0) {
                document.getElementById('empty-msg').classList.remove('hidden');
                document.getElementById('cart-footer').classList.add('hidden');
                return;
            }
            document.getElementById('cart-footer').classList.remove('hidden');
            let total = 0;
            container.innerHTML = cart.map((item, index) => {
                total += parseFloat(item.price);
                return `<div class="flex items-center justify-between bg-white p-4 border shadow-sm">
                    <div class="flex items-center gap-4">
                        <img src="${item.image_url}" class="w-16 h-20 object-cover">
                        <div><h3 class="text-[10px] font-bold uppercase">${item.name}</h3><p class="text-sm font-serif text-yellow-800">$${item.price}</p></div>
                    </div>
                    <button onclick="removeItem(${index})" class="text-[10px] text-red-400 uppercase font-bold">Remove</button>
                </div>`;
            }).join('');
            document.getElementById('total-price').innerText = '$' + total.toFixed(2);
        }

        function removeItem(index) {
            cart.splice(index, 1);
            localStorage.setItem('cart', JSON.stringify(cart));
            location.reload();
        }

        function placeOrder() {
            const user = localStorage.getItem('user');
            if(!user) {
                Swal.fire({
                    title: 'Authentication Required',
                    text: 'অর্ডার করার জন্য অনুগ্রহ করে প্রথমে লগইন করুন!',
                    icon: 'info',
                    showCancelButton: true,
                    confirmButtonText: 'LOGIN',
                    cancelButtonText: 'SIGN UP',
                    confirmButtonColor: '#000',
                    cancelButtonColor: '#555',
                    reverseButtons: true
                }).then((result) => {
                    if (result.isConfirmed) window.location.href = '/login.html';
                    else if (result.dismiss === Swal.DismissReason.cancel) window.location.href = '/signup.html';
                });
                return;
            }
            Swal.fire('Success', 'Order placed successfully!', 'success');
            localStorage.removeItem('cart');
            setTimeout(() => window.location.href = '/', 2000);
        }
        renderCart();
    </script>
</body>
</html>
