<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Bag | SHAAM ITQAN</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body class="bg-gray-50 min-h-screen">
    <nav class="bg-black text-white p-5 flex justify-between items-center">
        <h1 class="font-serif text-xl tracking-widest text-yellow-600 uppercase cursor-pointer" onclick="window.location.href='/'">SHAAM ITQAN</h1>
    </nav>

    <div class="max-w-2xl mx-auto p-6 py-12">
        <h2 class="text-xl font-serif mb-8 tracking-widest text-center uppercase border-b pb-4">YOUR BAG</h2>
        
        <div id="cart-items" class="space-y-4"></div>

        <div id="cart-footer" class="mt-12 pt-6 border-t hidden">
            <div class="flex justify-between font-bold uppercase tracking-widest">
                <span>Total Amount:</span>
                <span id="total-price">$0.00</span>
            </div>
            <button onclick="placeOrder()" class="w-full bg-black text-white py-5 mt-8 font-bold tracking-[0.2em] text-[10px] uppercase hover:bg-yellow-600 transition">PLACE ORDER</button>
        </div>

        <div id="empty-msg" class="text-center py-20 text-gray-400 hidden">
            <p class="uppercase tracking-widest text-xs">Your bag is empty.</p>
            <a href="/" class="text-black underline block mt-4 text-[10px] font-bold">CONTINUE SHOPPING</a>
        </div>
    </div>

    <script>
        function renderCart() {
            const user = JSON.parse(localStorage.getItem('user'));
            // লগইন থাকলে তার ইমেইল এর ব্যাগ খুঁজবে, নাহলে গেস্ট ব্যাগ
            const cartKey = user ? `cart_${user.email_address}` : 'cart_guest';
            let cart = JSON.parse(localStorage.getItem(cartKey)) || [];

            const container = document.getElementById('cart-items');
            const emptyMsg = document.getElementById('empty-msg');
            const footer = document.getElementById('cart-footer');

            if (cart.length === 0) {
                emptyMsg.classList.remove('hidden');
                footer.classList.add('hidden');
                container.innerHTML = '';
                return;
            }

            emptyMsg.classList.add('hidden');
            footer.classList.remove('hidden');

            let total = 0;
            container.innerHTML = cart.map((item, index) => {
                total += parseFloat(item.price);
                return `
                    <div class="flex items-center justify-between bg-white p-4 border shadow-sm rounded-sm">
                        <div class="flex items-center gap-4">
                            <img src="${item.image_url}" class="w-16 h-20 object-cover border">
                            <div>
                                <h3 class="text-[10px] font-bold uppercase tracking-tighter">${item.name}</h3>
                                <p class="text-sm font-serif text-yellow-800 mt-1">$${item.price}</p>
                            </div>
                        </div>
                        <button onclick="removeItem(${index})" class="text-[9px] text-red-500 uppercase font-bold tracking-widest">Remove</button>
                    </div>
                `;
            }).join('');

            document.getElementById('total-price').innerText = '$' + total.toFixed(2);
        }

        function removeItem(index) {
            const user = JSON.parse(localStorage.getItem('user'));
            const cartKey = user ? `cart_${user.email_address}` : 'cart_guest';
            let cart = JSON.parse(localStorage.getItem(cartKey)) || [];
            
            cart.splice(index, 1);
            localStorage.setItem(cartKey, JSON.stringify(cart));
            renderCart();
        }

        function placeOrder() {
            const user = JSON.parse(localStorage.getItem('user'));
            if(!user) {
                Swal.fire({
                    title: 'Authentication Required',
                    text: 'অর্ডারটি সম্পন্ন করতে অনুগ্রহ করে আগে লগইন করুন।',
                    icon: 'info',
                    showCancelButton: true,
                    confirmButtonText: 'LOGIN',
                    cancelButtonText: 'SIGN UP',
                    confirmButtonColor: '#000',
                    cancelButtonColor: '#555',
                    reverseButtons: true
                }).then((result) => {
                    if (result.isConfirmed) window.location.href = '/login.html';
                    else if (result.dismiss === Swal.DismissReason.cancel) window.location.href = '/signup.html';
                });
                return;
            }
            
            // অর্ডার সফল হলে ব্যাগ খালি করা
            Swal.fire({
                title: 'Order Placed!',
                text: 'আপনার অর্ডারটি সফলভাবে গ্রহণ করা হয়েছে।',
                icon: 'success',
                confirmButtonColor: '#000'
            });
            const cartKey = `cart_${user.email_address}`;
            localStorage.removeItem(cartKey);
            setTimeout(() => window.location.href = '/', 2000);
        }

        renderCart();
    </script>
</body>
</html>
