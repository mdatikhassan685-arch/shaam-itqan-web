<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>My Bag | SHAAM ITQAN</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 p-4 font-sans">
    <div class="max-w-md mx-auto">
        <h1 class="text-xl font-bold mb-4">MY BAG</h1>
        <div id="bag-items" class="space-y-3"></div>
        
        <form id="checkout-form" class="mt-6 bg-white p-4 shadow space-y-3">
            <h2 class="font-bold text-sm">ORDER SUMMARY: ৳ <span id="total-price">0</span></h2>
            <input type="text" id="name" required placeholder="Full Name" class="w-full p-2 border text-sm">
            <input type="tel" id="phone" required placeholder="Phone Number" class="w-full p-2 border text-sm">
            <textarea id="address" required placeholder="Delivery Address" class="w-full p-2 border text-sm"></textarea>
            <button type="submit" class="w-full bg-black text-white py-3 text-xs uppercase font-bold">Confirm Order</button>
        </form>
    </div>

    <script>
        const form = document.getElementById('checkout-form');
        form.onsubmit = async (e) => {
            e.preventDefault();
            if(!localStorage.getItem('user_session')) { alert("Login first!"); window.location.href='login.html'; return; }
            
            const data = {
                name: document.getElementById('name').value,
                phone: document.getElementById('phone').value,
                address: document.getElementById('address').value,
                products: localStorage.getItem('shaam_bag'),
                total: document.getElementById('total-price').innerText
            };
            const res = await fetch('/api/orders', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(data) });
            if(res.ok) { alert('Order placed!'); localStorage.removeItem('shaam_bag'); window.location.href='index.html'; }
            else alert('Failed!');
        };
        
        // Load items logic same as before...
        let bag = JSON.parse(localStorage.getItem('shaam_bag')) || [];
        let total = 0;
        document.getElementById('bag-items').innerHTML = bag.map((i, idx) => { total += parseFloat(i.price); return `<div class="flex justify-between bg-white p-2 text-sm"><span>${i.name}</span><span>৳ ${i.price}</span></div>`}).join('');
        document.getElementById('total-price').innerText = total;
    </script>
</body>
</html>
