<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Bag | SHAAM ITQAN</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 p-4">
    <div class="max-w-md mx-auto">
        <h1 class="text-xl font-bold mb-4">YOUR BAG</h1>
        <div id="bag-items" class="space-y-3"></div>
        
        <!-- Checkout Section -->
        <div id="checkout-section" class="mt-6 bg-white p-4 shadow hidden">
            <h2 class="font-bold mb-3">Total: ৳ <span id="total-price">0</span></h2>
            <input type="text" id="name" placeholder="Full Name" class="w-full p-2 border mb-2 text-sm" required>
            <input type="tel" id="phone" placeholder="Phone Number" class="w-full p-2 border mb-2 text-sm" required>
            <textarea id="address" placeholder="Address" class="w-full p-2 border mb-2 text-sm" required></textarea>
            <button onclick="submitOrder()" class="w-full bg-green-600 text-white py-3">CONFIRM ORDER</button>
        </div>
    </div>

    <script>
        async function loadBag() {
            const user = JSON.parse(localStorage.getItem('user_session'));
            if (!user) { window.location.href = 'login.html'; return; }

            const res = await fetch('/api/orders'); 
            const allOrders = await res.json();
            
            // শুধুমাত্র ওই ইউজারের 'Cart' স্ট্যাটাস আইটেমগুলো ফিল্টার করা
            const cartItems = allOrders.filter(o => o.email === user.email && o.status === 'Cart');
            
            const container = document.getElementById('bag-items');
            const checkoutSection = document.getElementById('checkout-section');
            
            if(cartItems.length === 0) {
                container.innerHTML = '<p class="text-center">Bag Empty</p>';
                checkoutSection.classList.add('hidden');
                return;
            }

            let total = 0;
            container.innerHTML = cartItems.map(item => {
                total += parseFloat(item.total_price);
                return `<div class="bg-white p-3 border flex justify-between">
                            <span>${item.products}</span>
                            <span>৳${item.total_price}</span>
                        </div>`;
            }).join('');
            
            document.getElementById('total-price').innerText = total.toFixed(2);
            checkoutSection.classList.remove('hidden');
        }

        async function submitOrder() {
            const user = JSON.parse(localStorage.getItem('user_session'));
            const data = { 
                name: document.getElementById('name').value, 
                phone: document.getElementById('phone').value, 
                address: document.getElementById('address').value,
                email: user.email,
                status: 'Pending'
            };
            
            if(!data.name || !data.phone || !data.address) return alert("Fill everything!");
            
            const res = await fetch('/api/orders', { 
                method: 'POST', 
                headers: {'Content-Type':'application/json'}, 
                body: JSON.stringify(data) 
            });
            
            if(res.ok) { 
                alert('Order Success!'); 
                window.location.href='index.html'; 
            } else {
                alert('Failed to place order.');
            }
        }
        
        loadBag();
    </script>
</body>
</html>
