<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>My Bag | SHAAM ITQAN</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&display=swap');
        body { font-family: 'Montserrat', sans-serif; }
    </style>
</head>
<body class="bg-[#FAFAFA] min-h-screen">

    <!-- Header -->
    <div class="bg-white p-6 shadow-sm border-b border-gray-100 text-center">
        <h1 class="text-xl font-light tracking-[0.2em] text-[#1A1A1A] uppercase">My Bag</h1>
    </div>

    <div id="bag-container" class="max-w-md mx-auto p-4 space-y-4">
        <!-- Bag Items will appear here -->
        <div id="bag-items" class="space-y-4"></div>
        
        <!-- Empty Message -->
        <div id="empty-msg" class="hidden text-center py-20 text-gray-400">
            <p class="text-sm uppercase tracking-widest">Your bag is empty</p>
            <a href="index.html" class="block mt-4 underline text-xs font-bold text-[#D4AF37]">Continue Shopping</a>
        </div>

        <!-- Checkout Section -->
        <div id="checkout-section" class="hidden bg-white p-6 shadow-sm border border-gray-100">
            <div class="flex justify-between font-bold mb-6 text-sm">
                <span>Total Amount:</span>
                <span class="text-[#D4AF37]">৳ <span id="total-price">0</span></span>
            </div>
            <div class="space-y-4">
                <input type="text" id="name" required placeholder="Full Name" class="w-full p-4 border border-gray-200 outline-none text-sm">
                <input type="tel" id="phone" required placeholder="Phone Number" class="w-full p-4 border border-gray-200 outline-none text-sm">
                <textarea id="address" required placeholder="Delivery Address" class="w-full p-4 border border-gray-200 outline-none text-sm h-24"></textarea>
                <button onclick="submitOrder()" class="w-full bg-[#1A1A1A] text-white py-4 font-bold text-[10px] uppercase tracking-[0.2em] hover:bg-[#D4AF37] transition-all">Confirm Order</button>
            </div>
        </div>
    </div>

    <script>
        async function loadBag() {
            const user = JSON.parse(localStorage.getItem('user_session'));
            if (!user) { window.location.href = 'login.html'; return; }

            const res = await fetch('/api/bag?email=' + user.email);
            const items = await res.json();
            
            const bagItems = document.getElementById('bag-items');
            const emptyMsg = document.getElementById('empty-msg');
            const checkoutSection = document.getElementById('checkout-section');
            
            if(items.length === 0) {
                emptyMsg.classList.remove('hidden');
                checkoutSection.classList.add('hidden');
            } else {
                let total = 0;
                bagItems.innerHTML = items.map(i => {
                    total += (i.price * i.quantity);
                    return `
                        <div class="bg-white p-4 border border-gray-100 shadow-sm flex justify-between items-center">
                            <div class="flex items-center gap-4">
                                <img src="${i.image_url}" class="w-16 h-16 object-cover border">
                                <div>
                                    <p class="text-sm font-semibold">${i.product_name}</p>
                                    <p class="text-[10px] text-gray-500">Size: ${i.size} | Qty: ${i.quantity}</p>
                                    <p class="text-sm font-bold text-[#D4AF37]">৳${i.price * i.quantity}</p>
                                </div>
                            </div>
                        </div>`;
                }).join('');
                document.getElementById('total-price').innerText = total;
                checkoutSection.classList.remove('hidden');
            }
        }

        async function submitOrder() {
            const user = JSON.parse(localStorage.getItem('user_session'));
            const data = {
                name: document.getElementById('name').value,
                phone: document.getElementById('phone').value,
                address: document.getElementById('address').value,
                email: user.email,
                products: "Bag Order",
                total_price: document.getElementById('total-price').innerText,
                status: 'Pending',
                image_url: 'N/A'
            };
            if(!data.name || !data.phone || !data.address) return alert("All fields required!");
            
            await fetch('/api/orders', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(data) });
            alert('Order Success!'); window.location.href='index.html';
        }
        loadBag();
    </script>
</body>
</html>
