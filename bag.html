<!DOCTYPE html>
<html lang="en">
<head>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 p-4">
    <div class="max-w-md mx-auto">
        <h1 class="text-xl font-bold mb-4 uppercase">My Bag</h1>
        <div id="bag-items" class="space-y-4"></div>
        <div id="total-section" class="mt-6 bg-white p-4 shadow hidden">
            <p class="font-bold">Total Amount: ৳<span id="total-price">0</span></p>
            <button onclick="window.location.href='checkout.html?from=bag'" class="w-full bg-black text-white py-3 mt-4">PROCEED TO CHECKOUT</button>
        </div>
    </div>

    <script>
        async function loadBag() {
            const user = JSON.parse(localStorage.getItem('user_session'));
            const res = await fetch('/api/bag?email=' + user.email);
            const items = await res.json();
            let total = 0;
            document.getElementById('bag-items').innerHTML = items.map(i => {
                total += (i.price * i.quantity);
                return `
                    <div class="flex justify-between bg-white p-3 shadow">
                        <p>${i.product_name} x ${i.quantity} (৳${i.price})</p>
                        <button onclick="removeItem(${i.id})" class="text-red-500 font-bold">Remove</button>
                    </div>`;
            }).join('');
            document.getElementById('total-price').innerText = total;
            if(items.length > 0) document.getElementById('total-section').classList.remove('hidden');
        }

        async function removeItem(id) {
            await fetch('/api/bag', { method: 'DELETE', headers: {'Content-Type':'application/json'}, body: JSON.stringify({id}) });
            loadBag();
        }
        loadBag();
    </script>
</body>
</html>
