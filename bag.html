<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Bag | SHAAM ITQAN</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&display=swap');
        .luxury-font { font-family: 'Playfair Display', serif; }
    </style>
</head>
<body class="bg-[#FDF8EF] text-[#333333] font-serif min-h-screen">

    <div class="max-w-md mx-auto p-4">
        <nav class="flex justify-between items-center mb-6 border-b border-[#C1A44E] pb-4">
            <h1 class="text-xl font-bold luxury-font tracking-widest">MY BAG</h1>
            <a href="index.html" class="border border-[#333333] px-3 py-1 text-xs hover:bg-[#333333] hover:text-white transition">SHOP</a>
        </nav>

        <div id="bag-items" class="space-y-4">
            <p class="text-center text-gray-500 py-10">Loading...</p>
        </div>

        <div id="checkout-section" class="mt-8 p-4 bg-white border border-[#C1A44E]/30 hidden">
            <h2 class="text-lg font-bold mb-3 luxury-font">ORDER SUMMARY</h2>
            <div class="flex justify-between mb-4 border-b pb-2 text-sm">
                <span>Total Amount</span>
                <span class="font-bold text-[#C1A44E]">৳ <span id="total-price">0</span></span>
            </div>
            
            <div class="space-y-3">
                <input type="text" id="name" placeholder="Full Name" class="w-full p-3 border border-gray-300 text-sm">
                <input type="text" id="phone" placeholder="Phone Number" class="w-full p-3 border border-gray-300 text-sm">
                <textarea id="address" placeholder="Delivery Address" class="w-full p-3 border border-gray-300 text-sm"></textarea>
                <button onclick="submitOrder()" id="order-btn" class="w-full bg-[#333333] text-white py-3 uppercase text-sm tracking-widest hover:bg-[#C1A44E] transition">CONFIRM ORDER</button>
            </div>
        </div>
    </div>

    <script>
        function loadBag() {
            let bag = JSON.parse(localStorage.getItem('shaam_bag')) || [];
            const bagContainer = document.getElementById('bag-items');
            const checkoutSection = document.getElementById('checkout-section');
            
            if (bag.length === 0) {
                bagContainer.innerHTML = '<p class="text-center py-10">Your bag is empty!</p>';
                checkoutSection.classList.add('hidden');
                return;
            }

            let total = 0;
            bagContainer.innerHTML = '';
            bag.forEach((item, index) => {
                total += parseFloat(item.price);
                bagContainer.innerHTML += `
                    <div class="bg-white p-3 border border-gray-200 flex items-center gap-4">
                        <img src="${item.image_url}" class="w-16 h-16 object-cover border">
                        <div class="flex-grow">
                            <h3 class="font-semibold text-sm">${item.name}</h3>
                            <p class="text-[#C1A44E] font-bold text-sm">৳ ${item.price}</p>
                        </div>
                        <button onclick="removeItem(${index})" class="text-xs text-red-500 uppercase">Remove</button>
                    </div>
                `;
            });
            document.getElementById('total-price').innerText = total.toFixed(2);
            checkoutSection.classList.remove('hidden');
        }

        function removeItem(index) {
            let bag = JSON.parse(localStorage.getItem('shaam_bag'));
            bag.splice(index, 1);
            localStorage.setItem('shaam_bag', JSON.stringify(bag));
            loadBag();
        }

        async function submitOrder() {
            const user = localStorage.getItem('user_session');
            if (!user) { alert("Please login first!"); window.location.href = 'login.html'; return; }

            const orderData = {
                name: document.getElementById('name').value,
                phone: document.getElementById('phone').value,
                address: document.getElementById('address').value,
                products: localStorage.getItem('shaam_bag'),
                total: document.getElementById('total-price').innerText
            };

            const btn = document.getElementById('order-btn');
            btn.innerText = "Processing...";
            
            const res = await fetch('/api/orders', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(orderData)
            });

            if (res.ok) {
                alert('Order placed successfully!');
                localStorage.removeItem('shaam_bag');
                window.location.href = 'index.html';
            } else {
                alert('Error: Please check your internet or DB connection.');
                btn.innerText = "CONFIRM ORDER";
            }
        }
        loadBag();
    </script>
</body>
</html>
