<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Bag | SHAAM ITQAN</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 p-4">
    <div class="max-w-md mx-auto">
        <h1 class="text-xl font-bold mb-4">YOUR BAG</h1>
        <div id="bag-items" class="space-y-3"></div>
        <div id="checkout-section" class="mt-6 bg-white p-4 shadow hidden">
            <h2 class="font-bold mb-3">Confirm Order</h2>
            <input type="text" id="name" placeholder="Full Name" class="w-full p-2 border mb-2 text-sm" required>
            <input type="tel" id="phone" placeholder="Phone Number" class="w-full p-2 border mb-2 text-sm" required>
            <textarea id="address" placeholder="Address" class="w-full p-2 border mb-2 text-sm" required></textarea>
            <button onclick="submitOrder()" class="w-full bg-green-600 text-white py-3">CONFIRM ORDER</button>
        </div>
    </div>
    <script>
        async function loadBag() {
    const user = JSON.parse(localStorage.getItem('user_session'));
    if (!user) window.location.href = 'login.html';

    const res = await fetch('/api/orders?email=' + user.email);
    const cartItems = await res.json();
    const container = document.getElementById('bag-items');
    
    container.innerHTML = cartItems.map(item => `
        <div class="bg-white p-3 border">${item.products} - ৳${item.total_price}</div>
    `).join('');
        }
        async function submitOrder() {
            const data = { name: document.getElementById('name').value, phone: document.getElementById('phone').value, address: document.getElementById('address').value, products: localStorage.getItem('shaam_bag'), total_price: 0 };
            if(!data.name || !data.phone || !data.address) return alert("Fill everything!");
            const res = await fetch('/api/orders', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(data) });
            if(res.ok) { alert('Order Success!'); localStorage.removeItem('shaam_bag'); window.location.href='index.html'; }
        }
        loadBag();
    </script>
</body>
</html>
