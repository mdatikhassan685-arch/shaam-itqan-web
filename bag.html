<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>My Bag | SHAAM ITQAN</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&display=swap');
        .luxury-font { font-family: 'Playfair Display', serif; }
    </style>
</head>
<body class="bg-gray-50 p-4 font-sans pb-10">

    <div class="max-w-md mx-auto">
        <!-- Header -->
        <div class="flex items-center justify-between mb-6 border-b pb-3">
            <a href="index.html" class="text-sm font-bold tracking-widest uppercase hover:underline flex items-center gap-1">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
                </svg>
                Back
            </a>
            <h1 class="text-lg font-bold tracking-widest luxury-font uppercase">YOUR BAG</h1>
            <div class="w-8"></div>
        </div>
        
        <!-- Bag Items List Container -->
        <div id="bag-items" class="space-y-3">
            <p class="text-center py-10 text-gray-500">Loading your items...</p>
        </div>
        
        <!-- Checkout Form Section -->
        <div id="checkout-section" class="mt-6 bg-white p-4 shadow hidden border border-gray-200 rounded">
            <h2 class="font-bold mb-3 border-b pb-2 tracking-widest uppercase text-xs">Cart Summary</h2>
            
            <div class="flex justify-between font-bold mb-4 text-sm">
                <span>Selected Subtotal:</span>
                <span class="text-[#D4AF37]">৳ <span id="total-price">0.00</span></span>
            </div>
            
            <button onclick="goToCheckout()" class="w-full bg-black text-white py-3.5 mt-5 uppercase tracking-widest text-xs font-bold hover:bg-[#D4AF37] transition duration-300 rounded">
                PROCEED TO CHECKOUT
            </button>
        </div>
    </div>

    <script>
        async function loadBag() {
            const user = JSON.parse(localStorage.getItem('user_session'));
            if (!user) { 
                window.location.href = 'login.html'; 
                return; 
            }

            try {
                const res = await fetch('/api/bag?email=' + user.email);
                
                if (!res.ok) {
                    throw new Error("Failed to fetch bag items");
                }
                
                const cartItems = await res.json();
                const container = document.getElementById('bag-items');
                const checkoutSection = document.getElementById('checkout-section');
                
                if (cartItems.length === 0) {
                    container.innerHTML = '<p class="text-center py-10 text-gray-500 text-sm">Your bag is currently empty.</p>';
                    checkoutSection.classList.add('hidden');
                    return;
                }

                container.innerHTML = cartItems.map(item => {
                    const itemQty = parseInt(item.quantity) || 1;
                    const itemPrice = parseFloat(item.price);
                    const subtotal = itemPrice * itemQty;

                    // রিয়েল-টাইম সাইজ ভিত্তিক স্টকের অস্তিত্ব পরীক্ষা করা
                    const hasStockData = item.stock_s !== undefined && item.stock_s !== null;

                    // সাইজ ভিত্তিক ডাইনামিক ড্রপডাউন রেন্ডারিং লজিক (স্টক না থাকলে Sold Out দেখাবে)
                    const sizeOptionsHtml = ['S', 'M', 'L', 'XL', 'XXL'].map(sz => {
                        const isSelected = sz === item.size ? 'selected' : '';
                        if (hasStockData) {
                            const col = 'stock_' + sz.toLowerCase();
                            const stock = parseInt(item[col]) || 0;
                            const isDisabled = stock <= 0 ? 'disabled' : '';
                            const label = stock <= 0 ? `${sz} (Sold Out)` : sz;
                            return `<option value="${sz}" data-stock="${stock}" ${isSelected} ${isDisabled}>${label}</option>`;
                        } else {
                            return `<option value="${sz}" data-stock="999" ${isSelected}>${sz}</option>`;
                        }
                    }).join('');

                    return `
                        <div class="bg-white p-3 border border-gray-200 flex items-center gap-4 shadow-sm rounded">
                            <!-- সিলেক্টিভ চেকআউট চেকবক্স -->
                            <input type="checkbox" class="cart-checkbox w-4 h-4 accent-black cursor-pointer" data-id="${item.id}" data-price="${itemPrice}" data-qty="${itemQty}" checked onchange="calculateSubtotal()">
                            
                            <img src="${item.image_url || 'https://via.placeholder.com/64'}" class="w-16 h-16 object-cover border border-gray-100 rounded">
                            <div class="flex-grow">
                                <h3 class="font-bold text-xs uppercase tracking-wider text-gray-800">${item.product_name}</h3>
                                
                                <!-- ডাইনামিক সাইজ সিলেকশন অপশন (ড্রপডাউন) -->
                                <div class="flex items-center gap-1.5 mt-1 text-[10px] text-gray-500 font-sans">
                                    <span>Size:</span>
                                    <select onchange="updateCartSize(${item.id}, this.value, ${itemQty}, this.options[this.selectedIndex].getAttribute('data-stock'))" class="bg-white border border-gray-300 rounded px-1.5 py-0.5 text-xs font-bold text-black focus:outline-none focus:border-black shrink-0">
                                        ${sizeOptionsHtml}
                                    </select>
                                </div>
                                
                                <!-- প্লাস-মাইনাস কোয়ান্টিটি চেঞ্জার বাটন -->
                                <div class="flex items-center gap-1.5 mt-2.5">
                                    <button onclick="updateCartQtyAndSize(${item.id}, ${itemQty - 1}, undefined)" class="w-6 h-6 flex items-center justify-center border border-gray-300 rounded text-xs font-bold bg-gray-50 hover:bg-gray-100 transition">-</button>
                                    <span class="text-xs font-bold px-1.5 min-w-[12px] text-center">${itemQty}</span>
                                    <button onclick="updateCartQtyAndSize(${item.id}, ${itemQty + 1}, undefined)" class="w-6 h-6 flex items-center justify-center border border-gray-300 rounded text-xs font-bold bg-gray-50 hover:bg-gray-100 transition">+</button>
                                </div>

                                <p class="text-[#D4AF37] font-bold text-xs mt-2.5">৳ ${subtotal.toFixed(2)}</p>
                            </div>
                            <button onclick="removeItem(${item.id})" class="text-red-500 text-[10px] font-bold uppercase hover:underline tracking-widest px-2">
                                Remove
                            </button>
                        </div>`;
                }).join('');
                
                calculateSubtotal(); 
                checkoutSection.classList.remove('hidden');
            } catch (error) {
                console.error("Failed to load bag:", error);
                document.getElementById('bag-items').innerHTML = '<p class="text-center py-10 text-red-500 text-xs">Error loading cart items.</p>';
            }
        }

        // সাইজ পরিবর্তনের সময় স্টক ও কোয়ান্টিটি ভ্যালিডেশন চেক করার মেকানিজম
        async function updateCartSize(id, newSize, currentQty, availableStockStr) {
            const availableStock = parseInt(availableStockStr);
            if (!isNaN(availableStock) && currentQty > availableStock) {
                alert(`Sorry, we only have ${availableStock} items in stock for size ${newSize}. Quantity has been adjusted to ${availableStock}.`);
                await updateCartQtyAndSize(id, availableStock, newSize);
                return;
            }
            await updateCartQtyAndSize(id, currentQty, newSize);
        }

        // রিয়েল-টাইমে ডাটাবেজে কার্টের কোয়ান্টিটি এবং সাইজ আপডেট করার নিরাপদ ফাংশন
        async function updateCartQtyAndSize(id, newQty, newSize) {
            if (newQty !== undefined && newQty < 1) {
                removeItem(id);
                return;
            }

            try {
                const payload = { id };
                if (newQty !== undefined) payload.quantity = newQty;
                if (newSize !== undefined) payload.size = newSize;

                const res = await fetch('/api/bag', {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if (res.ok) {
                    loadBag(); // রিয়েল-টাইমে পুনরায় কার্ট রি-রেন্ডার করবে
                } else {
                    alert("Failed to update cart. Please try again.");
                }
            } catch (error) {
                console.error("Cart Update Error:", error);
            }
        }

        // রিয়েল-টাইমে চেক করা চেকবক্স অনুযায়ী সাবটোটাল লাইভ পরিবর্তন করার ফাংশন
        function calculateSubtotal() {
            let total = 0;
            const checkboxes = document.querySelectorAll('.cart-checkbox');
            checkboxes.forEach(cb => {
                if (cb.checked) {
                    const price = parseFloat(cb.getAttribute('data-price'));
                    const qty = parseInt(cb.getAttribute('data-qty'));
                    total += price * qty;
                }
            });
            document.getElementById('total-price').innerText = total.toFixed(2);
        }

        async function removeItem(id) {
            if (!confirm("Are you sure you want to remove this item?")) {
                return;
            }

            try {
                const res = await fetch('/api/bag', { 
                    method: 'DELETE', 
                    headers: {'Content-Type':'application/json'}, 
                    body: JSON.stringify({ id }) 
                });
                
                if (res.ok) {
                    loadBag();
                } else {
                    alert('Failed to remove item.');
                }
            } catch (error) {
                alert('An error occurred while removing the item.');
                console.error(error);
            }
        }

        function goToCheckout() {
            const checkedIds = [];
            const checkboxes = document.querySelectorAll('.cart-checkbox');
            checkboxes.forEach(cb => {
                if (cb.checked) {
                    checkedIds.push(parseInt(cb.getAttribute('data-id')));
                }
            });

            if (checkedIds.length === 0) {
                alert("Please select at least one item to proceed to checkout!");
                return;
            }

            localStorage.setItem('checkout_item_ids', JSON.stringify(checkedIds));
            window.location.href = 'checkout.html';
        }

        document.addEventListener('DOMContentLoaded', loadBag);
    </script>
</body>
</html>
