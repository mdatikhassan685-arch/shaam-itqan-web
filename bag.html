<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Bag | SHAAM ITQAN</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&display=swap');
        .luxury-font { font-family: 'Playfair Display', serif; }
    </style>
</head>
<body class="bg-[#FDF8EF] text-[#333333] font-serif p-4">

    <div class="max-w-md mx-auto">
        <nav class="flex justify-between items-center mb-6 border-b border-[#C1A44E] pb-4">
            <h1 class="text-xl font-bold luxury-font tracking-widest">MY BAG</h1>
            <a href="index.html" class="border border-[#333333] px-3 py-1 text-xs hover:bg-[#333333] hover:text-white transition">SHOP</a>
        </nav>

        <div id="bag-items" class="space-y-4">
            <!-- Products will load here with images -->
        </div>

        <div id="checkout-section" class="mt-8 p-4 bg-white border border-[#C1A44E]/30 hidden">
            <h2 class="text-lg font-bold mb-3 luxury-font">ORDER SUMMARY</h2>
            <div class="flex justify-between mb-4 border-b pb-2 text-sm">
                <span>Total Amount</span>
                <span class="font-bold">৳ <span id="total-price">0</span></span>
            </div>
            
            <div class="space-y-3">
                <input type="text" id="name" placeholder="Full Name" class="w-full p-2 border border-gray-300 text-sm">
                <input type="text" id="phone" placeholder="Phone Number" class="w-full p-2 border border-gray-300 text-sm">
                <textarea id="address" placeholder="Delivery Address" class="w-full p-2 border border-gray-300 text-sm"></textarea>
                <button onclick="submitOrder()" class="w-full bg-[#333333] text-white py-3 uppercase text-sm tracking-widest hover:bg-[#C1A44E] transition">CONFIRM ORDER</button>
            </div>
        </div>
    </div>

    <script>
        function loadBag() {
            let bag = JSON.parse(localStorage.getItem('shaam_bag')) || [];
            const bagContainer = document.getElementById('bag-items');
            const checkoutSection = document.getElementById('checkout-section');
            const totalElement = document.getElementById('total-price');

            if (bag.length === 0) {
                bagContainer.innerHTML = '<p class="text-center text-gray-500 py-10">Your bag is empty!</p>';
                checkoutSection.classList.add('hidden');
                return;
            }

            let total = 0;
            bagContainer.innerHTML = '';
            bag.forEach((item, index) => {
                total += parseFloat(item.price);
                bagContainer.innerHTML += `
                    <div class="bg-white p-3 border border-gray-200 flex items-center gap-4">
                        <img src="${item.image_url}" alt="${item.name}" class="w-16 h-16 object-cover border border-[#C1A44E]/30">
                        <div class="flex-grow">
                            <h3 class="font-semibold text-sm">${item.name}</h3>
                            <p class="text-[#C1A44E] font-bold text-sm">৳ ${item.price}</p>
                        </div>
                        <button onclick="removeItem(${index})" class="text-gray-400 hover:text-red-500 text-xs uppercase">Remove</button>
                    </div>
                `;
            });

            totalElement.innerText = total.toFixed(2);
            checkoutSection.classList.remove('hidden');
        }

        function removeItem(index) {
            let bag = JSON.parse(localStorage.getItem('shaam_bag'));
            bag.splice(index, 1);
            localStorage.setItem('shaam_bag', JSON.stringify(bag));
            loadBag();
        }

        async function submitOrder() {
            // ... (আপনার আগের সাবমিট কোডটিই থাকবে)
            // শুধু নিশ্চিত করুন api/submit-order আপনার সিস্টেমে ঠিকমতো আছে
            const name = document.getElementById('name').value;
            const phone = document.getElementById('phone').value;
            const address = document.getElementById('address').value;
            const bag = JSON.parse(localStorage.getItem('shaam_bag'));
            const total = document.getElementById('total-price').innerText;

            if(!name || !phone || !address) return alert("Please fill details!");

            const response = await fetch('/api/submit-order', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ name, phone, address, products: bag, total })
            });

            if (response.ok) {
                alert('Order placed successfully!');
                localStorage.removeItem('shaam_bag');
                window.location.href = 'index.html';
            }
        }

        loadBag();
    </script>
</body>
</html>
