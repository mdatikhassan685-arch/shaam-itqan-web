<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>My Bag | SHAAM ITQAN</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&display=swap');
        .luxury-font { font-family: 'Playfair Display', serif; }
    </style>
</head>
<body class="bg-gray-50 p-4 font-sans pb-10">

    <div class="max-w-md mx-auto">
        <!-- Header with Back Button -->
        <div class="flex items-center justify-between mb-6 border-b pb-3">
            <a href="index.html" class="text-sm font-bold tracking-widest uppercase hover:underline flex items-center gap-1">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
                </svg>
                Back
            </a>
            <h1 class="text-lg font-bold tracking-widest luxury-font uppercase">YOUR BAG</h1>
            <div class="w-8"></div>
        </div>
        
        <!-- Bag Items List Container -->
        <div id="bag-items" class="space-y-3">
            <p class="text-center py-10 text-gray-500">Loading your items...</p>
        </div>
        
        <!-- Checkout Form Section -->
        <div id="checkout-section" class="mt-6 bg-white p-4 shadow hidden border border-gray-200">
            <h2 class="font-bold mb-3 border-b pb-2 tracking-widest uppercase text-xs">Confirm Order Details</h2>
            
            <div class="flex justify-between font-bold mb-4 text-sm">
                <span>Total Amount:</span>
                <span class="text-[#D4AF37]">৳ <span id="total-price">0</span></span>
            </div>
            
            <div class="space-y-3">
                <input type="text" id="name" placeholder="Full Name" class="w-full p-3 border text-sm focus:outline-none focus:border-[#D4AF37]">
                <input type="tel" id="phone" placeholder="Phone Number" class="w-full p-3 border text-sm focus:outline-none focus:border-[#D4AF37]">
                <textarea id="address" placeholder="Delivery Address" rows="3" class="w-full p-3 border text-sm focus:outline-none focus:border-[#D4AF37]"></textarea>
            </div>
            
            <button onclick="submitOrder()" class="w-full bg-black text-white py-3.5 mt-5 uppercase tracking-widest text-xs font-bold hover:bg-[#D4AF37] transition duration-300">
                CONFIRM ORDER
            </button>
        </div>
    </div>

    <script>
        async function loadBag() {
            const user = JSON.parse(localStorage.getItem('user_session'));
            if (!user) { 
                window.location.href = 'login.html'; 
                return; 
            }

            try {
                const res = await fetch('/api/bag?email=' + user.email);
                
                if (!res.ok) {
                    throw new Error("Failed to fetch bag items");
                }
                
                const cartItems = await res.json();
                const container = document.getElementById('bag-items');
                const checkoutSection = document.getElementById('checkout-section');
                
                if (cartItems.length === 0) {
                    container.innerHTML = '<p class="text-center py-10 text-gray-500 text-sm">Your bag is currently empty.</p>';
                    checkoutSection.classList.add('hidden');
                    return;
                }

                let total = 0;
                container.innerHTML = cartItems.map(item => {
                    const itemQty = parseInt(item.quantity) || 1;
                    const itemPrice = parseFloat(item.price);
                    const subtotal = itemPrice * itemQty;
                    total += subtotal;

                    return `
                        <div class="bg-white p-3 border border-gray-200 flex items-center gap-4 shadow-sm rounded">
                            <img src="${item.image_url || 'https://via.placeholder.com/64'}" class="w-16 h-16 object-cover border border-gray-100 rounded">
                            <div class="flex-grow">
                                <h3 class="font-bold text-xs uppercase tracking-wider text-gray-800">${item.product_name}</h3>
                                <!-- সাইজ এবং পরিমাণ প্রদর্শন করা হচ্ছে -->
                                <p class="text-gray-500 text-[10px] mt-0.5 font-sans">Size: <b class="text-black">${item.size}</b> | Qty: <b class="text-black">${itemQty}</b></p>
                                <p class="text-[#D4AF37] font-bold text-xs mt-1">৳ ${subtotal.toFixed(2)}</p>
                            </div>
                            <button onclick="removeItem(${item.id})" class="text-red-500 text-[10px] font-bold uppercase hover:underline tracking-widest px-2">
                                Remove
                            </button>
                        </div>`;
                }).join('');
                
                document.getElementById('total-price').innerText = total.toFixed(2);
                checkoutSection.classList.remove('hidden');
            } catch (error) {
                console.error("Failed to load bag:", error);
                document.getElementById('bag-items').innerHTML = '<p class="text-center py-10 text-red-500 text-xs">Error loading cart items.</p>';
            }
        }

        async function removeItem(id) {
            if (!confirm("Are you sure you want to remove this item?")) {
                return;
            }

            try {
                const res = await fetch('/api/bag', { 
                    method: 'DELETE', 
                    headers: {'Content-Type':'application/json'}, 
                    body: JSON.stringify({ id }) 
                });
                
                if (res.ok) {
                    loadBag();
                } else {
                    alert('Failed to remove item.');
                }
            } catch (error) {
                alert('An error occurred while removing the item.');
                console.error(error);
            }
        }

        async function submitOrder() {
            const user = JSON.parse(localStorage.getItem('user_session'));
            const name = document.getElementById('name').value.trim();
            const phone = document.getElementById('phone').value.trim();
            const address = document.getElementById('address').value.trim();

            if (!name || !phone || !address) {
                alert("Please fill in all order details!");
                return;
            }

            const data = { 
                action: 'checkout',
                name: name, 
                phone: phone, 
                address: address, 
                email: user.email
            };
            
            try {
                const res = await fetch('/api/orders', { 
                    method: 'POST', 
                    headers: {'Content-Type':'application/json'}, 
                    body: JSON.stringify(data) 
                });
                
                if (res.ok) { 
                    alert('Order Placed Successfully!'); 
                    window.location.href = 'index.html'; 
                } else {
                    alert('Failed to place order.');
                }
            } catch (error) {
                alert('Error placing order.');
                console.error(error);
            }
        }

        document.addEventListener('DOMContentLoaded', loadBag);
    </script>
</body>
</html>
