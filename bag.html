<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Bag | SHAAM ITQAN</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&display=swap');
        .luxury-font { font-family: 'Playfair Display', serif; }
    </style>
</head>
<body class="bg-[#FDF8EF] text-[#333333] font-serif p-6">

    <div class="max-w-2xl mx-auto">
        <nav class="flex justify-between items-center mb-8 border-b border-[#C1A44E] pb-4">
            <h1 class="text-2xl font-bold luxury-font tracking-widest">MY BAG</h1>
            <a href="index.html" class="border border-[#333333] px-4 py-1 text-sm hover:bg-[#333333] hover:text-white transition">CONTINUE SHOPPING</a>
        </nav>

        <div id="bag-items" class="space-y-4"></div>

        <div id="checkout-section" class="mt-8 p-6 bg-white border border-[#C1A44E]/30 hidden">
            <h2 class="text-2xl font-bold mb-4 luxury-font">ORDER SUMMARY</h2>
            <div class="flex justify-between mb-4 border-b pb-2">
                <span>Total Amount</span>
                <span class="font-bold">৳ <span id="total-price">0</span></span>
            </div>
            
            <div class="space-y-3 mt-4">
                <input type="text" id="name" placeholder="Full Name" class="w-full p-3 border border-gray-300">
                <input type="text" id="phone" placeholder="Phone Number" class="w-full p-3 border border-gray-300">
                <textarea id="address" placeholder="Delivery Address" class="w-full p-3 border border-gray-300"></textarea>
                <button onclick="submitOrder()" class="w-full bg-[#333333] text-white py-3 uppercase tracking-widest hover:bg-[#C1A44E] transition">Confirm Order</button>
            </div>
        </div>
    </div>
    <script>
        async function checkout() {
            const bag = JSON.parse(localStorage.getItem('shaam_bag'));
            const data = {
                name: document.getElementById('name').value,
                phone: document.getElementById('phone').value,
                address: document.getElementById('address').value,
                products: bag,
                total: bag.reduce((sum, item) => sum + parseFloat(item.price), 0)
            };
            const res = await fetch('/api/orders', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(data)
            });
            if(res.ok) { alert('Order Success!'); localStorage.removeItem('shaam_bag'); window.location.href='index.html'; }
        }
    </script>
</body>
</html>
