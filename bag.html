<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="p-4 bg-gray-100">
    <h1 class="text-xl font-bold mb-4">My Bag</h1>
    <div id="items"></div>
    <div class="mt-4">
        <input id="name" placeholder="Name" class="w-full border p-2 mb-1">
        <input id="phone" placeholder="Phone" class="w-full border p-2 mb-1">
        <textarea id="address" placeholder="Address" class="w-full border p-2 mb-1"></textarea>
        <button onclick="checkout()" class="bg-green-600 text-white w-full p-2">Confirm Order</button>
    </div>
    <script>
        async function checkout() {
            const bag = JSON.parse(localStorage.getItem('shaam_bag'));
            const data = {
                name: document.getElementById('name').value,
                phone: document.getElementById('phone').value,
                address: document.getElementById('address').value,
                products: bag,
                total: bag.reduce((sum, item) => sum + parseFloat(item.price), 0)
            };
            const res = await fetch('/api/orders', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(data)
            });
            if(res.ok) { alert('Order Success!'); localStorage.removeItem('shaam_bag'); window.location.href='index.html'; }
        }
    </script>
</body>
</html>
