<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>My Bag | SHAAM ITQAN</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 p-4">
    <div class="max-w-md mx-auto">
        <h1 class="text-xl font-bold mb-4 uppercase">YOUR BAG</h1>
        
        <!-- Bag Items List -->
        <div id="bag-items" class="space-y-3">
            <p class="text-center py-10 text-gray-500">Loading your items...</p>
        </div>
        
        <!-- Checkout Section -->
        <div id="checkout-section" class="mt-6 bg-white p-4 shadow hidden border border-gray-200">
            <h2 class="font-bold mb-3 border-b pb-2">Confirm Order</h2>
            <div class="flex justify-between font-bold mb-4">
                <span>Total Amount:</span>
                <span class="text-[#D4AF37]">৳ <span id="total-price">0</span></span>
            </div>
            <input type="text" id="name" placeholder="Full Name" class="w-full p-2 border mb-2 text-sm">
            <input type="tel" id="phone" placeholder="Phone Number" class="w-full p-2 border mb-2 text-sm">
            <textarea id="address" placeholder="Delivery Address" class="w-full p-2 border mb-2 text-sm"></textarea>
            <button onclick="submitOrder()" class="w-full bg-black text-white py-3 uppercase tracking-widest text-sm hover:bg-[#D4AF37] transition">ORDER PRESS</button>
        </div>
    </div>
    <script src="bag.js"></script>
</body>
</html>
