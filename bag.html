<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Bag</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body class="bg-gray-50 p-4 font-serif">
    <div class="max-w-md mx-auto">
        <h1 class="text-2xl font-bold mb-6 text-center uppercase tracking-widest">Shopping Bag</h1>
        <div id="bag-items" class="space-y-4"></div>
        <div id="checkout-section" class="mt-8 bg-white p-6 shadow hidden border border-[#C1A44E]/20">
            <div class="flex justify-between font-bold mb-6 text-[#C1A44E]"><span>Total:</span><span>৳ <span id="total-price">0</span></span></div>
            <input type="text" id="name" placeholder="Full Name" class="w-full p-3 border mb-3 text-sm">
            <input type="tel" id="phone" placeholder="Phone Number" class="w-full p-3 border mb-3 text-sm">
            <textarea id="address" placeholder="Delivery Address" class="w-full p-3 border mb-6 text-sm"></textarea>
            <button onclick="submitOrder()" class="w-full bg-[#333333] text-white py-3 uppercase text-sm">Confirm Order</button>
        </div>
    </div>

    <script>
        async function loadBag() {
            const userStr = localStorage.getItem('user_session');
            if (!userStr) { window.location.href = 'login.html'; return; }
            const user = JSON.parse(userStr);

            const res = await fetch('/api/orders?email=' + user.email);
            const allOrders = await res.json();
            const cartItems = allOrders.filter(o => o.status === 'Cart');
            
            const container = document.getElementById('bag-items');
            if(cartItems.length === 0) { container.innerHTML = '<p class="text-center py-10">Bag is empty</p>'; return; }

            let total = 0;
            container.innerHTML = cartItems.map(i => {
                total += parseFloat(i.total_price);
                return `<div class="bg-white p-3 flex items-center gap-4 border">${i.products}<button onclick="removeItem(${i.id})" class="ml-auto text-red-500 text-xs">Remove</button></div>`;
            }).join('');
            document.getElementById('total-price').innerText = total.toFixed(2);
            document.getElementById('checkout-section').classList.remove('hidden');
        }

        async function submitOrder() {
            const user = JSON.parse(localStorage.getItem('user_session'));
            const data = { name: document.getElementById('name').value, phone: document.getElementById('phone').value, address: document.getElementById('address').value, email: user.email };
            
            if(!data.name || !data.phone || !data.address) return Swal.fire('Error', 'Fill all fields', 'error');
            
            const res = await fetch('/api/orders', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(data) });
            if(res.ok) { Swal.fire('Success', 'Order placed!', 'success').then(() => window.location.href='index.html'); }
        }
        
        async function removeItem(id) { await fetch('/api/orders', { method: 'DELETE', headers: {'Content-Type':'application/json'}, body: JSON.stringify({id}) }); loadBag(); }
        loadBag();
    </script>
</body>
</html>
