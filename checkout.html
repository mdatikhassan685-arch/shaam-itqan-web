<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout | SHAAM ITQAN</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#FAFAFA] min-h-screen p-4">
    <div class="max-w-md mx-auto bg-white p-6 shadow-sm border border-gray-100">
        <h2 class="text-xl font-light tracking-[0.2em] text-center mb-8">CHECKOUT</h2>
        <div id="summary" class="mb-6 p-4 bg-[#FDF8EF] border-l-4 border-[#D4AF37] text-sm"></div>
        
        <form id="checkoutForm" class="space-y-4">
            <input type="text" id="name" required placeholder="Full Name" class="w-full p-3 border">
            <input type="tel" id="phone" required placeholder="Phone Number" class="w-full p-3 border">
            <input type="tel" id="alt_phone" placeholder="Alt Phone (Optional)" class="w-full p-3 border">
            <select id="district" class="w-full p-3 border">
                <option value="Dhaka">Dhaka</option>
                <option value="Outside Dhaka">Outside Dhaka</option>
            </select>
            <textarea id="address" required placeholder="Full Address" class="w-full p-3 border h-20"></textarea>
            <select id="payment" class="w-full p-3 border">
                <option value="COD">Cash On Delivery</option>
            </select>
            <textarea id="note" placeholder="Order Note (Optional)" class="w-full p-3 border h-16"></textarea>
            <button type="submit" class="w-full bg-black text-white py-4 font-bold uppercase tracking-widest hover:bg-[#D4AF37] transition">PLACE ORDER</button>
        </form>
    </div>

    <script>
        let orderId = null;
        async function loadOrder() {
            const res = await fetch('/api/orders?status=Checkout_Pending');
            const data = await res.json();
            if(data.length > 0) {
                const o = data[0]; orderId = o.id;
                document.getElementById('summary').innerHTML = `<p class="font-bold text-sm">${o.products}</p><p class="text-[#D4AF37] font-bold mt-2">Total: ৳${o.total_price}</p>`;
            }
        }
        document.getElementById('checkoutForm').onsubmit = async (e) => {
            e.preventDefault();
            const payload = {
                id: orderId, status: 'Pending',
                name: document.getElementById('name').value,
                phone: document.getElementById('phone').value,
                alt_phone: document.getElementById('alt_phone').value,
                district: document.getElementById('district').value,
                address: document.getElementById('address').value,
                payment_method: document.getElementById('payment').value,
                order_note: document.getElementById('note').value
            };
            const res = await fetch('/api/orders', { method: 'PUT', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(payload) });
            if(res.ok) { alert("Order Placed Successfully!"); window.location.href = 'index.html'; }
        }
        loadOrder();
    </script>
</body>
</html>
