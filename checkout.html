<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>Checkout | SHAAM ITQAN</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&display=swap');
        .luxury-font { font-family: 'Playfair Display', serif; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-gray-50 p-4 font-sans pb-10">

    <div class="max-w-md mx-auto">
        <!-- Header: Absolute Positioning দিয়ে টাইটেলটি একদম পারফেক্ট সেন্টারে আনা হয়েছে -->
        <div class="relative flex items-center justify-center mb-6 border-b pb-3 h-10">
            <a href="bag.html" class="absolute left-0 text-xs font-bold tracking-widest uppercase hover:underline flex items-center gap-1 text-gray-600">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
                </svg>
                Bag
            </a>
            <h1 class="text-sm font-bold tracking-widest luxury-font uppercase">Checkout</h1>
        </div>

        <!-- Order Summary Box -->
        <div class="bg-white p-4 shadow rounded mb-6 border border-gray-100">
            <h2 class="font-bold mb-3 border-b pb-2 tracking-widest uppercase text-xs">Order Summary</h2>
            
            <!-- ৩ নং পয়েন্টের সমাধান: চেকআউট প্রোডাক্ট লিস্ট এরিয়া -->
            <div id="checkout-items-list" class="space-y-3 mb-4 max-h-48 overflow-y-auto scrollbar-hide">
                <p class="text-center py-4 text-xs text-gray-400">Loading items...</p>
            </div>

            <div class="space-y-2 text-sm text-gray-600 border-t pt-3">
                <div class="flex justify-between">
                    <span>Subtotal:</span>
                    <span>৳ <span id="summary-subtotal">0.00</span></span>
                </div>
                <div class="flex justify-between">
                    <span>Delivery Charge:</span>
                    <span>৳ <span id="summary-shipping">80.00</span></span>
                </div>
                <div class="flex justify-between font-bold text-black text-base border-t pt-2 mt-2">
                    <span>Total Amount:</span>
                    <span class="text-[#D4AF37]">৳ <span id="summary-total">0.00</span></span>
                </div>
            </div>
        </div>

        <!-- Shipping Form Section -->
        <div class="bg-white p-4 shadow border border-gray-200 rounded">
            <h2 class="font-bold mb-3 border-b pb-2 tracking-widest uppercase text-xs">Shipping Details</h2>
            
            <div class="space-y-3">
                <div>
                    <label class="text-[10px] font-bold uppercase tracking-wider text-gray-500 block mb-1">Full Name</label>
                    <input type="text" id="name" placeholder="Enter your full name" class="w-full p-3 border text-sm focus:outline-none focus:border-[#D4AF37] rounded">
                </div>
                <div>
                    <label class="text-[10px] font-bold uppercase tracking-wider text-gray-500 block mb-1">Phone Number</label>
                    <input type="tel" id="phone" placeholder="Enter your phone number" class="w-full p-3 border text-sm focus:outline-none focus:border-[#D4AF37] rounded">
                </div>
                <div>
                    <label class="text-[10px] font-bold uppercase tracking-wider text-gray-500 block mb-1">Delivery Area</label>
                    <select id="delivery-area" onchange="updateShipping()" class="w-full p-3 border text-sm focus:outline-none focus:border-[#D4AF37] bg-white rounded">
                        <option value="inside_dhaka">Inside Dhaka (৳80)</option>
                        <option value="outside_dhaka">Outside Dhaka (৳150)</option>
                    </select>
                </div>
                <div>
                    <label class="text-[10px] font-bold uppercase tracking-wider text-gray-500 block mb-1">Full Address</label>
                    <textarea id="address" placeholder="House/Road, Area, District" rows="3" class="w-full p-3 border text-sm focus:outline-none focus:border-[#D4AF37] rounded"></textarea>
                </div>
            </div>
            
            <button onclick="submitOrder()" class="w-full bg-black text-white py-3.5 mt-6 uppercase tracking-widest text-xs font-bold hover:bg-[#D4AF37] transition duration-300 rounded">
                PLACE ORDER (CASH ON DELIVERY)
            </button>
        </div>
    </div>

    <script>
        let subtotal = 0;

        async function loadSummary() {
            const user = JSON.parse(localStorage.getItem('user_session'));
            if (!user) { window.location.href = 'login.html'; return; }

            try {
                const res = await fetch('/api/bag?email=' + user.email);
                const cartItems = await res.json();

                if (cartItems.length === 0) {
                    alert("Your bag is empty! Redirecting to shop.");
                    window.location.href = 'index.html';
                    return;
                }

                // ৩ নং পয়েন্টের কাজ: কার্টের প্রোডাক্ট তালিকা এবং ছবি স্ক্রিনে লোড করা হচ্ছে
                const listContainer = document.getElementById('checkout-items-list');
                listContainer.innerHTML = cartItems.map(item => {
                    const qty = parseInt(item.quantity) || 1;
                    const price = parseFloat(item.price);
                    subtotal += price * qty;

                    return `
                        <div class="flex items-center gap-3 text-xs text-gray-700 py-1.5 border-b border-gray-50 last:border-0">
                            <img src="${item.image_url || 'https://via.placeholder.com/48'}" class="w-10 h-10 object-cover border rounded">
                            <div class="flex-grow">
                                <span class="font-bold block uppercase tracking-wider text-gray-800 text-[10px]">${item.product_name}</span>
                                <span class="text-gray-500 text-[9px]">Size: ${item.size} | Qty: ${qty}</span>
                            </div>
                            <span class="font-bold text-gray-900">৳ ${(price * qty).toFixed(2)}</span>
                        </div>
                    `;
                }).join('');

                document.getElementById('summary-subtotal').innerText = subtotal.toFixed(2);
                updateShipping(); 
            } catch (e) {
                console.error(e);
            }
        }

        function updateShipping() {
            const area = document.getElementById('delivery-area').value;
            const shippingFee = area === 'inside_dhaka' ? 80 : 150;
            const grandTotal = subtotal + shippingFee;

            document.getElementById('summary-shipping').innerText = shippingFee.toFixed(2);
            document.getElementById('summary-total').innerText = grandTotal.toFixed(2);
        }

        async function submitOrder() {
            const user = JSON.parse(localStorage.getItem('user_session'));
            const name = document.getElementById('name').value.trim();
            const phone = document.getElementById('phone').value.trim();
            const area = document.getElementById('delivery-area').value;
            const address = document.getElementById('address').value.trim();

            if (!name || !phone || !address) {
                alert("Please fill in all shipping details!");
                return;
            }

            const data = { 
                action: 'checkout',
                name: name, 
                phone: phone, 
                address: address, 
                delivery_area: area,
                email: user.email
            };
            
            try {
                const res = await fetch('/api/orders', { 
                    method: 'POST', 
                    headers: {'Content-Type':'application/json'}, 
                    body: JSON.stringify(data) 
                });
                
                if (res.ok) { 
                    alert('Order Placed Successfully!'); 
                    window.location.href = 'index.html'; 
                } else {
                    alert('Failed to place order.');
                }
            } catch (error) {
                alert('Error placing order.');
                console.error(error);
            }
        }

        document.addEventListener('DOMContentLoaded', loadSummary);
    </script>
</body>
</html>
