<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SHAAM ITQAN | Admin Panel</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 p-6">
    <div class="max-w-md mx-auto bg-white p-8 rounded-xl shadow-md">
        <h2 class="text-2xl font-bold mb-6 text-center">নতুন প্রোডাক্ট যোগ করুন</h2>
        <form id="productForm" class="space-y-4">
            <div>
                <label class="block text-sm font-medium">প্রোডাক্টের নাম</label>
                <input type="text" id="name" class="w-full border p-2 rounded" required>
            </div>
            <div>
                <label class="block text-sm font-medium">দাম (৳)</label>
                <input type="number" id="price" class="w-full border p-2 rounded" required>
            </div>
            <div>
                <label class="block text-sm font-medium">বিস্তারিত বর্ণনা</label>
                <textarea id="description" class="w-full border p-2 rounded"></textarea>
            </div>
            <button type="submit" class="w-full bg-black text-white py-3 rounded-lg hover:bg-gray-800 transition">আপলোড করুন</button>
        </form>
        <p id="msg" class="mt-4 text-center text-green-600 font-medium"></p>
    </div>

    <script>
    // এই কোডটি ফাইলের একদম উপরে script ট্যাগ এর ভেতর বসান
    const pass = prompt("অ্যাডমিন পাসওয়ার্ড দিন:");
    if (pass !== "shaam123") { // এখানে আপনার নিজের পাসওয়ার্ড দিন
        alert("ভুল পাসওয়ার্ড!");
        window.location.href = "/";
    }
        document.getElementById('productForm').onsubmit = async (e) => {
            e.preventDefault();
            const data = {
                name: document.getElementById('name').value,
                price: document.getElementById('price').value,
                description: document.getElementById('description').value
            };

            const res = await fetch('/api/add-product', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });

            if(res.ok) {
                document.getElementById('msg').innerText = "প্রোডাক্ট সফলভাবে আপলোড হয়েছে!";
                document.getElementById('productForm').reset();
            } else {
                document.getElementById('msg').innerText = "ভুল হয়েছে, আবার চেষ্টা করুন।";
            }
        };
    </script>
</body>
</html>
