<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | SHAAM ITQAN</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&display=swap');
        .luxury-font { font-family: 'Playfair Display', serif; }
    </style>
</head>
<body class="bg-[#FDF8EF] text-[#333333] font-serif min-h-screen flex items-center justify-center p-4">

    <div class="max-w-md w-full bg-white p-8 border border-[#C1A44E]/30 shadow-2xl">
        <h2 class="text-3xl font-bold mb-6 text-center luxury-font uppercase tracking-widest" id="auth-title">Login</h2>
        
        <input type="text" id="name" placeholder="Full Name (Only for Signup)" class="w-full p-3 border border-gray-300 mb-4 text-sm hidden" id="name-field">
        <input type="email" id="email" placeholder="Email Address" class="w-full p-3 border border-gray-300 mb-4 text-sm">
        <input type="password" id="pass" placeholder="Password" class="w-full p-3 border border-gray-300 mb-6 text-sm">
        
        <button onclick="handleAuth()" id="auth-btn" class="w-full bg-[#333333] text-white py-3 uppercase text-sm tracking-widest hover:bg-[#C1A44E] transition">Sign In</button>
        
        <p class="mt-6 text-center text-sm">
            <span id="toggle-text">Don't have an account?</span> 
            <button onclick="toggleMode()" class="text-[#C1A44E] font-bold underline">Sign Up</button>
        </p>
    </div>

    <script>
        let isLogin = true;

        function toggleMode() {
            isLogin = !isLogin;
            document.getElementById('auth-title').innerText = isLogin ? 'Login' : 'Sign Up';
            document.getElementById('auth-btn').innerText = isLogin ? 'Sign In' : 'Create Account';
            document.getElementById('toggle-text').innerText = isLogin ? "Don't have an account?" : "Already have an account?";
            document.getElementById('name').classList.toggle('hidden', isLogin);
        }

        async function handleAuth() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('pass').value;
            const name = document.getElementById('name').value;
            const action = isLogin ? 'login' : 'signup';

            const res = await fetch('/api/auth', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ action, email, password, name })
            });

            const data = await res.json();
            
            if (res.ok) {
                if (isLogin) {
                    localStorage.setItem('user_session', JSON.stringify(data.user));
                    alert("Welcome back!");
                    window.location.href = 'bag.html';
                } else {
                    alert("Account created! Please login.");
                    toggleMode();
                }
            } else {
                alert(data.message || "Something went wrong!");
            }
        }
    </script>
</body>
</html>
