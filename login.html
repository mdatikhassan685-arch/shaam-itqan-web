<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | SHAAM ITQAN</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#FDF8EF] min-h-screen flex items-center justify-center p-4 font-serif">

    <div class="w-full max-w-[320px] bg-white p-8 border border-[#C1A44E]/30 shadow-2xl">
        <h2 id="auth-title" class="text-2xl font-bold mb-6 text-center uppercase tracking-widest text-[#333]">Login</h2>
        
        <input type="text" id="name" placeholder="Full Name" class="w-full p-3 border mb-3 text-sm hidden">
        <input type="email" id="email" placeholder="Email Address" class="w-full p-3 border mb-3 text-sm">
        <input type="password" id="pass" placeholder="Password" class="w-full p-3 border mb-6 text-sm">
        
        <button onclick="handleAuth()" id="auth-btn" class="w-full bg-[#333333] text-white py-3 uppercase tracking-widest text-sm hover:bg-[#C1A44E] transition">Sign In</button>
        
        <p class="mt-6 text-center text-xs">
            <span onclick="toggleMode()" class="cursor-pointer text-gray-500 hover:text-[#C1A44E]">
                <span id="toggle-text">Don't have an account?</span> <b class="text-[#C1A44E]">Sign Up</b>
            </span>
        </p>
    </div>

    <script>
        let isLogin = true;
        function toggleMode() {
            isLogin = !isLogin;
            document.getElementById('auth-title').innerText = isLogin ? 'Login' : 'Sign Up';
            document.getElementById('name').classList.toggle('hidden', isLogin);
            document.getElementById('auth-btn').innerText = isLogin ? 'Sign In' : 'Sign Up';
            document.getElementById('toggle-text').innerText = isLogin ? "Don't have an account?" : "Already have an account?";
        }

        async function handleAuth() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('pass').value;
            const name = document.getElementById('name').value;
            
            const res = await fetch('/api/auth', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ action: isLogin ? 'login' : 'signup', email, password, name })
            });
            
            const data = await res.json();
            if (res.ok) {
                if (isLogin) { 
                    localStorage.setItem('user_session', JSON.stringify(data.user)); 
                    window.location.href = 'index.html'; 
                } else { 
                    alert("Account created! Please login."); 
                    toggleMode(); 
                }
            } else { alert(data.message || "Authentication Failed"); }
        }
    </script>
</body>
</html>
